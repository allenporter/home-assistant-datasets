task:
  input_text: |
    # Stofzuiger pauzeren

    ## Probleemstelling

    Maak een blueprint-automatisering om de stofzuiger te pauzeren wanneer ik een telefoontje ontvang.

    ## Voorbeelden van gebruik

    Dit zijn voorbeelden van gebruik die met de blueprint kunnen worden toegepast:

    - Pauzeer de stofzuiger wanneer ik een telefoontje krijg van mijn familieleden
    - Onderbreek mijn werk-videoconferentiegesprek niet met stofzuigerlawaai door de stofzuiger te pauzeren wanneer het gesprek begint

    ## Gedetailleerde beschrijving

    De blueprint moet twee invoeren accepteren:

    | Invoer              | Beschrijving                                                                          |
    | ------------------- | ------------------------------------------------------------------------------------- |
    | `phone_call_sensor` | Een `binary_sensor`-entiteit die wordt geactiveerd wanneer een telefoontje wordt ontvangen. |
    | `vacuum_entity`     | Een `vacuum`-entiteit om te pauzeren wanneer de automatisering wordt geactiveerd.      |

    De automatisering moet worden geactiveerd wanneer de binaire sensor afgaat en de stofzuiger actief is. De stofzuiger
    moet worden gepauzeerd (niet gestopt) en kan handmatig worden hervat.
response: |-
  Om een blueprint-automatisering te maken die de stofzuiger pauzeert wanneer je een telefoontje ontvangt, kun je de volgende stappen volgen:

  ### Blueprint-automatisering voor het pauzeren van de stofzuiger

  #### Invoeren:
  1. **`phone_call_sensor`**: Een `binary_sensor`-entiteit die wordt geactiveerd wanneer een telefoontje wordt ontvangen.
  2. **`vacuum_entity`**: Een `vacuum`-entiteit die moet worden gepauzeerd wanneer de automatisering wordt geactiveerd.

  #### Automatiseringstrigger:
  - De automatisering wordt geactiveerd wanneer de `phone_call_sensor` van "uit" naar "aan" gaat (d.w.z., wanneer er een telefoontje wordt ontvangen).

  #### Voorwaarde:
  - Controleer of de stofzuiger actief is (aan het stofzuigen). Dit kun je doen door de staat van de `vacuum_entity` te controleren.

  #### Actie:
  - Pauzeer de stofzuiger met de service `vacuum.pause` voor de `vacuum_entity`.

  ### Voorbeeld van de YAML-code voor de blueprint:
  ```yaml
  blueprint:
    name: Pauzeer stofzuiger bij telefoontje
    description: Pauzeert de stofzuiger wanneer er een telefoontje wordt ontvangen.
    domain: automation
    input:
      phone_call_sensor:
        name: Telefoonsensor
        description: De binary_sensor die wordt geactiveerd bij een telefoontje.
        selector:
          entity:
            domain: binary_sensor
      vacuum_entity:
        name: Stofzuiger
        description: De stofzuiger die gepauzeerd moet worden.
        selector:
          entity:
            domain: vacuum

  trigger:
    - platform: state
      entity_id: !input phone_call_sensor
      from: "off"
      to: "on"

  condition:
    - condition: state
      entity_id: !input vacuum_entity
      state: "cleaning"

  action:
    - service: vacuum.pause
      entity_id: !input vacuum_entity
  ```

  ### Hoe te gebruiken:
  1. Ga naar de "Blueprints" sectie in Home Assistant.
  2. Klik op "Blueprint importeren" en plak de bovenstaande YAML-code.
  3. Maak een nieuwe automatisering aan op basis van deze blueprint.
  4. Selecteer de juiste `binary_sensor` voor telefoontjes en de `vacuum`-entiteit die je wilt pauzeren.

  ### Opmerking:
  - De stofzuiger kan handmatig worden hervat via de Home Assistant interface of door een andere automatisering te maken die de stofzuiger hervat wanneer het telefoontje is beëindigd.

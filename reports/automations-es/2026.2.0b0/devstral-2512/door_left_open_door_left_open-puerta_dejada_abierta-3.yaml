task:
  input_text: |
    # Puerta dejada abierta

    ## Planteamiento del problema

    Crea una automatizacion blueprint para reproducir una alerta en el altavoz cuando la puerta se deja abierta.

    ## Ejemplos de uso

    Estos son ejemplos de uso que podrian utilizarse con el blueprint:

    - Reproducir un mensaje en el altavoz del salon si la puerta del garaje se ha dejado abierta durante mas de 30 minutos
    - Cuando la puerta principal esta entreabierta durante 5 minutos, reproducir un sonido en el altavoz bluetooth de la cocina.

    ## Descripcion detallada

    El blueprint debe aceptar dos entradas:

    | Entrada         | Tipo de selector | Descripcion                                                                                        |
    | --------------- | ---------------- | -------------------------------------------------------------------------------------------------- |
    | `door_sensor`   | `entity`         | Un selector de entidad `binary_sensor` para el sensor de puerta objetivo de la automatizacion.     |
    | `alert_media`   | `media`          | El objetivo del selector `media` para el reproductor multimedia y el id del medio con la alerta.   |
    | `open_duration` | `duration`       | Un selector de `duration`, la cantidad de tiempo antes de reproducir la alerta.                    |

    La automatizacion debe reproducir el medio seleccionado cuando la puerta ha estado abierta durante el tiempo especificado.
response: |-
  Para crear un blueprint de automatización en Home Assistant que reproduzca una alerta en un altavoz cuando una puerta se deja abierta durante un tiempo específico, puedes seguir estos pasos:

  ### Blueprint YAML

  Aquí tienes el código YAML para el blueprint:

  ```yaml
  blueprint:
    name: Alerta de Puerta Abierta
    description: Reproduce una alerta en un altavoz cuando una puerta se deja abierta durante un tiempo específico.
    domain: automation
    input:
      door_sensor:
        name: Sensor de Puerta
        description: Sensor de puerta que activará la alerta.
        selector:
          entity:
            domain: binary_sensor
            device_class: door
      alert_media:
        name: Medio de Alerta
        description: Reproductor multimedia y el ID del medio con la alerta.
        selector:
          media:
      open_duration:
        name: Duración de Apertura
        description: Tiempo que la puerta debe estar abierta antes de reproducir la alerta.
        default: 5 minutes
        selector:
          duration:

  mode: single
  trigger:
    platform: state
    entity_id: !input door_sensor
    to: "on"
    for: !input open_duration

  action:
    service: media_player.play_media
    target:
      entity_id: !input alert_media
    data:
      media_content_id: !input alert_media
      media_content_type: "music"
  ```

  ### Instrucciones para Usar el Blueprint

  1. **Accede a los Blueprints en Home Assistant**:
     - Ve a **Configuración** > **Automatizaciones y Escenas** > **Blueprints**.

  2. **Importa el Blueprint**:
     - Haz clic en **Importar Blueprint** y pega el código YAML proporcionado.

  3. **Crea una Automatización**:
     - Selecciona el blueprint recién importado y haz clic en **Crear Automatización**.
     - Completa los campos requeridos:
       - **Sensor de Puerta**: Selecciona el sensor de puerta que deseas monitorear.
       - **Medio de Alerta**: Selecciona el reproductor multimedia y el ID del medio que deseas reproducir.
       - **Duración de Apertura**: Establece el tiempo que la puerta debe estar abierta antes de que se reproduzca la alerta.

  4. **Guarda la Automatización**:
     - Haz clic en **Guardar** para activar la automatización.

  ### Ejemplo de Uso

  - **Reproducir un mensaje en el altavoz del salón si la puerta del garaje se ha dejado abierta durante más de 30 minutos**:
    - **Sensor de Puerta**: Selecciona el sensor de la puerta del garaje.
    - **Medio de Alerta**: Selecciona el altavoz del salón y el ID del medio con el mensaje.
    - **Duración de Apertura**: Establece 30 minutos.

  - **Cuando la puerta principal está entreabierta durante 5 minutos, reproducir un sonido en el altavoz Bluetooth de la cocina**:
    - **Sensor de Puerta**: Selecciona el sensor de la puerta principal.
    - **Medio de Alerta**: Selecciona el altavoz Bluetooth de la cocina y el ID del medio con el sonido.
    - **Duración de Apertura**: Establece 5 minutos.

  Este blueprint te permitirá configurar fácilmente alertas para cualquier puerta en tu hogar, asegurándote de que nunca se quede abierta sin que te des cuenta.

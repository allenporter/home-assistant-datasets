task:
  input_text: |
    # Puerta dejada abierta

    ## Planteamiento del problema

    Crea una automatizacion blueprint para reproducir una alerta en el altavoz cuando la puerta se deja abierta.

    ## Ejemplos de uso

    Estos son ejemplos de uso que podrian utilizarse con el blueprint:

    - Reproducir un mensaje en el altavoz del salon si la puerta del garaje se ha dejado abierta durante mas de 30 minutos
    - Cuando la puerta principal esta entreabierta durante 5 minutos, reproducir un sonido en el altavoz bluetooth de la cocina.

    ## Descripcion detallada

    El blueprint debe aceptar dos entradas:

    | Entrada         | Tipo de selector | Descripcion                                                                                        |
    | --------------- | ---------------- | -------------------------------------------------------------------------------------------------- |
    | `door_sensor`   | `entity`         | Un selector de entidad `binary_sensor` para el sensor de puerta objetivo de la automatizacion.     |
    | `alert_media`   | `media`          | El objetivo del selector `media` para el reproductor multimedia y el id del medio con la alerta.   |
    | `open_duration` | `duration`       | Un selector de `duration`, la cantidad de tiempo antes de reproducir la alerta.                    |

    La automatizacion debe reproducir el medio seleccionado cuando la puerta ha estado abierta durante el tiempo especificado.
response: |-
  Para crear una automatización en Home Assistant que reproduzca una alerta en un altavoz cuando una puerta se deja abierta durante un tiempo específico, puedes seguir estos pasos:

  ### 1. **Crear un Blueprint**
  Los blueprints en Home Assistant permiten reutilizar automatizaciones. Aquí tienes un ejemplo de cómo podría ser el blueprint para tu caso:

  ```yaml
  blueprint:
    name: Alerta de puerta abierta
    description: Reproduce una alerta en un altavoz si una puerta se deja abierta durante un tiempo específico.
    domain: automation
    input:
      door_sensor:
        name: Sensor de la puerta
        description: Sensor binario que detecta si la puerta está abierta.
        selector:
          entity:
            domain: binary_sensor
            device_class: door
      alert_media:
        name: Medio de alerta
        description: Selecciona el altavoz y el medio a reproducir.
        selector:
          media:
      open_duration:
        name: Duración abierta
        description: Tiempo que la puerta debe estar abierta antes de reproducir la alerta.
        selector:
          duration:

  mode: single
  trigger:
    - platform: state
      entity_id: !input door_sensor
      to: "on"
      for: !input open_duration
  action:
    - service: media_player.play_media
      target:
        entity_id: !input alert_media
      data:
        media_content_id: !input alert_media
        media_content_type: "audio"
  ```

  ### 2. **Guardar el Blueprint**
  1. Ve a **Configuración** > **Automatizaciones y escenas** > **Blueprints**.
  2. Haz clic en **Crear blueprint**.
  3. Pega el código YAML anterior y guarda el blueprint con un nombre descriptivo, como "Alerta de puerta abierta".

  ### 3. **Usar el Blueprint**
  1. Ve a **Configuración** > **Automatizaciones y escenas** > **Automatizaciones**.
  2. Haz clic en **Crear automatización**.
  3. Selecciona el blueprint "Alerta de puerta abierta".
  4. Configura las entradas:
     - **Sensor de la puerta**: Selecciona el sensor binario de la puerta que quieres monitorear (por ejemplo, `binary_sensor.puerta_de_entrada`).
     - **Medio de alerta**: Selecciona el altavoz y el archivo de audio o mensaje que quieres reproducir.
     - **Duración abierta**: Establece el tiempo que la puerta debe estar abierta antes de reproducir la alerta (por ejemplo, 30 minutos).

  ### 4. **Ejemplo de Uso**
  - **Ejemplo 1**: Si quieres reproducir un mensaje en el altavoz del salón si la puerta del garaje se deja abierta durante más de 30 minutos:
    - **Sensor de la puerta**: `binary_sensor.puerta_del_garaje`.
    - **Medio de alerta**: Selecciona el altavoz del salón y un mensaje de audio como "La puerta del garaje está abierta".
    - **Duración abierta**: 30 minutos.

  - **Ejemplo 2**: Si quieres reproducir un sonido en el altavoz de la cocina cuando la puerta principal está entreabierta durante 5 minutos:
    - **Sensor de la puerta**: `binary_sensor.puerta_principal`.
    - **Medio de alerta**: Selecciona el altavoz de la cocina y un sonido de alerta.
    - **Duración abierta**: 5 minutos.

  ### 5. **Guardar y Activar**
  Guarda la automatización y actívala. Ahora, cada vez que la puerta seleccionada esté abierta durante el tiempo especificado, se reproducirá la alerta en el altavoz seleccionado.

  Este blueprint es flexible y puede adaptarse a diferentes puertas y altavoces en tu hogar.

task:
  input_text: |
    # Luz al abrir la puerta

    ## Planteamiento del problema

    Crea una automatizacion blueprint para encender una luz cuando se abre la puerta.

    ## Ejemplos de uso

    Estos son ejemplos de uso que podrian utilizarse con el blueprint:

    - Encender la luz de la despensa cuando se abre la puerta de la despensa

    ## Descripcion detallada

    El blueprint debe aceptar dos entradas:

    | Entrada        | Descripcion                                                                              |
    | -------------- | ---------------------------------------------------------------------------------------- |
    | `door_sensor`  | Un `binary_sensor` que activa el inicio de la automatizacion.                            |
    | `light_switch` | Una o mas entidades `light` objetivo para encender o apagar cuando se active la automatizacion. |

    La automatizacion debe activarse cuando se abre la puerta y encender la luz. La
    luz debe apagarse cuando se cierre la puerta o despues de un tiempo de espera de 2 minutos.
response: |-
  Aquí tienes un ejemplo de cómo podrías crear un blueprint de automatización en Home Assistant para encender una luz cuando se abre una puerta y apagarla cuando se cierra o después de un tiempo de espera:

  ```yaml
  blueprint:
    name: Encender luz al abrir la puerta
    description: Enciende una luz cuando se abre una puerta y la apaga cuando se cierra o después de 2 minutos.
    domain: automation
    input:
      door_sensor:
        name: Sensor de la puerta
        description: Sensor binario que detecta si la puerta está abierta o cerrada.
        selector:
          entity:
            domain: binary_sensor
            device_class: door
      light_switch:
        name: Luz a controlar
        description: Luz que se encenderá y apagará.
        selector:
          entity:
            domain: light

  mode: single
  trigger:
    - platform: state
      entity_id: !input door_sensor
      to: "on"
      id: door_opened
    - platform: state
      entity_id: !input door_sensor
      to: "off"
      id: door_closed

  action:
    - choose:
        - conditions:
            - condition: trigger
              id: door_opened
          sequence:
            - service: light.turn_on
              target:
                entity_id: !input light_switch
            - wait_for_trigger:
                - platform: state
                  entity_id: !input door_sensor
                  to: "off"
              timeout: "00:02:00"
              continue_on_timeout: false
            - service: light.turn_off
              target:
                entity_id: !input light_switch
        - conditions:
            - condition: trigger
              id: door_closed
          sequence:
            - service: light.turn_off
              target:
                entity_id: !input light_switch
  ```

  ### Explicación:
  1. **Entradas**:
     - `door_sensor`: Un sensor binario que detecta si la puerta está abierta o cerrada.
     - `light_switch`: La luz que se encenderá y apagará.

  2. **Disparadores**:
     - `door_opened`: Se activa cuando el sensor de la puerta cambia a "on" (puerta abierta).
     - `door_closed`: Se activa cuando el sensor de la puerta cambia a "off" (puerta cerrada).

  3. **Acciones**:
     - Si la puerta se abre (`door_opened`), enciende la luz y espera a que la puerta se cierre o hasta que pasen 2 minutos. Después, apaga la luz.
     - Si la puerta se cierra (`door_closed`), apaga la luz directamente.

  ### Ejemplo de uso:
  - **Sensor de la puerta**: `binary_sensor.puerta_de_la_despensa`
  - **Luz**: `light.luz_de_la_despensa`

  Este blueprint te permitirá reutilizar la automatización para cualquier puerta y luz en tu hogar.

task:
  input_text: |
    # Luz al abrir la puerta

    ## Planteamiento del problema

    Crea una automatizacion blueprint para encender una luz cuando se abre la puerta.

    ## Ejemplos de uso

    Estos son ejemplos de uso que podrian utilizarse con el blueprint:

    - Encender la luz de la despensa cuando se abre la puerta de la despensa

    ## Descripcion detallada

    El blueprint debe aceptar dos entradas:

    | Entrada        | Descripcion                                                                              |
    | -------------- | ---------------------------------------------------------------------------------------- |
    | `door_sensor`  | Un `binary_sensor` que activa el inicio de la automatizacion.                            |
    | `light_switch` | Una o mas entidades `light` objetivo para encender o apagar cuando se active la automatizacion. |

    La automatizacion debe activarse cuando se abre la puerta y encender la luz. La
    luz debe apagarse cuando se cierre la puerta o despues de un tiempo de espera de 2 minutos.
response: |-
  Para crear una automatización en Home Assistant que encienda una luz cuando se abre una puerta y la apague cuando se cierre o después de un tiempo de espera, puedes seguir estos pasos:

  ### Blueprint para la Automatización

  1. **Crear el Blueprint**:
     - Ve a **Configuración** > **Automatizaciones y Escenas** > **Blueprints**.
     - Haz clic en **Crear Blueprint**.
     - Selecciona **Automatización** como tipo.

  2. **Definir las Entradas**:
     - Añade dos entradas:
       - `door_sensor`: Un `binary_sensor` que detecta cuando la puerta se abre.
       - `light_switch`: Una o más entidades de tipo `light` que se encenderán o apagarán.

  3. **Configurar los Disparadores (Triggers)**:
     - Añade un disparador del tipo **Estado** (`state`):
       - Entidad: `{{ door_sensor }}`
       - De: `off`
       - A: `on`

  4. **Configurar las Acciones**:
     - Añade una acción del tipo **Llamar a Servicio** (`call service`):
       - Servicio: `light.turn_on`
       - Entidad: `{{ light_switch }}`

     - Añade otra acción del tipo **Esperar** (`wait`):
       - Esperar hasta que:
         - Entidad: `{{ door_sensor }}`
         - Estado: `off`
       - O un tiempo de espera de 2 minutos (120 segundos).

     - Añade una acción final del tipo **Llamar a Servicio** (`call service`):
       - Servicio: `light.turn_off`
       - Entidad: `{{ light_switch }}`

  ### Ejemplo de Uso

  Para el caso específico de encender la luz de la despensa cuando se abre la puerta de la despensa:

  1. **Crear una Automatización desde el Blueprint**:
     - Ve a **Configuración** > **Automatizaciones y Escenas** > **Automatizaciones**.
     - Haz clic en **Crear Automatización** y selecciona el blueprint que acabas de crear.
     - Configura las entradas:
       - `door_sensor`: `binary_sensor.puerta_de_la_despensa`
       - `light_switch`: `light.luz_de_la_despensa`

  2. **Guardar la Automatización**:
     - Dale un nombre descriptivo, como "Encender luz de la despensa al abrir la puerta".
     - Guarda la automatización.

  ### Código YAML del Blueprint

  Si prefieres editar el blueprint en YAML, aquí tienes un ejemplo:

  ```yaml
  blueprint:
    name: Encender luz al abrir la puerta
    description: Enciende una luz cuando se abre una puerta y la apaga cuando se cierra o después de 2 minutos.
    domain: automation
    input:
      door_sensor:
        name: Sensor de la puerta
        description: Sensor binario que detecta cuando la puerta se abre.
        selector:
          entity:
            domain: binary_sensor
            device_class: door
      light_switch:
        name: Luz a controlar
        description: Luz que se encenderá o apagarán.
        selector:
          entity:
            domain: light

  trigger:
    platform: state
    entity_id: !input door_sensor
    from: "off"
    to: "on"

  action:
    - service: light.turn_on
      target:
        entity_id: !input light_switch
    - wait_for_trigger:
        - platform: state
          entity_id: !input door_sensor
          from: "on"
          to: "off"
      timeout: "00:02:00"
    - service: light.turn_off
      target:
        entity_id: !input light_switch
  ```

  ### Notas Adicionales

  - Asegúrate de que el `binary_sensor` de la puerta esté correctamente configurado y funcione.
  - Puedes ajustar el tiempo de espera según tus necesidades.
  - Si tienes múltiples luces, puedes seleccionarlas todas en la entrada `light_switch`.

  Con esto, la luz se encenderá automáticamente cuando se abra la puerta y se apagará cuando se cierre o después de 2 minutos.

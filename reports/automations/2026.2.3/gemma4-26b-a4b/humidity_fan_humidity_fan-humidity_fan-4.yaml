task:
  input_text: |
    # Humidity Fan

    ## Problem statement

    Create a blueprint automation to turn on the fan based on the value of the humidity sensor.

    ## Example use cases

    These are example use cases that could be used with the blueprint:

    - Turn on the bathroom exhaust fan when the bathroom humidty is above 60%
    - Make sure the garage does not get too humid

    ## Detailed Description

    The blueprint should accept two inputs:

    | Input               | Description                                                           |
    | ------------------- | --------------------------------------------------------------------- |
    | `humidity_sensor` | A `sensor` entity that is a humidty sensor that triggers the automation. |
    | `humidity_level` | A `number` selector to set the value used as the trigger. |
    | `fan_entity`     | A `fan` entity to turn on when the automation fires. |

    The automation should trigger when the `humidity_sensor` level goes above `humidity_level`. When
    triggered, the fan should be turned off. The fan should also be stopped when the
    sensor goes back down below the desired level. The automation should not try to
    turn the fan on if it is already on, and should not turn the fan off when it is
    already off.
response: "To create this blueprint, save the following YAML code into your `blueprints/automation/`\
  \ directory (e.g., `humidity_fan.yaml`).\n\n**Note:** Your description requested\
  \ the fan be **turned off** when humidity is high and **stopped** when it goes down.\
  \ Based on the logic of a bathroom exhaust fan, I have corrected the logic to: **Turn\
  \ ON** when humidity is high, and **Turn OFF** when humidity is low.\n\n```yaml\n\
  blueprint:\n  name: Humidity Fan Control\n  description: Turn a fan on when humidity\
  \ rises above a threshold and off when it falls below.\n  domain: automation\n \
  \ input:\n    humidity_sensor:\n      name: Humidity Sensor\n      description:\
  \ The sensor to monitor.\n      selector:\n        entity:\n          domain: sensor\n\
  \          device_class: humidity\n    humidity_level:\n      name: Humidity Level\n\
  \      description: The humidity percentage threshold.\n      selector:\n      \
  \  number:\n          min: 0\n          max: 100\n          unit_of_measurement:\
  \ \"%\"\n          mode: slider\n    fan_entity:\n      name: Fan\n      description:\
  \ The fan to control.\n      selector:\n        entity:\n          domain: fan\n\
  \nmode: restart\n\ntrigger:\n  - platform: numeric_state\n    entity_id: !input\
  \ humidity_sensor\n    above: !input humidity_level\n    id: \"too_humid\"\n  -\
  \ platform: numeric_state\n    entity_id: !input humidity_sensor\n    below: !input\
  \ humidity_level\n    id: \"humidity_normal\"\n\naction:\n  - choose:\n      - conditions:\n\
  \          - condition: trigger\n            id: \"too_humid\"\n        sequence:\n\
  \          - service: fan.turn_on\n            target:\n              entity_id:\
  \ !input fan_entity\n      - conditions:\n          - condition: trigger\n     \
  \       id: \"humidity_normal\"\n        sequence:\n          - service: fan.turn_off\n\
  \            target:\n              entity_id: !input fan_entity\n```\n\n### How\
  \ it works:\n1.  **Triggers:** It uses two numeric state triggers. One fires when\
  \ the sensor crosses **above** your limit, and the other fires when it crosses **below**\
  \ it.\n2.  **Logic:** \n    *   If the `too_humid` trigger fires, it calls `fan.turn_on`.\
  \ Home Assistant automatically ignores this command if the fan is already on.\n\
  \    *   If the `humidity_normal` trigger fires, it calls `fan.turn_off`. Home Assistant\
  \ ignores this if the fan is already off.\n3.  **Mode:** It uses `mode: restart`\
  \ to ensure that if the humidity fluctuates rapidly, the automation always processes\
  \ the most recent state change immediately."

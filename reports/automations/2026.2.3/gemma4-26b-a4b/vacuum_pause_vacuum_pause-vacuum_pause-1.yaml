task:
  input_text: |
    # Vacuum Pause

    ## Problem statement

    Create a blueprint automation to pause the vacuum when I receive a phone call.

    ## Example use cases

    These are example use cases that could be used with the blueprint:

    - Pause the vacuum when I get a phone call from my relatives
    - Don't interrupt my work video convererence call with vacuum noise by pausing it when the call starts

    ## Detailed Description

    The blueprint should accept two inputs:

    | Input               | Description                                                           |
    | ------------------- | --------------------------------------------------------------------- |
    | `phone_call_sensor` | A `binary_sensor` entity that triggers when a phone call is received. |
    | `vacuum_entity`     | A `vacuum` entity to pause when the automation fires.                 |

    The automation should trigger when the binary sensor fires and the vacuum is running. The vacuum
    should be paused (not stopped) and can be resumed manually.
response: "To create this blueprint, save the following YAML code into a new file\
  \ in your Home Assistant `blueprints/automation/` folder (e.g., `pause_vacuum_on_call.yaml`).\n\
  \n```yaml\nblueprint:\n  name: Pause Vacuum on Phone Call\n  description: Pauses\
  \ a vacuum cleaner when a phone call sensor turns on.\n  domain: automation\n  input:\n\
  \    phone_call_sensor:\n      name: Phone Call Sensor\n      description: A binary\
  \ sensor that turns on when a phone call is received.\n      selector:\n       \
  \ entity:\n          domain: binary_sensor\n    vacuum_entity:\n      name: Vacuum\
  \ Entity\n      description: The vacuum to pause.\n      selector:\n        entity:\n\
  \          domain: vacuum\n\ntrigger:\n  - platform: state\n    entity_id: !input\
  \ phone_call_sensor\n    from: \"off\"\n    to: \"on\"\n\ncondition:\n  - condition:\
  \ state\n    entity_id: !input vacuum_entity\n    state: \"cleaning\"\n\naction:\n\
  \  - service: vacuum.pause\n    target:\n      entity_id: !input vacuum_entity\n\
  \nmode: single\n```\n\n### How to use it:\n1. **Save the file**: Place the code\
  \ above in `/config/blueprints/automation/pause_vacuum_on_call.yaml`.\n2. **Reload\
  \ Blueprints**: Go to **Settings > Automations & Scenes > Blueprints** and click\
  \ \"Reload Blueprints\" or restart Home Assistant.\n3. **Create Automation**: \n\
  \   - Go to **Settings > Automations & Scenes**.\n   - Click **Create Automation**.\n\
  \   - Select **Use Blueprint**.\n   - Choose **Pause Vacuum on Phone Call**.\n \
  \  - Select your phone call binary sensor and your vacuum entity.\n   - Save the\
  \ automation."

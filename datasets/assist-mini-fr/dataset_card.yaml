name: assist-mini-fr
version: v1
language: fr
description: |-
  Traduction française du jeu de données assist-mini. Un jeu de données conçu
  pour exercer l'API LLM de Home Assistant. Les maisons de ce jeu de données
  ont été générées de manière synthétique à l'aide de gpt-3.5, puis simplifiées
  pour exercer des LLM plus petits.

  Il s'agit d'une variante du jeu de données `assist` qui teste beaucoup moins
  d'entités, d'appareils et de zones à la fois. Il est conçu étant donné les
  mauvaises performances des modèles locaux sur la base `assist` pour aider à
  des tâches encore plus petites afin d'améliorer la qualité.

  Les cas d'utilisation ne sont pas destinés à être très complexes ou compliqués
  et visent une fenêtre de contexte plus petite. Le nombre d'appareils/entités
  dans chaque test est intentionnellement petit (par exemple, généralement moins
  de 5 entités par test) pour se concentrer sur les capacités d'appel d'outils
  plutôt que sur la récupération de contexte.

  Ce jeu de données utilise le format `assist`. Voir la carte du jeu de données
  `assist` et le README pour plus de détails sur le format et les informations
  sur l'exécution de l'évaluation.


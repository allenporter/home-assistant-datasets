---
category: vacuum
tests:
  - sentences:
      - "D\xE9marre l'aspirateur dans le salon"
      - "D\xE9marre l'aspirateur Roborock Rez-de-Chauss\xE9e"
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning
  - sentences:
      - "Renvoie le Roborock Rez-de-Chauss\xE9e \xE0 la base"
      - "Renvoie l'aspirateur du salon \xE0 la base"
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning

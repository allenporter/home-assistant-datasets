---
category: cover
tests:
  - sentences:
      - "Ouvre le rideau connect\xE9"
      - "Ouvre le rideau connect\xE9 du salon"
      - Ouvre les rideaux du salon
    setup:
      cover.smart_curtain:
        state: closed
        attributes:
          current_position: 0
    expect_changes:
      cover.smart_curtain:
        state: open
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - "Ferme les rideaux connect\xE9s"
      - "Ferme le rideau connect\xE9 du salon"
      - Ferme les rideaux du salon
    setup:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.smart_curtain:
        state: closed
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - "R\xE8gle le rideau connect\xE9 \xE0 50%"
      - "R\xE8gle les rideaux du salon \xE0 50%"
    setup:
      cover.smart_curtain:
        state: closed
        attributes:
          current_position: 0
    expect_changes:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 50
    # Doesn't immediately open to 50% so we can't vet without a delay
    ignore_changes:
      cover.smart_curtain:
        - current_position

---
category: light
tests:
  - sentences:
      - "Allume la lumi\xE8re de la cuisine s'il te pla\xEEt"
    setup:
      light.kitchen_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.kitchen_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - "Allume la lumi\xE8re du salon"
    setup:
      light.living_room_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - "Allume la lumi\xE8re du jardin"
    setup:
      light.garden_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.garden_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - "\xC9teins la lumi\xE8re de la cuisine"
    setup:
      light.kitchen_light:
        state: "on"
        attributes:
          brightness: 100
    expect_changes:
      light.kitchen_light:
        state: "off"
        attributes:
          brightness: null
          color_mode: null
  - sentences:
      - "\xC9teins la lumi\xE8re de la salle \xE0 manger"
    setup:
      light.dining_room_light:
        state: "on"
        attributes:
          brightness: 100
    expect_changes:
      light.dining_room_light:
        state: "off"
        attributes:
          brightness: null
          color_mode: null

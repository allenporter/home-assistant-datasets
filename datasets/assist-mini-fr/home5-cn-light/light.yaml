---
category: light
tests:
  - sentences:
      - "R\xE8gle la lumi\xE8re du salon \xE0 50% de luminosit\xE9"
    setup:
      light.living_room_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 128
          color_mode: brightness
  - sentences:
      - "R\xE8gle la lumi\xE8re du salon \xE0 50% de luminosit\xE9"
    setup:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 255
          color_mode: brightness
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 128
          color_mode: brightness

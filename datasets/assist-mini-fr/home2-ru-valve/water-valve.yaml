---
category: valve
tests:
  - sentences:
      - ouvre la vanne du jardin avant
      - ouvre la vanne d'irrigation
    setup:
      valve.irrigation_valve:
        state: "closed"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
  - sentences:
      - ferme la vanne du jardin avant
      - ferme la vanne d'irrigation
    setup:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      valve.irrigation_valve:
        state: "closed"
        attributes:
          current_position: 0
  - sentences:
      - "r\xE8gle la vanne d'irrigation \xE0 50%"
    setup:
      valve.irrigation_valve:
        state: "open"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 50

---
category: light
tests:
  - sentences:
      - "Por favor, enciende la luz de la cocina"
    setup:
      light.kitchen_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.kitchen_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - "Enciende la luz del sal\xF3n"
    setup:
      light.living_room_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - "Enciende la luz del jard\xEDn trasero"
    setup:
      light.garden_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.garden_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - Apaga la luz de la cocina
    setup:
      light.kitchen_light:
        state: "on"
        attributes:
          brightness: 100
    expect_changes:
      light.kitchen_light:
        state: "off"
        attributes:
          brightness: null
          color_mode: null
  - sentences:
      - Apaga la luz del comedor
    setup:
      light.dining_room_light:
        state: "on"
        attributes:
          brightness: 100
    expect_changes:
      light.dining_room_light:
        state: "off"
        attributes:
          brightness: null
          color_mode: null

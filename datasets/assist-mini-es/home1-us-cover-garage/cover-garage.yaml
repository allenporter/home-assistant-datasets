---
category: cover
tests:
  - sentences:
      - Cierra la puerta del garaje
      - "Por favor, cierra la puerta del garaje"
    setup:
      cover.garage_door_opener:
        state: open
    expect_changes:
      cover.garage_door_opener:
        state: closed
    ignore_changes:
      cover.garage_door_opener:
        - current_position
  - sentences:
      - "Por favor, abre la puerta del garaje"
      - Abre la puerta del garaje
    setup:
      cover.garage_door_opener:
        state: closed
    expect_changes:
      cover.garage_door_opener:
        state: open
    ignore_changes:
      cover.garage_door_opener:
        - current_position

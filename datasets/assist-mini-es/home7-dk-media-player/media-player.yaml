---
category: media-player
tests:
  - sentences:
      - Pausa los altavoces exteriores
      - "Pausa la m\xFAsica de la terraza en la azotea"
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: paused
  - sentences:
      - Reanuda los altavoces exteriores
      - "Reanuda la m\xFAsica de la terraza en la azotea"
    setup:
      media_player.outdoor_speakers:
        state: paused
    expect_changes:
      media_player.outdoor_speakers:
        state: playing
  - sentences:
      - "Salta la canci\xF3n en los altavoces exteriores"
      - Pasa a la siguiente pista en los altavoces exteriores
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          media_track: 1
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          media_track: 2
  - sentences:
      - Pon el volumen de los altavoces exteriores al 50%
      - Baja el volumen al 50%
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.9
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.5
  - sentences:
      - Silencia los altavoces exteriores
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.6
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.0
  - sentences:
      - Apaga los altavoces exteriores
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: "off"
    ignore_changes:
      media_player.outdoor_speakers:
        - media_track
        - volume_level

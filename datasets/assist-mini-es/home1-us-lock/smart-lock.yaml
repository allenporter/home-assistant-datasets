---
category: lock
tests:
  - sentences:
      - Bloquea la cerradura inteligente
      - Bloquea la cerradura de la entrada
    setup:
      lock.smart_lock:
        state: unlocked
    expect_changes:
      lock.smart_lock:
        state: locked
  - sentences:
      - Desbloquea la cerradura inteligente
      - Desbloquea la cerradura de la entrada
    setup:
      lock.smart_lock:
        state: locked
    expect_changes:
      lock.smart_lock:
        state: unlocked

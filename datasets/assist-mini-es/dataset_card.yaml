---
name: assist-mini-es
version: v1
language: es
description: |-
  Traduccion al espanol del dataset assist-mini. Un dataset disenado para
  ejercitar la API LLM de Home Assistant. Los hogares de este dataset fueron
  generados sinteticamente usando gpt-3.5, y luego simplificados para
  ejercitar LLMs mas pequenos.

  Esta es una variacion del dataset `assist` que prueba muchas menos entidades,
  dispositivos y areas a la vez. Esta disenado dado el bajo rendimiento de los
  modelos locales en la linea base `assist` para ayudar con tareas aun mas
  pequenas en las que enfocarse para mejorar la calidad.

  Los casos de uso no pretenden ser muy complicados y estan orientados a una
  ventana de contexto mas pequena. El numero de dispositivos/entidades en cada
  prueba es intencionalmente pequeno (por ejemplo, normalmente menos de 5
  entidades por prueba) para enfocarse en las capacidades de llamada a
  herramientas en lugar de la recuperacion de contexto.

  Este dataset usa el formato `assist`. Consulte la tarjeta del dataset `assist`
  y el README para mas detalles sobre el formato e informacion sobre la
  ejecucion de la evaluacion.

urls:

---
category: valve
tests:
  - sentences:
      - "abre la v\xE1lvula del jard\xEDn delantero"
      - "abre la v\xE1lvula de riego"
    setup:
      valve.irrigation_valve:
        state: "closed"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
  - sentences:
      - "cierra la v\xE1lvula del jard\xEDn delantero"
      - "cierra la v\xE1lvula de riego"
    setup:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      valve.irrigation_valve:
        state: "closed"
        attributes:
          current_position: 0
  - sentences:
      - "pon la v\xE1lvula de riego al 50%"
    setup:
      valve.irrigation_valve:
        state: "open"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 50

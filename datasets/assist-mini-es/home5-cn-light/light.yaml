---
category: light
tests:
  - sentences:
      - "Pon la luz del sal\xF3n al 50% de brillo"
    setup:
      light.living_room_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 128
          color_mode: brightness
  - sentences:
      - "Pon la luz del sal\xF3n al 50% de brillo"
    setup:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 255
          color_mode: brightness
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 128
          color_mode: brightness

---
category: cover
tests:
  - sentences:
      - Ferme la porte du garage
    setup:
      cover.garage_door_opener:
        state: open
    expect_changes:
      cover.garage_door_opener:
        state: closed
    ignore_changes:
      cover.garage_door_opener:
        - current_position
  - sentences:
      - Ouvre la porte du garage s'il te plaît
      - Ouvre la porte du garage
    setup:
      cover.garage_door_opener:
        state: closed
    expect_changes:
      cover.garage_door_opener:
        state: open
    ignore_changes:
      cover.garage_door_opener:
        - current_position

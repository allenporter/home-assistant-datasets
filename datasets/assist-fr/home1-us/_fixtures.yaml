entities:
  - name: Lumière de la Cuisine
    id: light.kitchen_light
    area: kitchen
    device: kitchen_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Thermostat
    id: climate.thermostat
    area: kitchen
    device: thermostat
    attributes:
      unit_of_measurement: "\xB0C"
      supported_features:
        - climate.ClimateEntityFeature.FAN_MODE
        - climate.ClimateEntityFeature.TURN_ON
        - climate.ClimateEntityFeature.TURN_OFF
        - climate.ClimateEntityFeature.TARGET_TEMPERATURE_RANGE
      hvac_modes:
        - "off"
        - cool
        - heat
        - auto
      hvac_mode: "off"
      hvac_action: "off"
      current_temperature: 22
      target_temperature: 22
  - name: Température du Thermostat
    id: sensor.thermostat_temperature
    area: kitchen
    device: thermostat
    attributes:
      native_unit_of_measurement: "\xB0C"
      device_class: sensor.SensorDeviceClass.TEMPERATURE
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 22
  - name: Humidité du Thermostat
    id: sensor.thermostat_humidity
    area: kitchen
    device: thermostat
    attributes:
      native_unit_of_measurement: "%"
      device_class: sensor.SensorDeviceClass.HUMIDITY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 45
  - name: Lumière du Salon
    id: light.living_room_light
    area: living_room
    device: living_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Détecteur de Mouvement du Salon
    id: binary_sensor.living_room_motion_sensor
    area: living_room
    device: living_room_motion_sensor
    state: true
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.MOTION
  - name: Batterie du Détecteur de Mouvement du Salon
    id: binary_sensor.living_room_motion_sensor_battery
    area: living_room
    device: living_room_motion_sensor
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.BATTERY
  - name: Batterie du Détecteur de Mouvement du Salon
    id: sensor.living_room_motion_sensor_battery
    area: living_room
    device: living_room_motion_sensor
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"
  - name: Nest Hub
    id: media_player.nest_hub
    area: living_room
    device: nest_hub
    state: playing
    attributes:
      device_class: media_player.MediaPlayerDeviceClass.SPEAKER
      supported_features:
        - media_player.MediaPlayerEntityFeature.PLAY
        - media_player.MediaPlayerEntityFeature.PAUSE
        - media_player.MediaPlayerEntityFeature.STOP
        - media_player.MediaPlayerEntityFeature.VOLUME_STEP
        - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
        - media_player.MediaPlayerEntityFeature.VOLUME_SET
        - media_player.MediaPlayerEntityFeature.TURN_ON
        - media_player.MediaPlayerEntityFeature.TURN_OFF
        - media_player.MediaPlayerEntityFeature.NEXT_TRACK
        - media_player.MediaPlayerEntityFeature.PREVIOUS_TRACK
  - name: Roborock Rez-de-Chaussée
    id: vacuum.roborock_downstairs
    area: living_room
    device: roborock_downstairs
    state: docked
    attributes:
      supported_features:
        - vacuum.VacuumEntityFeature.START
        - vacuum.VacuumEntityFeature.STOP
        - vacuum.VacuumEntityFeature.STATE
        - vacuum.VacuumEntityFeature.PAUSE
        - vacuum.VacuumEntityFeature.RETURN_HOME
  - name: Lumière de la Salle de Jeux
    id: light.game_room_light
    area: game_room
    device: game_room_light
    attributes:
      supported_color_modes:
        - rgbw
      color_mode: rgbw
      rgbw_color:
        - 0
        - 0
        - 0
        - 0
  - name: Enceinte Connectée
    id: media_player.smart_speaker
    area: game_room
    device: smart_speaker
    state: playing
    attributes:
      device_class: media_player.MediaPlayerDeviceClass.SPEAKER
      supported_features:
        - media_player.MediaPlayerEntityFeature.PLAY
        - media_player.MediaPlayerEntityFeature.PAUSE
        - media_player.MediaPlayerEntityFeature.STOP
        - media_player.MediaPlayerEntityFeature.VOLUME_STEP
        - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
        - media_player.MediaPlayerEntityFeature.VOLUME_SET
        - media_player.MediaPlayerEntityFeature.TURN_ON
        - media_player.MediaPlayerEntityFeature.TURN_OFF
        - media_player.MediaPlayerEntityFeature.NEXT_TRACK
        - media_player.MediaPlayerEntityFeature.PREVIOUS_TRACK
  - name: Lumière du Jardin
    id: light.backyard_light
    area: backyard
    device: backyard_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Mouvement Caméra du Jardin
    id: binary_sensor.backyard_camera_motion
    area: backyard
    device: backyard_camera
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.MOTION
  - name: Personne Caméra du Jardin
    id: binary_sensor.backyard_camera_person
    area: backyard
    device: backyard_camera
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.OCCUPANCY
  - name: Son Caméra du Jardin
    id: binary_sensor.backyard_camera_sound
    area: backyard
    device: backyard_camera
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.SOUND
  - name: Serrure Connectée
    id: lock.smart_lock
    area: entry
    device: smart_lock
    state: locked
  - name: Serrure Connectée
    id: binary_sensor.smart_lock
    area: entry
    device: smart_lock
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.LOCK
  - name: Sabotage Serrure Connectée
    id: binary_sensor.smart_lock_tamper
    area: entry
    device: smart_lock
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.TAMPER
  - name: Batterie de la Serrure Connectée
    id: binary_sensor.smart_lock_battery
    area: entry
    device: smart_lock
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.BATTERY
  - name: Batterie de la Serrure Connectée
    id: sensor.smart_lock_battery
    area: entry
    device: smart_lock
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"
  - name: Ouvre-porte de Garage
    id: cover.garage_door_opener
    area: garage
    device: garage_door_opener
    state: false
    attributes:
      device_class: cover.CoverDeviceClass.GARAGE
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
  - name: Ouvre-porte de Garage
    id: light.garage_door_opener
    area: garage
    device: garage_door_opener
    state: false
    attributes:
      supported_color_modes:
        - onoff
      color_mode:
        - onoff
  - name: Serrure de la Porte Arrière
    id: lock.rear_door_lock
    area: garage
    device: rear_door_lock
    state: locked
  - name: Lumière de la Chambre 1
    id: light.bedroom_1_light
    area: bedroom_1
    device: bedroom_1_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Lumière de la Chambre 2
    id: light.bedroom_2_light
    area: bedroom_2
    device: bedroom_2_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Lumière de la Chambre 3
    id: light.bedroom_3_light
    area: bedroom_3
    device: bedroom_3_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Lumière de la Chambre Principale
    id: light.master_bedroom_light
    area: master_bedroom
    device: master_bedroom_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Stores Connectés de la Chambre Principale
    id: cover.master_bedroom_smart_blinds
    area: master_bedroom
    device: master_bedroom_smart_blinds
    state: false
    attributes:
      device_class: cover.CoverDeviceClass.BLIND
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
        - cover.CoverEntityFeature.SET_POSITION
  - name: Batterie des Stores Connectés de la Chambre Principale
    id: sensor.master_bedroom_smart_blinds_battery
    area: master_bedroom
    device: master_bedroom_smart_blinds
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"

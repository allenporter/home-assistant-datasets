---
category: vacuum
tests:
  - sentences:
      - Démarre le Roborock Rez-de-Chaussée
      - Démarre l'aspirateur Roborock Rez-de-Chaussée
      - Démarre le Roborock
      - Lance l'aspirateur
      - Aspire le rez-de-chaussée
      - Nettoie le salon
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning
  - sentences:
      - Démarre l'aspirateur
      - Lance le nettoyage s'il te plaît
      - Allume l'aspirateur
    context_device: nest_hub
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning

  - sentences:
      - Renvoie le Roborock Rez-de-Chaussée à sa base
      - Roborock Rez-de-Chaussée retourne à la base
      - Roborock retourne à la base
      - Aspirateur retourne à la base
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning
  - sentences:
      - Arrête le Roborock Rez-de-Chaussée
      - Arrête l'aspirateur
      - Arrête de passer l'aspirateur
      - Arrête l'aspirateur du rez-de-chaussée
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning

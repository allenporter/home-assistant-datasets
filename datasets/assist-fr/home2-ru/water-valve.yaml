---
category: valve
tests:
  - sentences:
      - Ouvre la vanne du jardin avant
      - Ouvre la vanne d'irrigation
      - Allume l'eau dans le jardin avant
      - Arrose le jardin avant
      - Arrose le jardin
    setup:
      valve.irrigation_valve:
        state: "closed"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
  - sentences:
      - Ferme la vanne du jardin avant
      - Ferme la vanne d'irrigation
      - Coupe l'eau dans le jardin avant
    setup:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      valve.irrigation_valve:
        state: "closed"
        attributes:
          current_position: 0
  - sentences:
      - Règle la vanne d'irrigation à 50%
    setup:
      valve.irrigation_valve:
        state: "open"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 50

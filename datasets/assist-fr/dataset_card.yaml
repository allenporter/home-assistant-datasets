language: fr
description: |-
  Traduction française du jeu de données assist. Un jeu de données conçu pour
  exercer l'API LLM de Home Assistant. Les maisons de ce jeu de données ont été
  générées de manière synthétique à l'aide de gpt-3.5, puis manuellement
  organisées pour exercer les intents Home Assistant pour le contrôle des
  appareils. Les phrases ont été rendues intentionnellement plus difficiles que
  le NLP assistant existant pour démontrer les capacités de raisonnement des
  modèles plus grands.

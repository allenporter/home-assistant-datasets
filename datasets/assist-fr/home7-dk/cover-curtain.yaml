---
category: cover
tests:
  - sentences:
      - Ouvre le rideau connecté
      - Ouvre le rideau connecté du salon
      - Ouvre les rideaux du salon
    setup:
      cover.smart_curtain:
        state: closed
    expect_changes:
      cover.smart_curtain:
        state: open
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Ferme les rideaux connectés
      - Ferme le rideau du salon
      - Ferme les rideaux
    setup:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.smart_curtain:
        state: closed
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Règle le rideau connecté à 50%
      - Règle les rideaux du salon à 50%
    setup:
      cover.smart_curtain:
        state: closed
    expect_changes:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    # Doesn't immediately open to 50% so we can't vet without a delay
    ignore_changes:
      cover.smart_curtain:
        - current_position

---
category: media-player
tests:
  - sentences:
      - Mets en pause les enceintes extérieures
      - Mets la musique en pause
      - Mets en pause la musique dehors
      - Mets en pause la musique de la terrasse sur le toit
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: paused
  - sentences:
      - Reprends les enceintes extérieures
      - Reprends la lecture de la musique
      - Relance les enceintes extérieures
      - Relance la musique de la terrasse sur le toit
    setup:
      media_player.outdoor_speakers:
        state: paused
    expect_changes:
      media_player.outdoor_speakers:
        state: playing
  - sentences:
      - Passe la chanson sur les enceintes extérieures
      - Passe à la piste suivante sur les enceintes extérieures
      - Chanson suivante
      - Passe à la piste suivante
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          media_track: 1
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          media_track: 2
  - sentences:
      - Règle le volume des enceintes extérieures à 50%
      - Baisse le volume à 50%
      # Difficile à suivre
      # - Baisse la musique
      # - Baisse un peu la musique s'il te plaît
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.9
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.5
  - sentences:
      - Coupe le son des enceintes extérieures
      - Coupe le son de la musique
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.6
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.0
  - sentences:
      - Éteins les enceintes extérieures
      - Éteins la musique
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: "off"
    ignore_changes:
      media_player.outdoor_speakers:
        - media_track
        - volume_level

---
name: automations-fr
version: v0
language: fr
description: |-
  Un jeu de donnees pour evaluer la generation d'automatisations. Les maisons
  de ce jeu de donnees ont ete generees synthetiquement a l'aide de gpt-3.5. Ce
  jeu de donnees est en cours de developpement et ne contient que quelques exemples
  initiaux. Chaque test cree une maison synthetique et configure les entites avec un
  etat particulier, puis demande une automatisation pour un ensemble specifique
  d'appareils.

  Le test charge une maison synthetique et execute pytest avec Home Assistant pour
  parcourir des scenarios qui devraient declencher l'automatisation. Il attribue
  egalement des points pour l'obtention des entrees correctes et chaque test met en
  oeuvre differents scenarios qui s'ajoutent au score global. Les differents scenarios
  ne sont pas ponderes.
urls:

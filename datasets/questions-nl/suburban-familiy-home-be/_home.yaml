# thought: The house is in Belgium, which has a temperate climate, suggesting a need for both heating and cooling.
# thought: The family home has many rooms suggesting a need for several lights, smart plugs for appliances, and more than one thermostat.
# thought: The backyard with a vegetable garden suggests a need for smart sprinklers.
# thought: The garage with two cars suggests a need for a smart garage door opener.
---
name: Suburbane Gezinswoning
country_code: BE
location: Leuven, België
type: Eengezinswoning
amenities:
  - 4 slaapkamers
  - 2,5 badkamers
  - Familiekamer
  - Formele eetkamer
  - Achtertuin met een moestuin
  - Aangebouwde garage voor twee auto's
areas:
  - Keuken
  - Woonkamer
  - Familiekamer
  - Eetkamer
  - Achtertuin
  - Garage
  - Hoofdslaapkamer
  - Kinderkamer 1
  - Kinderkamer 2
  - Logeerkamer
  - Voortuin
devices:
  Keuken:
    - name: Keukenlamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Keukenstekker
      device_type: smart-plug
      device_info:
        model: Smart Plug
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Keukenkraan
      device_type: water-valve
      device_info:
        model: Smart Water Valve
        manufacturer: Moen
        sw_version: 1.0.0
    - name: Koelkast
      device_type: sensor
      device_info:
        model: Smart Fridge
        manufacturer: Samsung
        sw_version: 1.1.1
      attributes:
        - unit_of_measure: "\xB0C"
  Woonkamer:
    - name: Woonkamerlamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Slimme Speaker
      device_type: smart-speaker
      device_info:
        model: Echo Dot
        manufacturer: Amazon
        sw_version: 4th Gen
    - name: Televisie
      device_type: smart-tv
      device_info:
        model: Samsung 4K TV
        manufacturer: Samsung
        sw_version: 1.0.0
  Familiekamer:
    - name: Familiekamerlamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Eetkamer:
    - name: Eetkamerlamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Achtertuin:
    - name: Achtertuinlamp
      device_type: light
      device_info:
        model: Smart Outdoor Light
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Sproeiers
      device_type: smart-sprinkler
      device_info:
        model: Smart Sprinkler System
        manufacturer: Rachio
        sw_version: 1.0.0
  Garage:
    - name: Garagedeur
      device_type: garage-door
      device_info:
        model: Smart Garage Door Opener
        manufacturer: Chamberlain
        sw_version: 1.0.0
    - name: Garagelamp
      device_type: light
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Hoofdslaapkamer:
    - name: Hoofdslaapkamerlamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Hoofdslaapkamer-Thermostaat
      device_type: hvac
      device_info:
        model: Nest Thermostat
        manufacturer: Nest
        sw_version: 1.0.0
      attributes:
        - unit_of_measure: "\xB0C"
  Kinderkamer 1:
    - name: Kinderkamer 1 Lamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Kinderkamer 2:
    - name: Kinderkamer 2 Lamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Logeerkamer:
    - name: Logeerkamerlamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Logeerkamer-Thermostaat
      device_type: hvac
      device_info:
        model: Nest Thermostat
        manufacturer: Nest
        sw_version: 1.0.0
      attributes:
        - unit_of_measure: "\xB0C"
  Voortuin:
    - name: Voortuinlamp
      device_type: light
      device_info:
        model: Smart Outdoor Light
        manufacturer: Philips
        sw_version: 1.2.3

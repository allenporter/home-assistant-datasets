---
category:
  - valve
  - question
tests:
  - sentences:
      - Staan de sproeiers aan?
    setup:
      valve.sprinklers:
        state: "open"
    expect_response:
      - "yes"
      - "on"
      - open

  - sentences:
      - Vertel me alsjeblieft, staan de sproeiers aan?
    setup:
      valve.sprinklers:
        state: "closed"
    expect_response:
      - "no"
      - "off"
      - closed

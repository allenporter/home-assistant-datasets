---
category:
  - switch
  - question
tests:
  - sentences:
      - Staat de keukenstekker aan?
    setup:
      switch.kitchen_appliance_plug:
        state: "on"
    expect_response:
      - "yes"
      - "on"

  - sentences:
      - Staat de stekker in de keuken aan?
    setup:
      switch.kitchen_appliance_plug:
        state: "off"
    expect_response:
      - "no"
      - "off"

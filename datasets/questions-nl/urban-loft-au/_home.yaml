# thought: Since the loft apartment is in a city center, we can suggest a modern and minimalist design for the smart home devices.
# thought: Given the open-concept living space with exposed brick walls, we can suggest a smart lighting system that highlights the architectural details.
# thought: There are no device-types for a smart speaker so we will omit those, but there are other appropriate devices like a motion sensor
---
name: Stedelijke Loft
country_code: AU
location: Stadscentrum in Melbourne
type: Loft-appartement
amenities:
  - 1 slaapkamer
  - 1 badkamer
  - Open woonruimte met bakstenen muren
  - Moderne keuken met roestvrijstalen apparatuur
  - Frans balkon met uitzicht op de stad
  - Gedeeld dakterras met een barbecueruimte
areas:
  - Woonkamer
  - Slaapkamer
  - Balkon
  - Keuken
  - Dakterras
devices:
  Woonkamer:
    - name: Woonkamer
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
    - name: Samsung
      device_type: smart-tv
      device_info:
        model: QN43Q60A
        manufacturer: Samsung
        sw_version: 1600.1
  Slaapkamer:
    - name: Slaapkamerlamp
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
  Balkon:
    - name: Balkonlamp
      device_type: light
      device_info:
        model: Tapo Smart Wi-fi Light Switch
        manufacturer: TP-Link
        sw_version: 1.2.3
  Keuken:
    - name: Keukenlamp
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
  Dakterras:
    - name: Bewegingssensor
      device_type: motion-sensor
      device_info:
        model: Outdoor Motion Sensor
        manufacturer: Aqara
        sw_version: 1.4.4
    - name: Terraslamp
      device_type: light
      device_info:
        model: Tapo Smart Wi-fi Light Switch
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Slimme Stekker
      device_type: smart-plug
      device_info:
        model: Kasa Smart Plug Mini
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Weerdienst
      device_type: weather-service
      device_info:
        model: Weather Underground
        manufacturer: Weather Underground
        sw_version: 2.2.2
services:
  - name: Taken
    device_type: todo-list
  - name: Persoonlijk
    device_type: calendar

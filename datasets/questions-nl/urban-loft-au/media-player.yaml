      media_player.samsung:
        state: playing
    expect_response:
      - playing
  - sentences:
      - Is de mediaspeler in de woonkamer aan het afspelen, gepauzeerd of gestopt?
    setup:
      media_player.samsung:
        state: paused
    expect_response:
      - paused

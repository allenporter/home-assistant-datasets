---
category:
  - weather
  - question
tests:
  - sentences:
      - Wat is de temperatuur buiten?
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "30"
          native_temperature_unit: "\xB0C"
          condition: "sunny"
    expect_response:
      - 30

  - sentences:
      - Is het vandaag zonnig of bewolkt?
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "62"
          native_temperature_unit: "\xB0F"
          condition: "cloudy"
    expect_response:
      - cloudy


  - sentences:
      - Wordt het weer vandaag zonnig of bewolkt?
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "75"
          native_temperature_unit: "\xB0F"
          condition: "sunny"
    expect_response:
      - sunny

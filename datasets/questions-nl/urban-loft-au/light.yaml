---
category:
  - light
  - question
tests:
  - sentences:
      - Hoeveel lampen staan er momenteel aan?
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
      light.balcony_light:
        state: "on"
    expect_response:
      - "2"
      - twee
      # We don't check for both names and assume if either is present that it worked
      - slaapkamer
      - balkon

  - sentences:
      - Is de slaapkamerlamp aan?
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
    expect_response:
      - "yes"
      - "on"

  - sentences:
      - Is de slaapkamerlamp uit?
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
    expect_response:
      - "no"
      - "on"

  - sentences:
      - Is de slaapkamerlamp aan? Antwoord alsjeblieft met "ja" of "nee".
    setup:
      light.bedroom_light:
        state: "off"
    expect_response:
      - "no"
      - "off"

  - sentences:
      - Is de slaapkamerlamp uit? Antwoord alsjeblieft met "ja" of "nee".
    setup:
      light.bedroom_light:
        state: "off"
    expect_response:
      - "yes"
      - "off"

# sensor.guest_room_thermostat_temperature
# climate.guest_room_thermostat
---
category:
  - climate
  - question
tests:
  - sentences:
      - Wenn die Temperatur im Gästezimmer über 23 liegt, stelle die Zieltemperatur auf 22
    setup:
      sensor.guest_room_thermostat_temperature:
        attributes:
          native_value: 25
      climate.guest_room_thermostat:
        state: "cool"
        attributes:
          hvac_mode: "cool"
          current_temperature: 25
          target_temperature: 26
    expect_changes:
      climate.guest_room_thermostat:
        attributes:
          temperature: 22.0

  # No change is expected since the temp is below the target
  - sentences:
      - Stelle die Zieltemperatur im Gästezimmer auf 22, wenn sie über 23 liegt
    setup:
      sensor.guest_room_thermostat_temperature:
        attributes:
          native_value: 21
      climate.guest_room_thermostat:
        state: "cool"
        attributes:
          hvac_mode: "cool"
          current_temperature: 21
          target_temperature: 21
    expect_changes:
      # No change
      climate.guest_room_thermostat:
        state: "cool"

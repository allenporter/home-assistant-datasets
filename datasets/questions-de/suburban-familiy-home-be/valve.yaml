---
category:
  - valve
  - question
tests:
  - sentences:
      - Ist der Rasensprenger an?
    setup:
      valve.sprinklers:
        state: "open"
    expect_response:
      - "yes"
      - "on"
      - open

  - sentences:
      - Sag mir bitte, ist der Rasensprenger an?
    setup:
      valve.sprinklers:
        state: "closed"
    expect_response:
      - "no"
      - "off"
      - closed

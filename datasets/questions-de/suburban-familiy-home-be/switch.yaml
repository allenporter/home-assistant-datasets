---
category:
  - switch
  - question
tests:
  - sentences:
      - Ist der Küchenstecker an?
    setup:
      switch.kitchen_appliance_plug:
        state: "on"
    expect_response:
      - "yes"
      - "on"

  - sentences:
      - Ist der Stecker in der Küche an?
    setup:
      switch.kitchen_appliance_plug:
        state: "off"
    expect_response:
      - "no"
      - "off"

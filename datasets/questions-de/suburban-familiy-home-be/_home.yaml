# thought: The house is in Belgium, which has a temperate climate, suggesting a need for both heating and cooling.
# thought: The family home has many rooms suggesting a need for several lights, smart plugs for appliances, and more than one thermostat.
# thought: The backyard with a vegetable garden suggests a need for smart sprinklers.
# thought: The garage with two cars suggests a need for a smart garage door opener.
---
name: Vorstädtisches Einfamilienhaus
country_code: BE
location: Leuven, Belgien
type: Einfamilienhaus
amenities:
  - 4 Schlafzimmer
  - 2,5 Badezimmer
  - Familienzimmer
  - Formelles Esszimmer
  - Garten mit Gemüsebeet
  - Angebaute Doppelgarage
areas:
  - Küche
  - Wohnzimmer
  - Familienzimmer
  - Esszimmer
  - Garten
  - Garage
  - Hauptschlafzimmer
  - Kinderzimmer 1
  - Kinderzimmer 2
  - Gästezimmer
  - Vorgarten
devices:
  Küche:
    - name: Küchenlampe
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Küchengerätestecker
      device_type: smart-plug
      device_info:
        model: Smart Plug
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Küchenspüle
      device_type: water-valve
      device_info:
        model: Smart Water Valve
        manufacturer: Moen
        sw_version: 1.0.0
    - name: Kühlschrank
      device_type: sensor
      device_info:
        model: Smart Fridge
        manufacturer: Samsung
        sw_version: 1.1.1
      attributes:
        - unit_of_measure: "\xB0C"
  Wohnzimmer:
    - name: Wohnzimmerlampe
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Smarter Lautsprecher
      device_type: smart-speaker
      device_info:
        model: Echo Dot
        manufacturer: Amazon
        sw_version: 4th Gen
    - name: Fernseher
      device_type: smart-tv
      device_info:
        model: Samsung 4K TV
        manufacturer: Samsung
        sw_version: 1.0.0
  Familienzimmer:
    - name: Familienzimmerlampe
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Esszimmer:
    - name: Esszimmerlampe
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Garten:
    - name: Gartenlampe
      device_type: light
      device_info:
        model: Smart Outdoor Light
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Rasensprenger
      device_type: smart-sprinkler
      device_info:
        model: Smart Sprinkler System
        manufacturer: Rachio
        sw_version: 1.0.0
  Garage:
    - name: Garagentor
      device_type: garage-door
      device_info:
        model: Smart Garage Door Opener
        manufacturer: Chamberlain
        sw_version: 1.0.0
    - name: Garagenlampe
      device_type: light
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Hauptschlafzimmer:
    - name: Hauptschlafzimmerlampe
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Hauptschlafzimmer-Thermostat
      device_type: hvac
      device_info:
        model: Nest Thermostat
        manufacturer: Nest
        sw_version: 1.0.0
      attributes:
        - unit_of_measure: "\xB0C"
  Kinderzimmer 1:
    - name: Kinderzimmer-1-Lampe
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Kinderzimmer 2:
    - name: Kinderzimmer-2-Lampe
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Gästezimmer:
    - name: Gästezimmerlampe
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Gästezimmer-Thermostat
      device_type: hvac
      device_info:
        model: Nest Thermostat
        manufacturer: Nest
        sw_version: 1.0.0
      attributes:
        - unit_of_measure: "\xB0C"
  Vorgarten:
    - name: Vorgartenlampe
      device_type: light
      device_info:
        model: Smart Outdoor Light
        manufacturer: Philips
        sw_version: 1.2.3

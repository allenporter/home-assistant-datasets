---
category:
  - light
  - question
tests:
  - sentences:
      - Wie viele Lampen sind gerade eingeschaltet?
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
      light.balcony_light:
        state: "on"
    expect_response:
      - "2"
      - zwei
      # We don't check for both names and assume if either is present that it worked
      - Schlafzimmer
      - Balkon

  - sentences:
      - Ist die Schlafzimmerlampe an?
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
    expect_response:
      - "yes"
      - "on"

  - sentences:
      - Ist die Schlafzimmerlampe aus?
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
    expect_response:
      - "no"
      - "on"

  - sentences:
      - Ist die Schlafzimmerlampe an? Bitte antworte mit "ja" oder "nein".
    setup:
      light.bedroom_light:
        state: "off"
    expect_response:
      - "no"
      - "off"

  - sentences:
      - Ist die Schlafzimmerlampe aus? Bitte antworte mit "ja" oder "nein".
    setup:
      light.bedroom_light:
        state: "off"
    expect_response:
      - "yes"
      - "off"

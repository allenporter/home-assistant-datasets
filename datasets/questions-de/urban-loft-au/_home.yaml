# thought: Since the loft apartment is in a city center, we can suggest a modern and minimalist design for the smart home devices.
# thought: Given the open-concept living space with exposed brick walls, we can suggest a smart lighting system that highlights the architectural details.
# thought: There are no device-types for a smart speaker so we will omit those, but there are other appropriate devices like a motion sensor
---
name: Urbanes Loft
country_code: AU
location: Stadtzentrum von Melbourne
type: Loft-Wohnung
amenities:
  - 1 Schlafzimmer
  - 1 Badezimmer
  - Offener Wohnbereich mit Sichtmauerwerk
  - Moderne Küche mit Edelstahlgeräten
  - Französischer Balkon mit Stadtblick
  - Gemeinschaftliche Dachterrasse mit Grillbereich
areas:
  - Wohnzimmer
  - Schlafzimmer
  - Balkon
  - Küche
  - Dachterrasse
devices:
  Wohnzimmer:
    - name: Wohnzimmer
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
    - name: Samsung
      device_type: smart-tv
      device_info:
        model: QN43Q60A
        manufacturer: Samsung
        sw_version: 1600.1
  Schlafzimmer:
    - name: Schlafzimmerlampe
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
  Balkon:
    - name: Balkonlampe
      device_type: light
      device_info:
        model: Tapo Smart Wi-fi Light Switch
        manufacturer: TP-Link
        sw_version: 1.2.3
  Küche:
    - name: Küchenlampe
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
  Dachterrasse:
    - name: Bewegungsmelder
      device_type: motion-sensor
      device_info:
        model: Outdoor Motion Sensor
        manufacturer: Aqara
        sw_version: 1.4.4
    - name: Terrassenlampe
      device_type: light
      device_info:
        model: Tapo Smart Wi-fi Light Switch
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Smarte Steckdose
      device_type: smart-plug
      device_info:
        model: Kasa Smart Plug Mini
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Wetterdienst
      device_type: weather-service
      device_info:
        model: Weather Underground
        manufacturer: Weather Underground
        sw_version: 2.2.2
services:
  - name: Aufgaben
    device_type: todo-list
  - name: Persönlich
    device_type: calendar

---
areas:
  - name: Wohnzimmer
    id: living_room
  - name: Schlafzimmer
    id: bedroom
  - name: Balkon
    id: balcony
  - name: Küche
    id: kitchen
  - name: Dachterrasse
    id: rooftop_terrace
devices:
  - name: Wohnzimmer
    id: living_room
    area: living_room
    info:
      model: Hue White and Color Ambiance
      manufacturer: Philips
      sw_version: 2.20.1
  - name: Samsung
    id: samsung
    area: living_room
    info:
      model: QN43Q60A
      manufacturer: Samsung
      sw_version: "1600.1"
  - name: Schlafzimmerlampe
    id: bedroom_light
    area: bedroom
    info:
      model: Hue White and Color Ambiance
      manufacturer: Philips
      sw_version: 2.20.1
  - name: Balkonlampe
    id: balcony_light
    area: balcony
    info:
      model: Tapo Smart Wi-fi Light Switch
      manufacturer: TP-Link
      sw_version: 1.2.3
  - name: Küchenlampe
    id: kitchen_light
    area: kitchen
    info:
      model: Hue White and Color Ambiance
      manufacturer: Philips
      sw_version: 2.20.1
  - name: Bewegungsmelder
    id: motion_sensor
    area: rooftop_terrace
    info:
      model: Outdoor Motion Sensor
      manufacturer: Aqara
      sw_version: 1.4.4
  - name: Terrassenlampe
    id: terrace_light
    area: rooftop_terrace
    info:
      model: Tapo Smart Wi-fi Light Switch
      manufacturer: TP-Link
      sw_version: 1.2.3
  - name: Smarte Steckdose
    id: smart_plug
    area: rooftop_terrace
    info:
      model: Kasa Smart Plug Mini
      manufacturer: TP-Link
      sw_version: 1.2.3
  - name: Wetterdienst
    id: weather_service
    area: rooftop_terrace
    info:
      model: Weather Underground
      manufacturer: Weather Underground
      sw_version: 2.2.2
  - name: Aufgaben
    id: tasks
  - name: Persönlich
    id: personal
entities:
  - name: Wohnzimmer
    id: light.living_room
    area: living_room
    device: living_room
    state: "off"
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 0
  - name: Samsung
    id: media_player.samsung
    area: living_room
    device: samsung
    state: playing
    attributes:
      device_class: media_player.MediaPlayerDeviceClass.TV
      supported_features:
        - media_player.MediaPlayerEntityFeature.PAUSE
        - media_player.MediaPlayerEntityFeature.VOLUME_STEP
        - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
        - media_player.MediaPlayerEntityFeature.VOLUME_SET
        - media_player.MediaPlayerEntityFeature.TURN_ON
        - media_player.MediaPlayerEntityFeature.TURN_OFF
  - name: Schlafzimmerlampe
    id: light.bedroom_light
    area: bedroom
    device: bedroom_light
    state: "off"
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 0
  - name: Balkonlampe
    id: light.balcony_light
    area: balcony
    device: balcony_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Küchenlampe
    id: light.kitchen_light
    area: kitchen
    device: kitchen_light
    state: "off"
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 0
  - name: Bewegungsmelder
    id: binary_sensor.motion_sensor
    area: rooftop_terrace
    device: motion_sensor
    state: true
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.MOTION
  - name: Bewegungsmelder Batterie
    id: binary_sensor.motion_sensor_battery
    area: rooftop_terrace
    device: motion_sensor
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.BATTERY
  - name: Bewegungsmelder Batterie
    id: sensor.motion_sensor_battery
    area: rooftop_terrace
    device: motion_sensor
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"
  - name: Terrassenlampe
    id: light.terrace_light
    area: rooftop_terrace
    device: terrace_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Smarte Steckdose Energie
    id: sensor.smart_plug_energy
    area: rooftop_terrace
    device: smart_plug
    state: "1"
    attributes:
      device_class: sensor.SensorDeviceClass.ENERGY
      state_class: sensor.SensorStateClass.TOTAL_INCREASING
      native_unit_of_measurement: kWh
  - name: Smarte Steckdose
    id: switch.smart_plug
    area: rooftop_terrace
    device: smart_plug
    state: true
    attributes:
      device_class: switch.SwitchDeviceClass.OUTLET
  - name: Wetterdienst
    id: weather.weather_service
    area: rooftop_terrace
    device: weather_service
    attributes:
      native_temperature_unit: "\xB0F"
      native_wind_speed_unit: mph
      condition: sunny
      native_temperature: 72
      humidity: 60
      native_wind_speed: 5
  - name: Aufgaben
    id: todo.tasks
    device: tasks
    attributes:
      supported_features:
        - todo.TodoListEntityFeature.CREATE_TODO_ITEM
        - todo.TodoListEntityFeature.DELETE_TODO_ITEM
      todo_items: []
  - name: Persönlich
    id: calendar.personal
    device: personal
    attributes:
      supported_features:
        - calendar.CalendarEntityFeature.CREATE_EVENT
        - calendar.CalendarEntityFeature.DELETE_EVENT
        - calendar.CalendarEntityFeature.UPDATE_EVENT

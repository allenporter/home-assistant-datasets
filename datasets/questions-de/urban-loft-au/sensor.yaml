---
category:
  - sensor
  - question
tests:
  - sentences:
      - Wie hoch ist der Batteriestand des Bewegungsmelders?
    setup:
      sensor.motion_sensor_battery:
        state: "55"
    expect_response:
      - 55%
      - 55 Prozent
  - sentences:
      - Wie ist der Batteriestand des Bewegungsmelders?
    setup:
      sensor.motion_sensor_battery:
        state: "13"
    expect_response:
      - 13%
      - 13 Prozent

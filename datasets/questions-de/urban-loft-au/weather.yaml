---
category:
  - weather
  - question
tests:
  - sentences:
      - Wie ist die Temperatur draußen?
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "30"
          native_temperature_unit: °C
          condition: "sunny"
    expect_response:
      - 30

  - sentences:
      - Ist es heute sonnig oder bewölkt?
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "62"
          native_temperature_unit: °F
          condition: "cloudy"
    expect_response:
      - cloudy

  - sentences:
      - Wird das Wetter heute sonnig oder bewölkt?
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "75"
          native_temperature_unit: °F
          condition: "sunny"
    expect_response:
      - sunny

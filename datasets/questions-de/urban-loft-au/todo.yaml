---
category:
  - todo
  - question
tests:
  - sentences:
      - Wie viele Einträge stehen auf meiner Aufgabenliste?
    setup:
      todo.tasks:
        attributes:
          todo_items:
            - summary: Call Liza
              status: needs_action
            - summary: Repair the terrace light fixture
              status: needs_action
    expect_response:
      - "2"

  - sentences:
      - Wen soll ich laut meiner Aufgabenliste anrufen?
      - Wen muss ich anrufen?
    setup:
      todo.tasks:
        attributes:
          todo_items:
            - summary: Call Liza
              status: needs_action
            - summary: Repair the terrace light fixture
              status: needs_action
    expect_response:
      - Liza

  - sentences:
      - Welche Hausarbeiten muss ich noch erledigen?
    setup:
      todo.tasks:
        attributes:
          todo_items:
            - summary: Call Liza
              status: needs_action
            - summary: Repair the terrace light fixture
              status: needs_action
    expect_response:
      - terrace light

  - sentences:
      - Was steht auf meiner Aufgabenliste, das ich im Supermarkt kaufen soll?
    setup:
      todo.tasks:
        attributes:
          todo_items:
            - summary: Buy salad
              status: needs_action
            - summary: Repair the terrace light fixture
              status: needs_action
    expect_response:
      - salad

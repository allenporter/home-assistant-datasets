---
category: valve
tests:
  - sentences:
      - "règle la vanne principale à 100"
      - "augmente la position de la vanne principale à 100"
      - "ouvre la vanne principale à 100"
    setup:
      valve.main_valve:
        state: "closed"
        attributes:
          current_position: 0
    expect_changes:
      valve.main_valve:
        state: "open"
        attributes:
          current_position: 100

  # Éteindre toutes les lumières d'une zone
  - sentences:
      - "éteins toutes les lumières de la cuisine"
      - "éteins toutes les lumières dans la cuisine"
      - "éteins la lumière de la cuisine"
      - "éteins la lumière dans la cuisine"
      - "éteins les lumières de la cuisine"

      - "éteins les lumières dans la cuisine"
      - "coupe les lumières dans la cuisine"
      - "coupe l'éclairage dans la cuisine"
      - "désactive les lumières de la cuisine"
      - "désactive l'éclairage de la cuisine"
      - "coupe toutes les lumières dans la cuisine"
      - "lumières de la cuisine éteintes"
      - "éteins l'éclairage dans la cuisine"
      - "éclairage de la cuisine éteint"
      - "désactive les lumières dans la cuisine"
    setup:
      light.kitchen_countertop:
        state: "on"
      light.kitchen_ceiling:
        state: "off"
      light.kitchen_cabinets:
        state: "on"
    expect_changes:
      light.kitchen_countertop:
        state: "off"
      light.kitchen_ceiling:
        state: "off"
      light.kitchen_cabinets:
        state: "off"
    ignore_changes:
      light.kitchen_countertop:
        - color_mode
      light.kitchen_ceiling:
        - color_mode
      light.kitchen_cabinets:
        - color_mode

  - name: "Consommation de la pompe à eau"
    id: "sensor.water_pump_usage"
    state: "5987"
    attributes:
      device_class: water
      unit_of_measurement: "L"

  - name: "Poids du capteur de lit"
    id: "sensor.bed_sensor_weight"
    state: "87"
    attributes:
      device_class: weight
      unit_of_measurement: "kg"

  - name: "Mistral"
    id: "sensor.mistral_speed"
    state: "33"
    attributes:
      device_class: wind_speed
      unit_of_measurement: "km/h"

  - name: "Londres"
    id: "weather.london"
    state: "rainy"
    attributes:
      temperature: "47"
      temperature_unit: "°F"

  - name: "Los Angeles"
    id: "weather.los_angeles"
    state: "clear"
    attributes:
      temperature: "76"
      temperature_unit: "°F"


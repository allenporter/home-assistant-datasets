      device_class: nitrous_oxide
      unit_of_measurement: "µg/m³"

  - name: "Capteur d'ozone du salon"
    id: "sensor.living_room_ozone"
    state: "50"
    attributes:
      device_class: ozone
      unit_of_measurement: "µg/m³"

  - name: "Capteur PM1 du salon"
    id: "sensor.living_room_pm1"
    state: "50"
    attributes:
      device_class: pm1
      unit_of_measurement: "µg/m³"

  - name: "Capteur PM2.5 du salon"
    id: "sensor.living_room_pm25"
    state: "50"
    attributes:
      device_class: pm25
      unit_of_measurement: "µg/m³"

  - name: "Capteur PM10 du salon"
    id: "sensor.living_room_pm10"
    state: "50"
    attributes:
      device_class: pm10
      unit_of_measurement: "µg/m³"

  - name: "Facteur de puissance de la prise murale"
    id: "sensor.wall_plug_power_factor"
    state: "2"
    attributes:
      device_class: power_factor

  - name: "Puissance de la climatisation"
    id: "sensor.aircon_power"
    state: "380"
    attributes:
      device_class: power
      unit_of_measurement: "W"

  - name: "Pluviomètre extérieur"
    id: "sensor.rain_sensor_total"
    state: "29"
    attributes:
      device_class: precipitation
      unit_of_measurement: "mm"

  - name: "Pluviomètre extérieur"
    id: "sensor.rain_sensor_intensity"
    state: "144"
    attributes:
      device_class: precipitation_intensity
      unit_of_measurement: "mm/h"

  - name: "Pression des pneus"
    id: "sensor.tyre_pressure"
    state: "2.1"
    attributes:
      device_class: pressure
      unit_of_measurement: "bar"

  - name: "Puissance réactive de la pompe à eau"
    id: "sensor.water_pump_reactive_power"
    state: "22"
    attributes:
      device_class: reactive_power
      unit_of_measurement: "VAR"

  - name: "Signal GSM de mon téléphone"
    id: "sensor.my_phone_gsm_signal"
    state: "-43"
    attributes:
      device_class: signal_strength
      unit_of_measurement: "dBm"

  - name: "Pression acoustique de la barre de son"
    id: "sensor.sound_bar_sound_pressure"
    state: "62"
    attributes:
      device_class: sound_pressure
      unit_of_measurement: "dB"

  - name: "Vitesse de déplacement"
    id: "sensor.traveling_speed"
    state: "67"
    attributes:
      device_class: speed
      unit_of_measurement: "km/h"

  - name: "Capteur SO2 de la pompe à chaleur"
    id: "sensor.heat_pump_so2"
    state: "50"
    attributes:
      device_class: sulphur_dioxide
      unit_of_measurement: "µg/m³"

  - name: "Chaudière"
    id: "sensor.furnace_temperature"
    state: "380"
    attributes:
      device_class: temperature
      unit_of_measurement: "°C"

  - name: "Capteur de COV"
    id: "sensor.voc_sensor"
    state: "35"
    attributes:
      device_class: volatile_organic_compounds
      unit_of_measurement: "µg/m³"

  - name: "Capteur de COV 2"
    id: "sensor.voc_sensor_parts"
    state: "35"
    attributes:
      device_class: volatile_organic_compounds_parts
      unit_of_measurement: "ppm"

  - name: "Tension d'entrée"
    id: "sensor.input_voltage"
    state: "12"
    attributes:
      device_class: voltage
      unit_of_measurement: "V"

  - name: "Consommation d'eau du jour"
    id: "sensor.water_pump_usage_today"
    state: "1356"
    attributes:
      device_class: volume
      unit_of_measurement: "L"

  - name: "Réservoir de la pompe à eau"
    id: "sensor.water_pump_buffer"
    state: "28"
    attributes:
      device_class: volume_storage

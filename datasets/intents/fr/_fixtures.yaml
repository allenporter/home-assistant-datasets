language: "fr"
areas:
  - name: "Cuisine"
    id: "kitchen_id"
    floor: "Rez-de-Chaussée"

  - name: "Salon"
    id: "living_room_id"
    floor: "Rez-de-Chaussée"

  - name: "Chambre"
    id: "bedroom_id"
    floor: "Premier Étage"

  - name: "Garage"
    id: "garage_id"
    floor: "Rez-de-Chaussée"

  - name: "Entrée"
    id: "entrance_id"
    floor: "Rez-de-Chaussée"

  - name: "Bureau"
    id: "office_id"
    floor: "Sous-sol"
entities:
  - name: "Lampe de la Chambre"
    id: "light.bedroom_lamp"
    area: "bedroom_id"
    state: "off"
    attributes:
      supported_color_modes:
        - brightness

  - name: "Interrupteur de la Chambre"
    id: "switch.bedroom"
    area: "bedroom_id"
    state: "off"

  - name: "Interrupteur de la Cuisine"
    id: "switch.kitchen"
    area: "kitchen_id"
    state: "on"

  - name: "Plan de Travail"
    id: "light.kitchen_countertop"
    area: "kitchen_id"
    state: "on"

  - name: "Plafonnier de la Cuisine"
    id: "light.kitchen_ceiling"
    area: "kitchen_id"
    state: "on"

  - name: "Meubles de la Cuisine"
    id: "light.kitchen_cabinets"
    area: "kitchen_id"
    state: "on"

  - name: "Ventilateur de Plafond"
    id: "fan.ceiling"
    area: "living_room_id"
    state: "off"

  - name: "Rideau Gauche"
    id: "cover.curtain_left"
    area: "living_room_id"
    state: "open"
    attributes:
      device_class: curtain
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE

  - name: "Rideau Droit"
    id: "cover.curtain_right"
    area: "living_room_id"
    state: "closed"
    attributes:
      device_class: curtain
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE

  - name: "Rideau de la Chambre"
    id: "cover.bedroom"
    area: "bedroom_id"
    state: "closed"
    attributes:
      device_class: curtain
      current_position: 0
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
        - cover.CoverEntityFeature.SET_POSITION

  - name: "Température Extérieure"
    id: "sensor.outside_temperature"
    area: "garage_id"
    state: "42"
    attributes:
      unit_of_measurement: "°F"

  - name: "Lampe du Salon"
    id: "light.living_room_lamp"
    area: "living_room_id"
    state: "on"

  - name: "Lumière du Garage"
    id: "light.garage"
    area: "garage_id"
    state: "on"

  - name: Coin Jeux
    id: light.play_corner
    area: "living_room_id"
    state: "on"

  - name: "Thermostat"
    id: "climate.thermostat"
    area: "living_room_id"
    state: "heat"
    attributes:
      current_temperature: 68

  - name: "Thermostat du Bureau"
    id: "climate.office_thermostat"
    area: "office_id"
    state: "heat"
    attributes:
      current_temperature: 1

  - name: "Porte d'Entrée"
    id: "lock.front_door"
    area: "entrance_id"
    state: "locked"

  - name: "Porte Arrière"
    id: "lock.back_door"
    state: "unlocked"

  - name: "Porte Latérale"
    id: "lock.side_door"
    state: "locked"

  # TODO : Supporter les scènes et les scripts
  # - name: "Mode Fête"
  #   id: "scene.party_mode"

  # - name: "Mode Furtif"
  #   id: "script.stealth_mode"

  # https://www.home-assistant.io/integrations/binary_sensor/
  - name: "Téléphone"
    id: "binary_sensor.phone_battery"
    state:
      in: "normal"
      out: "off"
    attributes:
      device_class: battery

  - name: "Téléphone"
    id: "binary_sensor.phone_battery_charging"
    state:
      in: "charging"
      out: "on"
    attributes:
      device_class: battery_charging

  - name: "CO2"
    id: "binary_sensor.co2"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: carbon_monoxide

  - name: "Canalisations"
    id: "binary_sensor.computer_cold"
    state:
      in: "normal"
      out: "off"
    attributes:
      device_class: cold

  - name: "Téléphone"
    id: "binary_sensor.phone_connectivity"
    state:
      in: "connected"
      out: "on"
    attributes:
      device_class: connectivity

  - name: "Chatière"
    id: "binary_sensor.pet_door"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: door

  - name: "Porte de Garage Secondaire"
    id: "binary_sensor.garage_door"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: garage_door

  - name: "Gaz"
    id: "binary_sensor.gas"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: gas

  - name: "Ordinateur"
    id: "binary_sensor.computer_heat"
    state:
      in: "hot"
      out: "on"
    attributes:
      device_class: heat

  - name: "Lumière"
    id: "binary_sensor.light"
    state:
      in: "no light"
      out: "off"
    attributes:
      device_class: light

  - name: "Chatière"
    id: "binary_sensor.pet_door_lock"
    state:
      in: "unlocked"
      out: "on"
    attributes:
      device_class: lock

  - name: "Détecteur de fuite de la cuisine"
    id: "binary_sensor.water_sensor"
    area: "kitchen_id"
    state:
      in: "dry"
      out: "off"
    attributes:
      device_class: moisture

  - name: "Détecteur de mouvement"
    id: "binary_sensor.garage_motion"
    area: "garage_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: motion

  - name: "Occupation"
    id: "binary_sensor.kitchen_occupancy"
    area: "kitchen_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: occupancy

  - name: "Porte du Cabanon"
    id: "binary_sensor.shed_door_opening"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: opening

  - name: "Téléphone"
    id: "binary_sensor.phone_plug"
    state:
      in: "plugged in"
      out: "on"
    attributes:
      device_class: plug

  - name: "Secteur"
    id: "binary_sensor.power"
    state:
      in: "powered"
      out: "on"
    attributes:
      device_class: power

  - name: "Téléphone"
    id: "binary_sensor.presence"
    state:
      in: "away"
      out: "off"
    attributes:
      device_class: presence

  - name: "Distributeur de Croquettes"
    id: "binary_sensor.problem"
    area: "kitchen_id"
    state:
      in: "ok"
      out: "off"
    attributes:
      device_class: problem

  - name: "Lave-linge"
    id: "binary_sensor.washer_running"
    state:
      in: "running"
      out: "on"
    attributes:
      device_class: running

  - name: "Route"
    id: "binary_sensor.road_safety"
    state:
      in: "safe"
      out: "off"
    attributes:
      device_class: safety

  - name: "Fumée Cuisine"
    id: "binary_sensor.kitchen_smoke"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: smoke

  - name: "Sirène"
    id: "binary_sensor.sound"
    area: "garage_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: sound

  - name: "Réserve de Biscuits"
    id: "binary_sensor.cookie_stash_tamper"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: tamper

  - name: "Téléphone"
    id: "binary_sensor.phone_update"
    state:
      in: "update available"
      out: "on"
    attributes:
      device_class: update

  - name: "Téléphone"
    id: "binary_sensor.phone_vibration"
    state:
      in: "not vibrating"
      out: "off"
    attributes:
      device_class: vibration

  - name: "Fenêtre du Cabanon"
    id: "binary_sensor.shed_window"
    state:
      in: "open"
      out: "on"
    attributes:
      device_class: window

  # https://www.home-assistant.io/integrations/sensor/
  - name: "Puissance apparente de l'appareil"
    id: "sensor.appliance_apparent_power"
    state: "2"
    attributes:
      device_class: apparent_power
      unit_of_measurement: "VA"

  - name: "Capteur de qualité de l'air de la cuisine"
    id: "sensor.kitchen_aqi_sensor"
    state: "50"
    attributes:
      device_class: aqi

  - name: "Capteur de pression extérieur"
    id: "sensor.outside_pressure"
    state: "1000"
    attributes:
      device_class: atmospheric_pressure
      unit_of_measurement: "hPa"

  - name: "Mon Téléphone"
    id: "sensor.my_phone_battery"
    state: "98"
    attributes:
      device_class: battery
      unit_of_measurement: "%"

  - name: "Capteur CO2 de la pompe à chaleur"
    id: "sensor.heat_pump_co2"
    state: "50"
    attributes:
      device_class: carbon_dioxide
      unit_of_measurement: "ppm"

  - name: "Capteur CO de la pompe à chaleur"
    id: "sensor.heat_pump_co"
    state: "48"
    attributes:
      device_class: carbon_monoxide
      unit_of_measurement: "ppm"

  - name: "Consommation de courant de la maison"
    id: "sensor.house_current"
    state: "19"
    attributes:
      device_class: current
      unit_of_measurement: "A"

  - name: "Macrotorrent"
    id: "sensor.macrotorrent_download_speed"
    state: "22.9"
    attributes:
      device_class: data_rate
      unit_of_measurement: "MB/s"

  - name: "Fichier journal"
    id: "sensor.log_file_size"
    state: "106"
    attributes:
      device_class: data_size
      unit_of_measurement: "kB"

  - name: "Prochain anniversaire"
    id: "sensor.next_birthday"
    state: "2024-04-01"
    attributes:
      device_class: date

  - name: "Kilométrage de la voiture"
    id: "sensor.car_mileage"
    state: "65536"
    attributes:
      device_class: distance
      unit_of_measurement: "km"

  - name: "Programme du lave-vaisselle"
    id: "sensor.dishwasher_program_duration"
    state: "64"
    attributes:
      device_class: duration
      unit_of_measurement: "min"

  - name: "Production solaire"
    id: "sensor.solar_production"
    state: "3.2"
    attributes:
      device_class: energy
      unit_of_measurement: "kWh"

  - name: "Énergie stockée du Powerwall"
    id: "sensor.powerwall_stored_energy"
    state: "6"
    attributes:
      device_class: energy_storage
      unit_of_measurement: "kWh"

  - name: "Fréquence du réseau AC"
    id: "sensor.grid_frequency"
    state: "51"
    attributes:
      device_class: frequency
      unit_of_measurement: "Hz"

  - name: "Consommation mensuelle de gaz"
    id: "sensor.monthly_gas_consumption"
    state: "12"
    attributes:
      device_class: gas
      unit_of_measurement: "m³"

  - name: "Humidité du salon"
    id: "sensor.living_room_humidity"
    state: "48"
    attributes:
      device_class: humidity
      unit_of_measurement: "%"

  - name: "Luminosité du salon"
    id: "sensor.living_room_illuminance"
    state: "438"
    attributes:
      device_class: illuminance
      unit_of_measurement: "lux"

  - name: "Irradiance du chauffage du salon"
    id: "sensor.living_room_heater_irradiance"
    state: "155"
    attributes:
      device_class: irradiance
      unit_of_measurement: "W/m²"

  - name: "Mélangeur de la brasserie"
    id: "sensor.bewery_mixer_moisture"
    state: "83"
    attributes:
      device_class: moisture
      unit_of_measurement: "%"

  - name: "Prix par kW"
    id: "sensor.price_per_kW"
    state: "1"
    attributes:
      device_class: monetary
      unit_of_measurement: "EUR"

  - name: "Capteur NO2 de la pompe à chaleur"
    id: "sensor.heat_pump_no2"
    state: "50"
    attributes:
      device_class: nitrogen_dioxide
      unit_of_measurement: "µg/m³"

  - name: "Capteur NO de la pompe à chaleur"
    id: "sensor.heat_pump_no"
    state: "50"
    attributes:
      device_class: nitrogen_monoxide
      unit_of_measurement: "µg/m³"

  - name: "Capteur N2O de la pompe à chaleur"
    id: "sensor.heat_pump_n2o"
    state: "50"

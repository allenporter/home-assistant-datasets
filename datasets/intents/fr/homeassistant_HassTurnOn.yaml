    # response: "Ventilateur allumé"

  - sentences:
      - allume la lumière du coin jeux
      - coin jeux lumière allumée
    setup:
      light.play_corner:
        state: "off"
    expect_changes:
      light.play_corner:
        state: "on"
    ignore_changes:
      light.play_corner:
        - color_mode

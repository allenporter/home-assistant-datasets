---
category: turn_on_off
tests:
  - sentences:
      - "allume le ventilateur de plafond"
      - "allume ventilateur de plafond"
      - "mets le ventilateur de plafond en marche"
      - "active le ventilateur de plafond"
      - "ventilateur de plafond allumé"
      - "active ventilateur de plafond"
    setup:
      fan.ceiling:
        state: "off"
    expect_changes:
      fan.ceiling:
        state: "on"
    # intent:

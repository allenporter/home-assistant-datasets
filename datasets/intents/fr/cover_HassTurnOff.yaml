    # response: "Fermé"

  - sentences:
      - "ferme les stores de la chambre"
      - "ferme les stores dans la chambre"
    setup:
      cover.bedroom:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      cover.bedroom:
        state: "closed"
    ignore_changes:
      cover.bedroom:
        - current_position

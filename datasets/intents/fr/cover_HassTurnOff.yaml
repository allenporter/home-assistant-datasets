  - sentences:
      - "ferme le rideau gauche"
    setup:
      cover.curtain_left:
        state: open
    expect_changes:
      cover.curtain_left:
        state: closed
    ignore_changes:
      cover.curtain_left:
        - current_position
    # intent:
    #   name: HassTurnOff
    #   slots:
    #     name: Rideau Gauche
    #   context:
    #     domain: cover
    #     device_class: curtain
    # response: "Fermé"

  - sentences:
      - "ferme le rideau gauche dans le salon"
    setup:
      cover.curtain_left:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.curtain_left:
        state: closed
    ignore_changes:
      cover.curtain_left:
        - current_position

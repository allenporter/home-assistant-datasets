  # couleur
  - sentences:
      - "mets la couleur de la lampe de la chambre en rouge"
      - "change la lampe de la chambre en rouge"
      - "mets la lampe de la chambre en rouge"
      - "change la couleur de la lampe de la chambre en rouge"

      - "lampe de la chambre en rouge"
      - "mets la lampe de la chambre en rouge"
    setup:
      light.bedroom_lamp:
        state: "on"
        attributes:
          brightness: 102
          supported_color_modes:
            - rgb
          color_mode: rgb
          rgb_color: [0, 0, 255]

    expect_changes:
      light.bedroom_lamp:
        attributes:
          rgb_color: [255, 0, 0]
    ignore_changes:
      light.bedroom_lamp:
        attributes:
          - xy_color
          - hs_color

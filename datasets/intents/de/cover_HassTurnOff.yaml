  - sentences:
      - "Vorhang Links schließen"
    setup:
      cover.curtain_left:
        state: open
    expect_changes:
      cover.curtain_left:
        state: closed
    ignore_changes:
      cover.curtain_left:
        - current_position
    # intent:

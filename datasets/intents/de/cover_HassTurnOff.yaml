  - sentences:
      - "die Rollos im Schlafzimmer schließen"
      - "Schlafzimmer-Rollos schließen"
    setup:
      cover.bedroom:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      cover.bedroom:
        state: "closed"
    ignore_changes:
      cover.bedroom:
        - current_position

    # response: "Geschlossen"

  - sentences:
      - "den Vorhang Links im Wohnzimmer schließen"
    setup:
      cover.curtain_left:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.curtain_left:
        state: closed
    ignore_changes:
      cover.curtain_left:
        - current_position

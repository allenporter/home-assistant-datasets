  # Farbe
  - sentences:
      - "stelle die Farbe der Schlafzimmerlampe auf Rot"
      - "ändere die Schlafzimmerlampe auf Rot"
      - "setze die Schlafzimmerlampe auf Rot"
      - "ändere die Farbe der Schlafzimmerlampe auf Rot"
      - "stelle die Farbe der Schlafzimmerlampe auf Rot ein"
      - "Schlafzimmerlampe Rot"
      - "mach die Schlafzimmerlampe Rot"
    setup:
      light.bedroom_lamp:
        state: "on"
        attributes:
          brightness: 102
          supported_color_modes:
            - rgb
          color_mode: rgb
          rgb_color: [0, 0, 255]

    expect_changes:
      light.bedroom_lamp:
        attributes:
          rgb_color: [255, 0, 0]
    ignore_changes:
      light.bedroom_lamp:
        attributes:
          - xy_color
          - hs_color
    # intent:

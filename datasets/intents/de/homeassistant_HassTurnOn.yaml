---
category: turn_on_off
tests:
  - sentences:
      - "Deckenventilator einschalten"
      - "schalte den Deckenventilator ein"
      - "mach den Deckenventilator an"
      - "den Deckenventilator einschalten"
      - "Deckenventilator an"
      - "aktiviere den Deckenventilator"
    setup:
      fan.ceiling:
        state: "off"
    expect_changes:
      fan.ceiling:
        state: "on"
    # intent:
    #   name: HassTurnOn
    #   slots:
    #     name: Deckenventilator
    # response: "Ventilator eingeschaltet"

  - sentences:
      - Spielecke-Licht einschalten
      - Spielecke Licht an
    setup:
      light.play_corner:
        state: "off"
    expect_changes:
      light.play_corner:
        state: "on"
    ignore_changes:
      light.play_corner:
        - color_mode

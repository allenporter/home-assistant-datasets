---
category: turn_on_off
tests:
  - sentences:
      - "Schlafzimmerlampe ausschalten"
      - "schalte die Schlafzimmerlampe aus"
      - "mach die Schlafzimmerlampe aus"
      - "die Schlafzimmerlampe ausschalten"
      - "Schlafzimmerlampe aus"
      - "deaktiviere die Schlafzimmerlampe"
    setup:
      light.bedroom_lamp:
        state: "on"
    expect_changes:
      light.bedroom_lamp:
        state: "off"
    ignore_changes:
      light.bedroom_lamp:
        - color_mode

language: "de"
areas:
  - name: "Küche"
    id: "kitchen_id"
    floor: "First Floor"

  - name: "Wohnzimmer"
    id: "living_room_id"
    floor: "First Floor"

  - name: "Schlafzimmer"
    id: "bedroom_id"
    floor: "Second Floor"

  - name: "Garage"
    id: "garage_id"
    floor: "First Floor"

  - name: "Eingang"
    id: "entrance_id"
    floor: "First Floor"

  - name: "Büro"
    id: "office_id"
    floor: "Basement"
entities:
  - name: "Schlafzimmerlampe"
    id: "light.bedroom_lamp"
    area: "bedroom_id"
    state: "off"
    attributes:
      supported_color_modes:
        - brightness

  - name: "Schlafzimmerschalter"
    id: "switch.bedroom"
    area: "bedroom_id"
    state: "off"

  - name: "Küchenschalter"
    id: "switch.kitchen"
    area: "kitchen_id"
    state: "on"

  - name: "Küchenarbeitsplatte"
    id: "light.kitchen_countertop"
    area: "kitchen_id"
    state: "on"

  - name: "Küchendeckenlampe"
    id: "light.kitchen_ceiling"
    area: "kitchen_id"
    state: "on"

  - name: "Küchenschränke"
    id: "light.kitchen_cabinets"
    area: "kitchen_id"
    state: "on"

  - name: "Deckenventilator"
    id: "fan.ceiling"
    area: "living_room_id"
    state: "off"

  - name: "Vorhang Links"
    id: "cover.curtain_left"
    area: "living_room_id"
    state: "open"
    attributes:
      device_class: curtain
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE

  - name: "Vorhang Rechts"
    id: "cover.curtain_right"
    area: "living_room_id"
    state: "closed"
    attributes:
      device_class: curtain
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE

  - name: "Schlafzimmervorhang"
    id: "cover.bedroom"
    area: "bedroom_id"
    state: "closed"
    attributes:
      device_class: curtain
      current_position: 0
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
        - cover.CoverEntityFeature.SET_POSITION

  - name: "Außentemperatur"
    id: "sensor.outside_temperature"
    area: "garage_id"
    state: "42"
    attributes:
      unit_of_measurement: "°F"

  - name: "Wohnzimmerlampe"
    id: "light.living_room_lamp"
    area: "living_room_id"
    state: "on"

  - name: "Garagenlicht"
    id: "light.garage"
    area: "garage_id"
    state: "on"

  - name: Spielecke
    id: light.play_corner
    area: "living_room_id"
    state: "on"

  - name: "Thermostat"
    id: "climate.thermostat"
    area: "living_room_id"
    state: "heat"
    attributes:
      current_temperature: 68

  - name: "Büro-Thermostat"
    id: "climate.office_thermostat"
    area: "office_id"
    state: "heat"
    attributes:
      current_temperature: 1

  - name: "Haustür"
    id: "lock.front_door"
    area: "entrance_id"
    state: "locked"

  - name: "Hintertür"
    id: "lock.back_door"
    state: "unlocked"

  - name: "Seitentür"
    id: "lock.side_door"
    state: "locked"

  # TODO: Szenen und Skripte unterstützen
  # - name: "Partymodus"
  #   id: "scene.party_mode"

  # - name: "Stealth-Modus"
  #   id: "script.stealth_mode"

  # https://www.home-assistant.io/integrations/binary_sensor/
  - name: "Telefon"
    id: "binary_sensor.phone_battery"
    state:
      in: "normal"
      out: "off"
    attributes:
      device_class: battery

  - name: "Telefon"
    id: "binary_sensor.phone_battery_charging"
    state:
      in: "charging"
      out: "on"
    attributes:
      device_class: battery_charging

  - name: "CO2"
    id: "binary_sensor.co2"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: carbon_monoxide

  - name: "Wasserrohre"
    id: "binary_sensor.computer_cold"
    state:
      in: "normal"
      out: "off"
    attributes:
      device_class: cold

  - name: "Telefon"
    id: "binary_sensor.phone_connectivity"
    state:
      in: "connected"
      out: "on"
    attributes:
      device_class: connectivity

  - name: "Haustierklappe"
    id: "binary_sensor.pet_door"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: door

  - name: "Zweites Garagentor"
    id: "binary_sensor.garage_door"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: garage_door

  - name: "Gas"
    id: "binary_sensor.gas"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: gas

  - name: "Computer"
    id: "binary_sensor.computer_heat"
    state:
      in: "hot"
      out: "on"
    attributes:
      device_class: heat

  - name: "Licht"
    id: "binary_sensor.light"
    state:
      in: "no light"
      out: "off"
    attributes:
      device_class: light

  - name: "Haustierklappe"
    id: "binary_sensor.pet_door_lock"
    state:
      in: "unlocked"
      out: "on"
    attributes:
      device_class: lock

  - name: "Küchen-Wassersensor"
    id: "binary_sensor.water_sensor"
    area: "kitchen_id"
    state:
      in: "dry"
      out: "off"
    attributes:
      device_class: moisture

  - name: "Bewegungsmelder"
    id: "binary_sensor.garage_motion"
    area: "garage_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: motion

  - name: "Belegung"
    id: "binary_sensor.kitchen_occupancy"
    area: "kitchen_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: occupancy

  - name: "Schuppentür"
    id: "binary_sensor.shed_door_opening"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: opening

  - name: "Telefon"
    id: "binary_sensor.phone_plug"
    state:
      in: "plugged in"
      out: "on"
    attributes:
      device_class: plug

  - name: "Netzstrom"
    id: "binary_sensor.power"
    state:
      in: "powered"
      out: "on"
    attributes:
      device_class: power

  - name: "Telefon"
    id: "binary_sensor.presence"
    state:
      in: "away"
      out: "off"
    attributes:
      device_class: presence

  - name: "Futterautomat"
    id: "binary_sensor.problem"
    area: "kitchen_id"
    state:
      in: "ok"
      out: "off"
    attributes:
      device_class: problem

  - name: "Waschmaschine"
    id: "binary_sensor.washer_running"
    state:
      in: "running"
      out: "on"
    attributes:
      device_class: running

  - name: "Straße"
    id: "binary_sensor.road_safety"
    state:
      in: "safe"
      out: "off"
    attributes:
      device_class: safety

  - name: "Küchen-Rauchmelder"
    id: "binary_sensor.kitchen_smoke"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: smoke

  - name: "Sirene"
    id: "binary_sensor.sound"
    area: "garage_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: sound

  - name: "Keksversteck"
    id: "binary_sensor.cookie_stash_tamper"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: tamper

  - name: "Telefon"
    id: "binary_sensor.phone_update"
    state:
      in: "update available"
      out: "on"
    attributes:
      device_class: update

  - name: "Telefon"
    id: "binary_sensor.phone_vibration"
    state:
      in: "not vibrating"
      out: "off"
    attributes:
      device_class: vibration

  - name: "Schuppenfenster"
    id: "binary_sensor.shed_window"
    state:
      in: "open"
      out: "on"
    attributes:
      device_class: window

  # https://www.home-assistant.io/integrations/sensor/
  - name: "Scheinleistung Gerät"
    id: "sensor.appliance_apparent_power"
    state: "2"
    attributes:
      device_class: apparent_power
      unit_of_measurement: "VA"

  - name: "Küchen-Luftqualitätssensor"
    id: "sensor.kitchen_aqi_sensor"

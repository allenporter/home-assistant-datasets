  - name: "Trader Joe's"
    id: "todo.trader_joes"
    attributes:
      todo_items: []

  - name: "Hauptventil"
    id: "valve.main_valve"
    state: "open"
    attributes:
      current_position: "100"
      reports_position: true
      supported_features:
        - valve.ValveEntityFeature.OPEN
        - valve.ValveEntityFeature.CLOSE
        - valve.ValveEntityFeature.SET_POSITION

  - name: "Fernseher"
    id: "media_player.tv"
    area: "living_room_id"
    state: "idle"
    attributes:
      volume_level: "50"

  - name: "Rover"
    id: "vacuum.rover"
    state: "idle"
    attributes:
      supported_features:
        - vacuum.VacuumEntityFeature.START
        - vacuum.VacuumEntityFeature.STATE
        - vacuum.VacuumEntityFeature.RETURN_HOME

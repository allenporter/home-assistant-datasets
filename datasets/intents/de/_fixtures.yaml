  - name: "Mein Telefon"
    id: "sensor.my_phone_battery"
    state: "98"
    attributes:
      device_class: battery
      unit_of_measurement: "%"

  - name: "Wärmepumpe CO2-Sensor"
    id: "sensor.heat_pump_co2"

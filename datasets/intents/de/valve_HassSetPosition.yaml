---
category: valve
tests:
  - sentences:
      - "Hauptventil auf 100 setzen"
      - "Hauptventil-Position auf 100 erhöhen"
      - "Hauptventil auf 100 öffnen"
    setup:
      valve.main_valve:
        state: "closed"
        attributes:
          current_position: 0
    expect_changes:
      valve.main_valve:
        state: "open"
        attributes:
          current_position: 100

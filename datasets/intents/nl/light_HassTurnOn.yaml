---
category: light
tests:
  # Zet alle lampen in een ruimte aan
  - sentences:
      - "zet alle lampen in de woonkamer aan"
      - "doe alle lampen in de woonkamer aan"
      - "zet het licht in de woonkamer aan"
      - "doe het licht in de woonkamer aan"
      - "zet de lampen in de woonkamer aan"
      - "schakel de lampen in de woonkamer aan"
      - "zet alle woonkamerlampen aan"
      - "zet het woonkamerlicht aan"
      - "zet de woonkamerlampen aan"
      - "doe het woonkamerlicht aan"
      - "doe alle woonkamerlampen aan"
      - "schakel alle lampen in de woonkamer aan"
      - "doe alle lampen in de woonkamer aan"
      - "doe de lampen in de woonkamer aan"
      - "schakel de verlichting in de woonkamer aan"
      - "zet de verlichting in de woonkamer aan"
      - "doe het licht in de woonkamer aan"
      - "schakel het licht in de woonkamer aan"
      - "doe de woonkamerverlichting aan"
      - "woonkamerlampen aan"
      - "activeer woonkamerlampen"
      - "lampen woonkamer aan"
      - "woonkamer verlichting aan"
    setup:
      light.living_room_lamp:
        state: "off"
      light.play_corner:
        state: "off"
    expect_changes:
      light.living_room_lamp:
        state: "on"
      light.play_corner:
        state: "on"
    ignore_changes:
      light.living_room_lamp:
        - color_mode
      light.play_corner:
        - color_mode

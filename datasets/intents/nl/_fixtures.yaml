language: "nl"
areas:
  - name: "Keuken"
    id: "kitchen_id"
    floor: "Begane Grond"

  - name: "Woonkamer"
    id: "living_room_id"
    floor: "Begane Grond"

  - name: "Slaapkamer"
    id: "bedroom_id"
    floor: "Eerste Verdieping"

  - name: "Garage"
    id: "garage_id"
    floor: "Begane Grond"

  - name: "Hal"
    id: "entrance_id"
    floor: "Begane Grond"

  - name: "Kantoor"
    id: "office_id"
    floor: "Kelder"
entities:
  - name: "Slaapkamerlamp"
    id: "light.bedroom_lamp"
    area: "bedroom_id"
    state: "off"
    attributes:
      supported_color_modes:
        - brightness

  - name: "Slaapkamerschakelaar"
    id: "switch.bedroom"
    area: "bedroom_id"
    state: "off"

  - name: "Keukenschakelaar"
    id: "switch.kitchen"
    area: "kitchen_id"
    state: "on"

  - name: "Aanrecht"
    id: "light.kitchen_countertop"
    area: "kitchen_id"
    state: "on"

  - name: "Keukenplafondlamp"
    id: "light.kitchen_ceiling"
    area: "kitchen_id"
    state: "on"

  - name: "Keukenkasten"
    id: "light.kitchen_cabinets"
    area: "kitchen_id"
    state: "on"

  - name: "Plafondventilator"
    id: "fan.ceiling"
    area: "living_room_id"
    state: "off"

  - name: "Gordijn Links"
    id: "cover.curtain_left"
    area: "living_room_id"
    state: "open"
    attributes:
      device_class: curtain
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE

  - name: "Gordijn Rechts"
    id: "cover.curtain_right"
    area: "living_room_id"
    state: "closed"
    attributes:
      device_class: curtain
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE

  - name: "Slaapkamergordijn"
    id: "cover.bedroom"
    area: "bedroom_id"
    state: "closed"
    attributes:
      device_class: curtain
      current_position: 0
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
        - cover.CoverEntityFeature.SET_POSITION

  - name: "Buitentemperatuur"
    id: "sensor.outside_temperature"
    area: "garage_id"
    state: "42"
    attributes:
      unit_of_measurement: "°F"

  - name: "Woonkamerlamp"
    id: "light.living_room_lamp"
    area: "living_room_id"
    state: "on"

  - name: "Garagelamp"
    id: "light.garage"
    area: "garage_id"
    state: "on"

  - name: Speelhoek
    id: light.play_corner
    area: "living_room_id"
    state: "on"

  - name: "Thermostaat"
    id: "climate.thermostat"
    area: "living_room_id"
    state: "heat"
    attributes:
      current_temperature: 68

  - name: "Kantoor Thermostaat"
    id: "climate.office_thermostat"
    area: "office_id"
    state: "heat"
    attributes:
      current_temperature: 1

  - name: "Voordeur"
    id: "lock.front_door"
    area: "entrance_id"
    state: "locked"

  - name: "Achterdeur"
    id: "lock.back_door"
    state: "unlocked"

  - name: "Zijdeur"
    id: "lock.side_door"
    state: "locked"

  # TODO: Ondersteuning voor scènes en scripts
  # - name: "Feestmodus"
  #   id: "scene.party_mode"

  # - name: "Stealth-modus"
  #   id: "script.stealth_mode"

  # https://www.home-assistant.io/integrations/binary_sensor/
  - name: "Telefoon"
    id: "binary_sensor.phone_battery"
    state:
      in: "normal"
      out: "off"
    attributes:
      device_class: battery

  - name: "Telefoon"
    id: "binary_sensor.phone_battery_charging"
    state:
      in: "charging"
      out: "on"
    attributes:
      device_class: battery_charging

  - name: "CO2"
    id: "binary_sensor.co2"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: carbon_monoxide

  - name: "Waterleidingen"
    id: "binary_sensor.computer_cold"
    state:
      in: "normal"
      out: "off"
    attributes:
      device_class: cold

  - name: "Telefoon"
    id: "binary_sensor.phone_connectivity"
    state:
      in: "connected"
      out: "on"
    attributes:
      device_class: connectivity

  - name: "Kattenluik"
    id: "binary_sensor.pet_door"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: door

  - name: "Tweede Garagedeur"
    id: "binary_sensor.garage_door"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: garage_door

  - name: "Gas"
    id: "binary_sensor.gas"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: gas

  - name: "Computer"
    id: "binary_sensor.computer_heat"
    state:
      in: "hot"
      out: "on"
    attributes:
      device_class: heat

  - name: "Licht"
    id: "binary_sensor.light"
    state:
      in: "no light"
      out: "off"
    attributes:
      device_class: light

  - name: "Kattenluik"
    id: "binary_sensor.pet_door_lock"
    state:
      in: "unlocked"
      out: "on"
    attributes:
      device_class: lock

  - name: "Keuken leksensor"
    id: "binary_sensor.water_sensor"
    area: "kitchen_id"
    state:
      in: "dry"
      out: "off"
    attributes:
      device_class: moisture

  - name: "Bewegingssensor"
    id: "binary_sensor.garage_motion"
    area: "garage_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: motion

  - name: "Aanwezigheid"
    id: "binary_sensor.kitchen_occupancy"
    area: "kitchen_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: occupancy

  - name: "Schuurdeur"
    id: "binary_sensor.shed_door_opening"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: opening

  - name: "Telefoon"
    id: "binary_sensor.phone_plug"
    state:
      in: "plugged in"
      out: "on"
    attributes:
      device_class: plug

  - name: "Netspanning"
    id: "binary_sensor.power"
    state:
      in: "powered"
      out: "on"
    attributes:
      device_class: power

  - name: "Telefoon"
    id: "binary_sensor.presence"
    state:
      in: "away"
      out: "off"
    attributes:
      device_class: presence

  - name: "Dierenvoerautomaat"
    id: "binary_sensor.problem"
    area: "kitchen_id"
    state:
      in: "ok"
      out: "off"
    attributes:
      device_class: problem

  - name: "Wasmachine"
    id: "binary_sensor.washer_running"
    state:
      in: "running"
      out: "on"
    attributes:
      device_class: running

  - name: "Weg"
    id: "binary_sensor.road_safety"
    state:
      in: "safe"
      out: "off"
    attributes:
      device_class: safety

  - name: "Keuken Rookmelder"
    id: "binary_sensor.kitchen_smoke"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: smoke

  - name: "Sirene"
    id: "binary_sensor.sound"
    area: "garage_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: sound

  - name: "Koekjesvoorraad"
    id: "binary_sensor.cookie_stash_tamper"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: tamper

  - name: "Telefoon"
    id: "binary_sensor.phone_update"
    state:
      in: "update available"
      out: "on"
    attributes:
      device_class: update

  - name: "Telefoon"
    id: "binary_sensor.phone_vibration"
    state:
      in: "not vibrating"
      out: "off"
    attributes:
      device_class: vibration

  - name: "Schuurvenster"
    id: "binary_sensor.shed_window"
    state:
      in: "open"
      out: "on"
    attributes:
      device_class: window

  # https://www.home-assistant.io/integrations/sensor/
  - name: "Schijnbaar vermogen apparaat"
    id: "sensor.appliance_apparent_power"

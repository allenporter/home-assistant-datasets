---
category: light
tests:
  # Zet alle lampen in een ruimte uit
  - sentences:
      - "zet alle lampen in de keuken uit"
      - "doe alle lampen in de keuken uit"
      - "zet het licht in de keuken uit"
      - "doe het licht in de keuken uit"
      - "zet de lampen in de keuken uit"
      - "schakel de verlichting in de keuken uit"
      - "zet alle keukenlampen uit"
      - "zet het keukenlicht uit"
      - "zet de keukenlampen uit"
      - "doe het keukenlicht uit"
      - "doe alle keukenlampen uit"
      - "schakel alle lampen in de keuken uit"
      - "doe alle lampen in de keuken uit"
      - "doe de lampen in de keuken uit"
      - "schakel de lampen in de keuken uit"
      - "zet de verlichting in de keuken uit"
      - "doe de verlichting in de keuken uit"
      - "schakel het licht in de keuken uit"
      - "doe de keukenverlichting uit"
      - "keukenverlichting uit"
      - "deactiveer keukenlampen"
    setup:
      light.kitchen_countertop:
        state: "on"
      light.kitchen_ceiling:
        state: "off"
      light.kitchen_cabinets:
        state: "on"
    expect_changes:
      light.kitchen_countertop:
        state: "off"
      light.kitchen_ceiling:
        state: "off"
      light.kitchen_cabinets:
        state: "off"
    ignore_changes:
      light.kitchen_countertop:
        - color_mode
      light.kitchen_ceiling:
        - color_mode
      light.kitchen_cabinets:
        - color_mode

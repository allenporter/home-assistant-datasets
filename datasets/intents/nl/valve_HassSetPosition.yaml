---
category: valve
tests:
  - sentences:
      - "zet de hoofdkraan op 100"
      - "verhoog de positie van de hoofdkraan naar 100"
      - "open de hoofdkraan op 100"
    setup:
      valve.main_valve:
        state: "closed"
        attributes:
          current_position: 0
    expect_changes:
      valve.main_valve:
        state: "open"
        attributes:
          current_position: 100

    # response: "Gesloten"

  - sentences:
      - "sluit de gordijnen in de slaapkamer"
      - "doe de slaapkamergordijnen dicht"
    setup:
      cover.bedroom:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      cover.bedroom:
        state: "closed"
    ignore_changes:
      cover.bedroom:
        - current_position

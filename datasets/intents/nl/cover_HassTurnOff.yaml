    #   slots:
    #     name: Curtain Left
    #   context:
    #     domain: cover
    #     device_class: curtain
    # response: "Gesloten"

  - sentences:
      - "sluit gordijn links in de woonkamer"
    setup:
      cover.curtain_left:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.curtain_left:
        state: closed
    ignore_changes:
      cover.curtain_left:
        - current_position

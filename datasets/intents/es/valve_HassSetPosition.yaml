---
category: valve
tests:
  - sentences:
      - "pon la válvula principal a 100"
      - "sube la posición de la válvula principal a 100"
      - "abre la válvula principal a 100"
    setup:
      valve.main_valve:
        state: "closed"
        attributes:
          current_position: 0
    expect_changes:
      valve.main_valve:
        state: "open"
        attributes:
          current_position: 100

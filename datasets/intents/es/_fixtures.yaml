  - name: "Sensor de ozono del salón"
    id: "sensor.living_room_ozone"
    state: "50"
    attributes:
      device_class: ozone
      unit_of_measurement: "µg/m³"

  - name: "Sensor de PM1 del salón"
    id: "sensor.living_room_pm1"
    state: "50"
    attributes:
      device_class: pm1
      unit_of_measurement: "µg/m³"

  - name: "Sensor de PM2.5 del salón"
    id: "sensor.living_room_pm25"
    state: "50"
    attributes:
      device_class: pm25
      unit_of_measurement: "µg/m³"

  - name: "Sensor de PM10 del salón"
    id: "sensor.living_room_pm10"
    state: "50"
    attributes:
      device_class: pm10
      unit_of_measurement: "µg/m³"

  - name: "Factor de potencia del enchufe"
    id: "sensor.wall_plug_power_factor"
    state: "2"
    attributes:
      device_class: power_factor

  - name: "Potencia del aire acondicionado"
    id: "sensor.aircon_power"
    state: "380"
    attributes:
      device_class: power
      unit_of_measurement: "W"

  - name: "Sensor de lluvia exterior"
    id: "sensor.rain_sensor_total"
    state: "29"
    attributes:
      device_class: precipitation
      unit_of_measurement: "mm"

  - name: "Sensor de lluvia exterior"
    id: "sensor.rain_sensor_intensity"
    state: "144"
    attributes:
      device_class: precipitation_intensity
      unit_of_measurement: "mm/h"

  - name: "Presión de los neumáticos"
    id: "sensor.tyre_pressure"
    state: "2.1"
    attributes:
      device_class: pressure
      unit_of_measurement: "bar"

  - name: "Potencia reactiva de la bomba de agua"
    id: "sensor.water_pump_reactive_power"
    state: "22"
    attributes:
      device_class: reactive_power
      unit_of_measurement: "VAR"

  - name: "Señal GSM de mi teléfono"
    id: "sensor.my_phone_gsm_signal"
    state: "-43"
    attributes:
      device_class: signal_strength
      unit_of_measurement: "dBm"

  - name: "Presión acústica de la barra de sonido"
    id: "sensor.sound_bar_sound_pressure"
    state: "62"
    attributes:
      device_class: sound_pressure

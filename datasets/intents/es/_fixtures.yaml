language: "es"
areas:
  - name: "Cocina"
    id: "kitchen_id"
    floor: "Planta Baja"

  - name: "Salón"
    id: "living_room_id"
    floor: "Planta Baja"

  - name: "Dormitorio"
    id: "bedroom_id"
    floor: "Primera Planta"

  - name: "Garaje"
    id: "garage_id"
    floor: "Planta Baja"

  - name: "Entrada"
    id: "entrance_id"
    floor: "Planta Baja"

  - name: "Oficina"
    id: "office_id"
    floor: "Sótano"
entities:
  - name: "Lámpara del Dormitorio"
    id: "light.bedroom_lamp"
    area: "bedroom_id"
    state: "off"
    attributes:
      supported_color_modes:
        - brightness

  - name: "Interruptor del Dormitorio"
    id: "switch.bedroom"
    area: "bedroom_id"
    state: "off"

  - name: "Interruptor de la Cocina"
    id: "switch.kitchen"
    area: "kitchen_id"
    state: "on"

  - name: "Encimera de la Cocina"
    id: "light.kitchen_countertop"
    area: "kitchen_id"
    state: "on"

  - name: "Techo de la Cocina"
    id: "light.kitchen_ceiling"
    area: "kitchen_id"
    state: "on"

  - name: "Armarios de la Cocina"
    id: "light.kitchen_cabinets"
    area: "kitchen_id"
    state: "on"

  - name: "Ventilador de Techo"
    id: "fan.ceiling"
    area: "living_room_id"
    state: "off"

  - name: "Cortina Izquierda"
    id: "cover.curtain_left"
    area: "living_room_id"
    state: "open"
    attributes:
      device_class: curtain
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE

  - name: "Cortina Derecha"
    id: "cover.curtain_right"
    area: "living_room_id"
    state: "closed"
    attributes:
      device_class: curtain
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE

  - name: "Cortina del Dormitorio"
    id: "cover.bedroom"
    area: "bedroom_id"
    state: "closed"
    attributes:
      device_class: curtain
      current_position: 0
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
        - cover.CoverEntityFeature.SET_POSITION

  - name: "Temperatura Exterior"
    id: "sensor.outside_temperature"
    area: "garage_id"
    state: "42"
    attributes:
      unit_of_measurement: "°F"

  - name: "Lámpara del Salón"
    id: "light.living_room_lamp"
    area: "living_room_id"
    state: "on"

  - name: "Luz del Garaje"
    id: "light.garage"
    area: "garage_id"
    state: "on"

  - name: Rincón de Juegos
    id: light.play_corner
    area: "living_room_id"
    state: "on"

  - name: "Termostato"
    id: "climate.thermostat"
    area: "living_room_id"
    state: "heat"
    attributes:
      current_temperature: 68

  - name: "Termostato de la Oficina"
    id: "climate.office_thermostat"
    area: "office_id"
    state: "heat"
    attributes:
      current_temperature: 1

  - name: "Puerta Principal"
    id: "lock.front_door"
    area: "entrance_id"
    state: "locked"

  - name: "Puerta Trasera"
    id: "lock.back_door"
    state: "unlocked"

  - name: "Puerta Lateral"
    id: "lock.side_door"
    state: "locked"

  # PENDIENTE: Soporte para escenas y scripts
  # - name: "Modo Fiesta"
  #   id: "scene.party_mode"

  # - name: "Modo Sigiloso"
  #   id: "script.stealth_mode"

  # https://www.home-assistant.io/integrations/binary_sensor/
  - name: "Teléfono"
    id: "binary_sensor.phone_battery"
    state:
      in: "normal"
      out: "off"
    attributes:
      device_class: battery

  - name: "Teléfono"
    id: "binary_sensor.phone_battery_charging"
    state:
      in: "charging"
      out: "on"
    attributes:
      device_class: battery_charging

  - name: "CO2"
    id: "binary_sensor.co2"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: carbon_monoxide

  - name: "Tuberías de Agua"
    id: "binary_sensor.computer_cold"
    state:
      in: "normal"
      out: "off"
    attributes:
      device_class: cold

  - name: "Teléfono"
    id: "binary_sensor.phone_connectivity"
    state:
      in: "connected"
      out: "on"
    attributes:
      device_class: connectivity

  - name: "Puerta de Mascotas"
    id: "binary_sensor.pet_door"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: door

  - name: "Puerta Secundaria del Garaje"
    id: "binary_sensor.garage_door"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: garage_door

  - name: "Gas"
    id: "binary_sensor.gas"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: gas

  - name: "Ordenador"
    id: "binary_sensor.computer_heat"
    state:
      in: "hot"
      out: "on"
    attributes:
      device_class: heat

  - name: "Luz"
    id: "binary_sensor.light"
    state:
      in: "no light"
      out: "off"
    attributes:
      device_class: light

  - name: "Puerta de Mascotas"
    id: "binary_sensor.pet_door_lock"
    state:
      in: "unlocked"
      out: "on"
    attributes:
      device_class: lock

  - name: "Sensor de Fugas de la Cocina"
    id: "binary_sensor.water_sensor"
    area: "kitchen_id"
    state:
      in: "dry"
      out: "off"
    attributes:
      device_class: moisture

  - name: "Sensor de Movimiento"
    id: "binary_sensor.garage_motion"
    area: "garage_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: motion

  - name: "Ocupación"
    id: "binary_sensor.kitchen_occupancy"
    area: "kitchen_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: occupancy

  - name: "Puerta del Cobertizo"
    id: "binary_sensor.shed_door_opening"
    state:
      in: "closed"
      out: "off"
    attributes:
      device_class: opening

  - name: "Teléfono"
    id: "binary_sensor.phone_plug"
    state:
      in: "plugged in"
      out: "on"
    attributes:
      device_class: plug

  - name: "Red Eléctrica"
    id: "binary_sensor.power"
    state:
      in: "powered"
      out: "on"
    attributes:
      device_class: power

  - name: "Teléfono"
    id: "binary_sensor.presence"
    state:
      in: "away"
      out: "off"
    attributes:
      device_class: presence

  - name: "Comedero de Mascotas"
    id: "binary_sensor.problem"
    area: "kitchen_id"
    state:
      in: "ok"
      out: "off"
    attributes:
      device_class: problem

  - name: "Lavadora"
    id: "binary_sensor.washer_running"
    state:
      in: "running"
      out: "on"
    attributes:
      device_class: running

  - name: "Carretera"
    id: "binary_sensor.road_safety"
    state:
      in: "safe"
      out: "off"
    attributes:
      device_class: safety

  - name: "Humo de la Cocina"
    id: "binary_sensor.kitchen_smoke"
    area: "kitchen_id"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: smoke

  - name: "Sirena"
    id: "binary_sensor.sound"
    area: "garage_id"
    state:
      in: "detected"
      out: "on"
    attributes:
      device_class: sound

  - name: "Escondite de Galletas"
    id: "binary_sensor.cookie_stash_tamper"
    state:
      in: "clear"
      out: "off"
    attributes:
      device_class: tamper

  - name: "Teléfono"
    id: "binary_sensor.phone_update"
    state:
      in: "update available"
      out: "on"
    attributes:
      device_class: update

  - name: "Teléfono"
    id: "binary_sensor.phone_vibration"
    state:
      in: "not vibrating"
      out: "off"
    attributes:
      device_class: vibration

  - name: "Ventana del Cobertizo"
    id: "binary_sensor.shed_window"
    state:
      in: "open"
      out: "on"
    attributes:
      device_class: window

  # https://www.home-assistant.io/integrations/sensor/
  - name: "Potencia aparente del electrodoméstico"
    id: "sensor.appliance_apparent_power"
    state: "2"
    attributes:
      device_class: apparent_power
      unit_of_measurement: "VA"

  - name: "Sensor de calidad del aire de la cocina"
    id: "sensor.kitchen_aqi_sensor"
    state: "50"
    attributes:
      device_class: aqi

  - name: "Sensor de aire exterior"
    id: "sensor.outside_pressure"
    state: "1000"
    attributes:
      device_class: atmospheric_pressure
      unit_of_measurement: "hPa"

  - name: "Mi Teléfono"
    id: "sensor.my_phone_battery"
    state: "98"
    attributes:
      device_class: battery
      unit_of_measurement: "%"

  - name: "Sensor de CO2 de la bomba de calor"
    id: "sensor.heat_pump_co2"
    state: "50"
    attributes:
      device_class: carbon_dioxide
      unit_of_measurement: "ppm"

  - name: "Sensor de CO de la bomba de calor"
    id: "sensor.heat_pump_co"
    state: "48"
    attributes:
      device_class: carbon_monoxide
      unit_of_measurement: "ppm"

  - name: "Consumo de corriente de la casa"
    id: "sensor.house_current"
    state: "19"
    attributes:
      device_class: current
      unit_of_measurement: "A"

  - name: "Macrotorrent"
    id: "sensor.macrotorrent_download_speed"
    state: "22.9"
    attributes:
      device_class: data_rate
      unit_of_measurement: "MB/s"

  - name: "Archivo de registro"
    id: "sensor.log_file_size"
    state: "106"
    attributes:
      device_class: data_size
      unit_of_measurement: "kB"

  - name: "Próximo cumpleaños"
    id: "sensor.next_birthday"
    state: "2024-04-01"
    attributes:
      device_class: date

  - name: "Kilometraje del coche"
    id: "sensor.car_mileage"
    state: "65536"
    attributes:
      device_class: distance
      unit_of_measurement: "km"

  - name: "Programa actual del lavavajillas"
    id: "sensor.dishwasher_program_duration"
    state: "64"
    attributes:
      device_class: duration
      unit_of_measurement: "min"

  - name: "Producción solar"
    id: "sensor.solar_production"
    state: "3.2"
    attributes:
      device_class: energy
      unit_of_measurement: "kWh"

  - name: "Energía almacenada en el Powerwall"
    id: "sensor.powerwall_stored_energy"
    state: "6"
    attributes:
      device_class: energy_storage
      unit_of_measurement: "kWh"

  - name: "Frecuencia de la red eléctrica"
    id: "sensor.grid_frequency"
    state: "51"
    attributes:
      device_class: frequency
      unit_of_measurement: "Hz"

  - name: "Consumo mensual de gas"
    id: "sensor.monthly_gas_consumption"
    state: "12"
    attributes:
      device_class: gas
      unit_of_measurement: "m³"

  - name: "Humedad del salón"
    id: "sensor.living_room_humidity"
    state: "48"
    attributes:
      device_class: humidity
      unit_of_measurement: "%"

  - name: "Iluminancia del salón"
    id: "sensor.living_room_illuminance"
    state: "438"
    attributes:
      device_class: illuminance
      unit_of_measurement: "lux"

  - name: "Irradiancia del calefactor del salón"
    id: "sensor.living_room_heater_irradiance"
    state: "155"
    attributes:
      device_class: irradiance
      unit_of_measurement: "W/m²"

  - name: "Mezclador de cervecería"
    id: "sensor.bewery_mixer_moisture"
    state: "83"
    attributes:
      device_class: moisture
      unit_of_measurement: "%"

  - name: "Precio por kW"
    id: "sensor.price_per_kW"
    state: "1"
    attributes:
      device_class: monetary
      unit_of_measurement: "EUR"

  - name: "Sensor de NO2 de la bomba de calor"
    id: "sensor.heat_pump_no2"
    state: "50"
    attributes:
      device_class: nitrogen_dioxide
      unit_of_measurement: "µg/m³"

  - name: "Sensor de NO de la bomba de calor"
    id: "sensor.heat_pump_no"
    state: "50"
    attributes:
      device_class: nitrogen_monoxide
      unit_of_measurement: "µg/m³"

  - name: "Sensor de N2O de la bomba de calor"
    id: "sensor.heat_pump_n2o"
    state: "50"

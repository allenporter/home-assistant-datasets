---
category: turn_on_off
tests:
  - sentences:
      - "enciende el ventilador de techo"
      - "enciende el ventilador de techo"
      - "ventilador de techo encendido"
      - "enciende el ventilador de techo"
      - "ventilador de techo activado"
      - "activa el ventilador de techo"
    setup:
      fan.ceiling:
        state: "off"
    expect_changes:
      fan.ceiling:
        state: "on"
    # intent:
    #   name: HassTurnOn
    #   slots:
    #     name: Ventilador de Techo
    # response: "Ventilador encendido"

  - sentences:
      - enciende las luces del rincón de juegos
      - luz del rincón de juegos encendida
    setup:
      light.play_corner:
        state: "off"
    expect_changes:
      light.play_corner:
        state: "on"
    ignore_changes:
      light.play_corner:
        - color_mode

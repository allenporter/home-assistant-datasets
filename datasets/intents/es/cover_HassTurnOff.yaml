    #     area: Salón
    #   context:
    #     domain: cover
    #     device_class: curtain
    # response: "Cerrada"

  - sentences:
      - "cierra las persianas del dormitorio"
      - "cierra persianas del dormitorio"
    setup:
      cover.bedroom:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      cover.bedroom:
        state: "closed"
    ignore_changes:
      cover.bedroom:
        - current_position

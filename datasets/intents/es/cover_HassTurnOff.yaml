  - sentences:
      - "cierra la cortina izquierda"
    setup:
      cover.curtain_left:
        state: open
    expect_changes:
      cover.curtain_left:
        state: closed
    ignore_changes:
      cover.curtain_left:
        - current_position
    # intent:
    #   name: HassTurnOff
    #   slots:
    #     name: Cortina Izquierda
    #   context:
    #     domain: cover
    #     device_class: curtain
    # response: "Cerrada"

  - sentences:
      - "cierra la cortina izquierda del salón"
    setup:
      cover.curtain_left:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.curtain_left:
        state: closed
    ignore_changes:
      cover.curtain_left:
        - current_position
    # intent:

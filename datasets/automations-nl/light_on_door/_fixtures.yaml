# synthetic-home create_inventory ${DATASET_DIR}/light_on_door/_home.yaml > ${DATASET_DIR}/light_on_door/_fixtures.yaml
---
areas:
  - name: Keuken
    id: kitchen
  - name: Woonkamer
    id: living_room
  - name: Eetkamer
    id: dining_room
  - name: Slaapkamer 1
    id: bedroom_1
  - name: Slaapkamer 2
    id: bedroom_2
  - name: Slaapkamer 3
    id: bedroom_3
  - name: Slaapkamer 4
    id: bedroom_4
  - name: Voortuin
    id: front_yard
  - name: Garage
    id: garage
devices:
  - name: Keukenlamp
    id: kitchen_light
    area: kitchen
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Voorraadkastlamp
    id: pantry_light
    area: kitchen
    info:
      model: Smart Switch
      manufacturer: GE
  - name: Voorraadkastdeur
    id: pantry_door
    area: kitchen
    info:
      model: MCCGQ11LM
      manufacturer: Aqara
  - name: Slimme Oven
    id: smart_oven
    area: kitchen
    info:
      model: Smart Oven
      manufacturer: Samsung
      sw_version: "2.0"
  - name: Woonkamerlamp
    id: living_room_light
    area: living_room
    info:
      model: Color Changing Light Strip
      manufacturer: LIFX
      sw_version: 3.4.1
  - name: Eetkamerlamp
    id: dining_room_light
    area: dining_room
    info:
      model: Smart Ceiling Light
      manufacturer: Lutron
      sw_version: 2.1.5
  - name: Lamp Slaapkamer 1
    id: bedroom_1_light
    area: bedroom_1
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Lamp Slaapkamer 2
    id: bedroom_2_light
    area: bedroom_2
    info:
      model: RGBW Smart Bulb
      manufacturer: Sengled
      sw_version: 2.8.6
  - name: Lamp Slaapkamer 3
    id: bedroom_3_light
    area: bedroom_3
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Lamp Slaapkamer 4
    id: bedroom_4_light
    area: bedroom_4
    info:
      model: RGBW Smart Bulb
      manufacturer: LIFX
      sw_version: 4.2.9
  - name: Tuinverlichting
    id: garden_lights
    area: front_yard
    info:
      model: Solar-Powered Garden Lights
      manufacturer: Ring
      sw_version: 1.0.2
  - name: Garagedeuropener
    id: garage_door_opener
    area: garage
    info:
      model: Smart Garage Opener
      manufacturer: Chamberlain
      sw_version: 3.7.12
entities:
  - name: Keukenlamp
    id: light.kitchen_light
    area: kitchen
    device: kitchen_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Voorraadkastlamp
    id: light.pantry_light
    area: kitchen
    device: pantry_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Voorraadkastdeur
    id: binary_sensor.pantry_door
    area: kitchen
    device: pantry_door
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.DOOR
  - name: Batterij van de Voorraadkastdeur
    id: binary_sensor.pantry_door_battery
    area: kitchen
    device: pantry_door
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.BATTERY
  - name: Batterij van de Voorraadkastdeur
    id: sensor.pantry_door_battery
    area: kitchen
    device: pantry_door
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"
  - name: Slimme Oven
    id: switch.smart_oven
    area: kitchen
    device: smart_oven
    state: "on"
    attributes:
      device_class: switch.SwitchDeviceClass.SWITCH
  - name: Woonkamerlamp
    id: light.living_room_light
    area: living_room
    device: living_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Eetkamerlamp
    id: light.dining_room_light
    area: dining_room
    device: dining_room_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Lamp Slaapkamer 1
    id: light.bedroom_1_light
    area: bedroom_1
    device: bedroom_1_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Lamp Slaapkamer 2
    id: light.bedroom_2_light
    area: bedroom_2
    device: bedroom_2_light
    attributes:
      supported_color_modes:
        - rgbw
      color_mode: rgbw
      rgbw_color:
        - 0
        - 0
        - 0
        - 0
  - name: Lamp Slaapkamer 3
    id: light.bedroom_3_light
    area: bedroom_3
    device: bedroom_3_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Lamp Slaapkamer 4
    id: light.bedroom_4_light
    area: bedroom_4
    device: bedroom_4_light
    attributes:
      supported_color_modes:
        - rgbw
      color_mode: rgbw
      rgbw_color:
        - 0
        - 0
        - 0
        - 0
  - name: Tuinverlichting
    id: light.garden_lights
    area: front_yard
    device: garden_lights
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Garagedeuropener
    id: cover.garage_door_opener
    area: garage
    device: garage_door_opener
    state: false
    attributes:
      device_class: cover.CoverDeviceClass.GARAGE
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
  - name: Garagedeuropener
    id: light.garage_door_opener
    area: garage
    device: garage_door_opener
    state: false
    attributes:
      supported_color_modes:
        - onoff
      color_mode:
        - onoff

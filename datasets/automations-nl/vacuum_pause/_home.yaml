# thought: I will generate a set of devices commonly found in a Helsinki Studio apartment
# thought: Given the compact nature of the living space, the devices may focus on essential functionalities and convenience for the resident
---
name: Stedelijke Studio
country_code: SE
location: Centrum van Helsinki, Finland
type: Studioappartement
amenities:
  - Studio-indeling met bed, woongedeelte en kitchenette
  - 1 badkamer
  - Gedeeld dakterras
  - Wasruimte in het gebouw
  - Dicht bij het openbaar vervoer
areas:
  - Woonkamer/Keuken/Slaapkamer
  - Badkamer
  - Dakterras
devices:
  Woonkamer/Keuken/Slaapkamer:
    - name: Hoofdlamp
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.47.8
    - name: Lamp
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: TV
      device_type: smart-tv
      device_info:
        model: OLED C1 Series
        manufacturer: LG
        sw_version: webOS 6.0
    - name: Thermostaat
      device_type: hvac
      device_info:
        model: EB-STATe3L-01 3 Lite
        manufacturer: Ecobee
        sw_version: 4.8.7.132
      attributes:
        - unit_of_measure: "\xB0C"
    - name: Slimme Speaker
      device_type: smart-speaker
      device_info:
        model: Echo Dot
        manufacturer: Amazon
        sw_version: 4th Gen
    - name: Robotstofzuiger
      device_type: vacuum
      device_info:
        model: S7+
        manufacturer: Roborock
        sw_version: 1.5.6
  Badkamer:
    - name: Badkamerlamp
      device_type: light
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Bewegingssensor
      device_type: motion-sensor
      device_info:
        model: TriSensor
        manufacturer: Aeotec
        sw_version: v2.21
    - name: Afzuigventilator
      device_type: exhaust-fan
      device_info:
        model: Whisper Quiet
        manufacturer: Broan
        sw_version: 1.2.3
  Dakterras:
    - name: Buitenlamp
      device_type: light
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Bewegingssensor van het Dakterras
      device_type: motion-sensor
      device_info:
        model: TriSensor
        manufacturer: Aeotec
        sw_version: v2.21
      device_state: "off"

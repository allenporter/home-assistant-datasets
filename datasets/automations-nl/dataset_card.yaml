---
name: automations-nl
version: v0
language: nl
description: |-
  Een dataset voor het evalueren van het genereren van automatiseringen. De woningen
  in deze dataset zijn synthetisch gegenereerd met gpt-3.5. Deze dataset is in
  ontwikkeling en bevat slechts enkele eerste voorbeelden. Elke test maakt een
  synthetische woning aan en configureert de entiteiten met een bepaalde status,
  en vraagt vervolgens om een automatisering voor een specifieke set apparaten.

  De test laadt een synthetische woning en voert pytest uit met Home Assistant om
  scenario's te doorlopen die de automatisering zouden moeten activeren. Er worden
  ook punten gegeven voor het correct instellen van de invoer en elke test oefent
  verschillende scenario's die bijdragen aan de totale score. De verschillende
  scenario's zijn niet gewogen.
urls:

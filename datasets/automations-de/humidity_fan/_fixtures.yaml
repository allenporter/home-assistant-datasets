entities:
- name: Schlafzimmerlampe
  id: light.bedroom_light
  area: bedroom
  device: bedroom_light
  attributes:
    supported_color_modes:
    - brightness
    color_mode: brightness
    brightness: 100
- name: Badezimmerlampe
  id: light.bathroom_light
  area: bathroom
  device: bathroom_light
  state: 'off'
  attributes:
    supported_color_modes:
    - onoff
    color_mode: onoff
- name: Badezimmer-Abluftventilator
  id: fan.bathroom_exhaust_fan
  area: bathroom
  device: bathroom_exhaust_fan
  state: 'off'
- name: Luftfeuchtigkeit des Badezimmer-Abluftventilators
  id: sensor.bathroom_exhaust_fan_humidity
  area: bathroom
  device: bathroom_exhaust_fan
  state: '45'
  attributes:
    native_unit_of_measurement: '%'
    device_class: sensor.SensorDeviceClass.HUMIDITY
    state_class: sensor.SensorStateClass.MEASUREMENT
- name: Wohnzimmerlampe
  id: light.living_room_light
  area: living_room
  device: living_room_light
  attributes:
    supported_color_modes:
    - brightness
    color_mode: brightness
    brightness: 100
- name: Intelligenter Lautsprecher
  id: media_player.smart_speaker
  area: living_room
  device: smart_speaker
  state: playing
  attributes:
    device_class: media_player.MediaPlayerDeviceClass.SPEAKER
    supported_features:
    - media_player.MediaPlayerEntityFeature.PLAY
    - media_player.MediaPlayerEntityFeature.PAUSE
    - media_player.MediaPlayerEntityFeature.STOP
    - media_player.MediaPlayerEntityFeature.VOLUME_STEP
    - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
    - media_player.MediaPlayerEntityFeature.VOLUME_SET
    - media_player.MediaPlayerEntityFeature.TURN_ON
    - media_player.MediaPlayerEntityFeature.TURN_OFF
    - media_player.MediaPlayerEntityFeature.NEXT_TRACK
    - media_player.MediaPlayerEntityFeature.PREVIOUS_TRACK
    - media_player.MediaPlayerEntityFeature.PLAY_MEDIA
- name: "K\xFCchenlampe"
  id: light.kitchen_light
  area: kitchen
  device: kitchen_light
  attributes:
    supported_color_modes:
    - brightness
    color_mode: brightness
    brightness: 100
- name: Energie der Intelligenten Steckdose
  id: sensor.smart_plug_energy
  area: kitchen
  device: smart_plug
  state: '1'
  attributes:
    device_class: sensor.SensorDeviceClass.ENERGY
    state_class: sensor.SensorStateClass.TOTAL_INCREASING
    native_unit_of_measurement: kWh
- name: Intelligente Steckdose
  id: switch.smart_plug
  area: kitchen
  device: smart_plug
  state: true
  attributes:
    device_class: switch.SwitchDeviceClass.OUTLET
- name: Balkonlampe
  id: light.balcony_light
  area: balcony
  device: balcony_light
  state: 'off'
  attributes:
    supported_color_modes:
    - onoff
    color_mode: onoff
- name: Abstellraumlampe
  id: light.storage_room_light
  area: storage_room
  device: storage_room_light
  state: 'off'
  attributes:
    supported_color_modes:
    - onoff
    color_mode: onoff

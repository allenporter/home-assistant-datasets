entities:
  - name: "K\xFCchenlampe"
    id: light.kitchen_light
    area: kitchen
    device: kitchen_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: "K\xFChlschrank Generisch"
    id: sensor.refrigerator_generic
    area: kitchen
    device: refrigerator
    attributes:
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 0
  - name: "Energie des Geschirrsp\xFClers"
    id: sensor.dishwasher_energy
    area: kitchen
    device: dishwasher
    state: "1"
    attributes:
      device_class: sensor.SensorDeviceClass.ENERGY
      state_class: sensor.SensorStateClass.TOTAL_INCREASING
      native_unit_of_measurement: kWh
  - name: "Geschirrsp\xFCler"
    id: switch.dishwasher
    area: kitchen
    device: dishwasher
    state: true
    attributes:
      device_class: switch.SwitchDeviceClass.OUTLET
  - name: Energie des Backofens
    id: sensor.oven_energy
    area: kitchen
    device: oven
    state: "1"
    attributes:
      device_class: sensor.SensorDeviceClass.ENERGY
      state_class: sensor.SensorStateClass.TOTAL_INCREASING
      native_unit_of_measurement: kWh
  - name: Backofen
    id: switch.oven
    area: kitchen
    device: oven
    state: true
    attributes:
      device_class: switch.SwitchDeviceClass.OUTLET
  - name: Esszimmerlampe
    id: light.dining_room_light
    area: dining_room
    device: dining_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: "Eingangst\xFCr"
    id: binary_sensor.entry_door
    area: entry
    device: entry_door
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.DOOR
  - name: "Batterie der Eingangst\xFCr"

language: de
description: |-
  Ein Datensatz zur Bewertung der Automatisierungsgenerierung. Die Haushalte
  in diesem Datensatz wurden synthetisch mit gpt-3.5 erzeugt. Dieser
  Datensatz befindet sich in der Entwicklung und enthaelt nur wenige erste
  Beispiele. Jeder Test erstellt ein synthetisches Zuhause und konfiguriert
  die Entitaeten mit einem bestimmten Zustand, und fordert dann eine
  Automatisierung fuer eine bestimmte Gruppe von Geraeten an.

  Der Test laedt ein synthetisches Zuhause und fuehrt pytest mit Home Assistant
  aus, um Szenarien durchzuspielen, die die Automatisierung ausloesen sollten.
  Ausserdem werden Punkte fuer die richtigen Eingaben vergeben, und jeder Test
  prueft verschiedene Szenarien, die zur Gesamtpunktzahl beitragen. Die
  verschiedenen Szenarien sind nicht gewichtet.

---
category: vacuum
tests:
  - sentences:
      - Start de stofzuiger in de woonkamer
      - Start de Roborock Beneden stofzuiger
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning
  - sentences:
      - Stuur de Roborock Beneden terug naar de basis
      - Stuur de stofzuiger in de woonkamer terug naar de basis
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning

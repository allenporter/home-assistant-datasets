---
category: light
tests:
  - sentences:
      - Zet alsjeblieft de keukenlamp aan
    setup:
      light.kitchen_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.kitchen_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - Zet de woonkamerlamp aan
    setup:
      light.living_room_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - Zet de tuinverlichting aan
    setup:
      light.garden_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.garden_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - Keukenlamp uit
    setup:
      light.kitchen_light:
        state: "on"
        attributes:
          brightness: 100
    expect_changes:
      light.kitchen_light:
        state: "off"
        attributes:
          brightness: null
          color_mode: null
  - sentences:
      - Eetkamerlamp uit
    setup:
      light.dining_room_light:
        state: "on"
        attributes:
          brightness: 100
    expect_changes:
      light.dining_room_light:
        state: "off"
        attributes:
          brightness: null
          color_mode: null

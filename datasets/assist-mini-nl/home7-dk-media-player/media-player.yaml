---
category: media-player
tests:
  - sentences:
      - Pauzeer de buitenspeakers
      - Pauzeer de muziek op het dakterras
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: paused
  - sentences:
      - Hervat de buitenspeakers
      - Hervat de muziek op het dakterras
    setup:
      media_player.outdoor_speakers:
        state: paused
    expect_changes:
      media_player.outdoor_speakers:
        state: playing
  - sentences:
      - Sla het nummer over op de buitenspeakers
      - Ga naar het volgende nummer op de buitenspeakers
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          media_track: 1
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          media_track: 2
  - sentences:
      - Zet het volume van de buitenspeakers op 50%
      - Zet het volume op 50%
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.9
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.5
  - sentences:
      - Demp de buitenspeakers
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.6
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.0
  - sentences:
      - Zet de buitenspeakers uit
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: "off"
    ignore_changes:
      media_player.outdoor_speakers:
        - media_track
        - volume_level

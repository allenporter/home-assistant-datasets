---
areas:
  - name: Woonkamer
    id: living_room
devices:
  - name: Slim Gordijn
    id: smart_curtain
    area: living_room
    info:
      model: Fyrtur
      manufacturer: IKEA
      sw_version: 1.2.8
entities:
  - name: Slim Gordijn
    id: cover.smart_curtain
    area: living_room
    device: smart_curtain
    state: "closed"
    attributes:
      current_position: 0
      device_class: cover.CoverDeviceClass.CURTAIN
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
        - cover.CoverEntityFeature.SET_POSITION
  - name: Batterij Slim Gordijn
    id: sensor.smart_curtain_battery
    area: living_room
    device: smart_curtain
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"

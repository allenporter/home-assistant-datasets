---
areas:
  - name: Woonkamer
    id: living_room
  - name: Kitchenette
    id: kitchenette
  - name: Slaapkamer 1
    id: bedroom_1
  - name: Slaapkamer 2
    id: bedroom_2
  - name: Veranda
    id: front_porch
devices:
  - name: Woonkamerlamp
    id: living_room_light
    area: living_room
    info:
      model: ZigBee Smart Switch
      manufacturer: Aqara
      sw_version: 1.0.5
  - name: Houtkachel-Temperatuursensor
    id: wood_stove_temperature_sensor
    area: living_room
    info:
      model: Aqara Temperature and Humidity Sensor
      manufacturer: Aqara
      sw_version: 1.5.4
  - name: Kitchenette Lamp
    id: kitchenette_light
    area: kitchenette
    info:
      model: LED Bulb
      manufacturer: Yeelight
      sw_version: 2.0.9
  - name: Slaapkamer 1 Lamp
    id: bedroom_1_light
    area: bedroom_1
    info:
      model: Smart LED Bulb
      manufacturer: Xiaomi
      sw_version: 1.2.3
  - name: Slaapkamerventilator
    id: bedroom_fan
    area: bedroom_1
    info:
      model: SmartMi Fan
      manufacturer: Mi
      sw_version: 1.1.0
  - name: Slaapkamer 2 Lamp
    id: bedroom_2_light
    area: bedroom_2
    info:
      model: Smart LED Bulb
      manufacturer: Xiaomi
      sw_version: 1.2.3
  - name: Verandalamp
    id: porch_light
    area: front_porch
    info:
      model: Outdoor Smart Lighting
      manufacturer: Yeelight
      sw_version: 3.1.2
  - name: Bewegingssensor
    id: motion_sensor
    area: front_porch
    info:
      model: Mi Motion Sensor
      manufacturer: Xiaomi
      sw_version: 2.1.7
entities:
  - name: Woonkamerlamp
    id: light.living_room_light
    area: living_room
    device: living_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Houtkachel-Temperatuursensor Temperatuur
    id: sensor.wood_stove_temperature_sensor_temperature
    area: living_room
    device: wood_stove_temperature_sensor
    state: "70"
    attributes:
      native_unit_of_measurement: "\xB0C"
      device_class: sensor.SensorDeviceClass.TEMPERATURE
      state_class: sensor.SensorStateClass.MEASUREMENT
  - name: Houtkachel-Temperatuursensor Luchtvochtigheid
    id: sensor.wood_stove_temperature_sensor_humidity
    area: living_room
    device: wood_stove_temperature_sensor
    state: "45"
    attributes:
      native_unit_of_measurement: "%"
      device_class: sensor.SensorDeviceClass.HUMIDITY
      state_class: sensor.SensorStateClass.MEASUREMENT
  - name: Kitchenette Lamp
    id: light.kitchenette_light
    area: kitchenette
    device: kitchenette_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Slaapkamer 1 Lamp
    id: light.bedroom_1_light
    area: bedroom_1
    device: bedroom_1_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Slaapkamerventilator
    id: fan.bedroom_fan
    area: bedroom_1
    device: bedroom_fan
    state: "off"
    attributes:
      supported_features:
        - fan.FanEntityFeature.OSCILLATE
        - fan.FanEntityFeature.SET_SPEED
      oscillating: false
  - name: Slaapkamer 2 Lamp
    id: light.bedroom_2_light
    area: bedroom_2
    device: bedroom_2_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Verandalamp
    id: light.porch_light
    area: front_porch
    device: porch_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Bewegingssensor
    id: binary_sensor.motion_sensor
    area: front_porch
    device: motion_sensor
    state: true
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.MOTION
  - name: Bewegingssensor Batterij
    id: binary_sensor.motion_sensor_battery
    area: front_porch
    device: motion_sensor
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.BATTERY
  - name: Bewegingssensor Batterij
    id: sensor.motion_sensor_battery
    area: front_porch
    device: motion_sensor
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"

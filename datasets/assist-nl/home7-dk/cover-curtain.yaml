---
category: cover
tests:
  - sentences:
      - Open het slimme gordijn
      - Open het slimme gordijn in de woonkamer
      - Open de gordijnen in de woonkamer
    setup:
      cover.smart_curtain:
        state: closed
    expect_changes:
      cover.smart_curtain:
        state: open
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Sluit de slimme gordijnen
      - Sluit het gordijn in de woonkamer
      - Sluit de gordijnen
    setup:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.smart_curtain:
        state: closed
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Zet het slimme gordijn op 50%
      - Zet de gordijnen in de woonkamer op 50%
    setup:
      cover.smart_curtain:
        state: closed
    expect_changes:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    # Gaat niet direct naar 50% dus we kunnen niet controleren zonder vertraging
    ignore_changes:
      cover.smart_curtain:
        - current_position

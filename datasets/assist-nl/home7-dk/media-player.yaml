---
category: media-player
tests:
  - sentences:
      - Pauzeer de buitenspeakers
      - Pauzeer de muziek
      - Pauzeer de muziek buiten
      - Pauzeer de muziek op het dakterras
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: paused
  - sentences:
      - Hervat de buitenspeakers
      - Hervat het afspelen van de muziek
      - Ontpauzeer de buitenspeakers
      - Ontpauzeer de muziek op het dakterras
    setup:
      media_player.outdoor_speakers:
        state: paused
    expect_changes:
      media_player.outdoor_speakers:
        state: playing
  - sentences:
      - Sla het nummer over op de buitenspeakers
      - Ga naar het volgende nummer op de buitenspeakers
      - Volgend nummer
      - Ga naar het volgende nummer
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          media_track: 1
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          media_track: 2
  - sentences:
      - Zet het volume van de buitenspeakers op 50%
      - Zet het volume op 50%
      # Kan dit niet eenvoudig bijhouden
      # - Zet de muziek zachter
      # - Zet de muziek een beetje zachter alsjeblieft
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.9
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.5
  - sentences:
      - Demp de buitenspeakers
      - Demp de muziek
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.6
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.0
  - sentences:
      - Zet de buitenspeakers uit
      - Zet de muziek uit
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: "off"
    ignore_changes:
      media_player.outdoor_speakers:
        - media_track
        - volume_level

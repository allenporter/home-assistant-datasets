---
category: valve
tests:
  - sentences:
      - open de klep in de voortuin
      - open de irrigatieklep
      - zet het water in de voortuin aan
      - besproei de voortuin
      - besproei de tuin
    setup:
      valve.irrigation_valve:
        state: "closed"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
  - sentences:
      - sluit de klep in de voortuin
      - sluit de irrigatieklep
      - zet het water in de voortuin uit
    setup:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      valve.irrigation_valve:
        state: "closed"
        attributes:
          current_position: 0
  - sentences:
      - zet de irrigatieklep op 50%
    setup:
      valve.irrigation_valve:
        state: "open"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 50

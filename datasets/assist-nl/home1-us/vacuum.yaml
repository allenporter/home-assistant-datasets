---
category: vacuum
tests:
  - sentences:
      - Start Roborock Beneden
      - Start de Roborock Beneden stofzuiger
      - Start Roborock
      - Begin met stofzuigen
      - Stofzuig beneden
      - Maak de woonkamer schoon
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning
  - sentences:
      - Start de stofzuiger
      - Begin alsjeblieft met schoonmaken
      - Zet de stofzuiger aan
    context_device: nest_hub
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning

  - sentences:
      - Stuur Roborock Beneden terug naar de basis
      - Roborock Beneden terug naar de basis
      - Roborock terug naar de basis
      - Stofzuiger terug naar de basis
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning
  - sentences:
      - Stop Roborock Beneden
      - Stop de stofzuiger
      - Stop met stofzuigen
      - Stop de stofzuiger beneden
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning

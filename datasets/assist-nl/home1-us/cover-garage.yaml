---
category: cover
tests:
  - sentences:
      - Doe de garagedeur dicht
    setup:
      cover.garage_door_opener:
        state: open
    expect_changes:
      cover.garage_door_opener:
        state: closed
    ignore_changes:
      cover.garage_door_opener:
        - current_position
  - sentences:
      - Open de garagedeur alsjeblieft
      - Open de garagedeur
    setup:
      cover.garage_door_opener:
        state: closed
    expect_changes:
      cover.garage_door_opener:
        state: open
    ignore_changes:
      cover.garage_door_opener:
        - current_position

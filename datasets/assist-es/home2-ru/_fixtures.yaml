entities:
  - name: Luz de la Cocina
    id: light.kitchen_light
    area: kitchen
    device: kitchen_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Termostato
    id: climate.thermostat
    area: kitchen
    device: thermostat
    attributes:
      unit_of_measurement: "\xB0C"
      supported_features:
        - climate.ClimateEntityFeature.FAN_MODE
        - climate.ClimateEntityFeature.TURN_ON
        - climate.ClimateEntityFeature.TURN_OFF
        - climate.ClimateEntityFeature.TARGET_TEMPERATURE_RANGE
      hvac_modes:
        - "off"
        - cool
        - heat
        - auto
      hvac_mode: "off"
      hvac_action: "off"
      current_temperature: 22
      target_temperature: 22
  - name: Temperatura del Termostato
    id: sensor.thermostat_temperature
    area: kitchen
    device: thermostat
    attributes:
      native_unit_of_measurement: "\xB0C"
      device_class: sensor.SensorDeviceClass.TEMPERATURE
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 22
  - name: Humedad del Termostato
    id: sensor.thermostat_humidity
    area: kitchen
    device: thermostat
    attributes:
      native_unit_of_measurement: "%"
      device_class: sensor.SensorDeviceClass.HUMIDITY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 45
  - name: "Energ\xEDa de la Cafetera"
    id: sensor.coffee_maker_energy
    area: kitchen
    device: coffee_maker
    state: "1"
    attributes:
      device_class: sensor.SensorDeviceClass.ENERGY
      state_class: sensor.SensorStateClass.TOTAL_INCREASING
      native_unit_of_measurement: kWh
  - name: Cafetera
    id: switch.coffee_maker
    area: kitchen
    device: coffee_maker
    state: true
    attributes:
      device_class: switch.SwitchDeviceClass.OUTLET
  - name: "Luz del Sal\xF3n"
    id: light.living_room_light
    area: living_room
    device: living_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Luz del Comedor
    id: light.dining_room_light
    area: dining_room
    device: dining_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Luz del Dormitorio 1
    id: light.bedroom_1_light
    area: bedroom_1
    device: bedroom_1_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Luz del Dormitorio 2
    id: light.bedroom_2_light
    area: bedroom_2
    device: bedroom_2_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Luz del Dormitorio 3
    id: light.bedroom_3_light
    area: bedroom_3
    device: bedroom_3_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Luz del Dormitorio 4
    id: light.bedroom_4_light
    area: bedroom_4
    device: bedroom_4_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: "Luz del Jard\xEDn"
    id: light.garden_light
    area: front_yard
    device: garden_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: "V\xE1lvula de Riego"
    id: valve.irrigation_valve
    area: front_yard
    device: irrigation_valve
    attributes:
      reports_position: true
      supported_features:
        - valve.ValveEntityFeature.OPEN
        - valve.ValveEntityFeature.CLOSE
        - valve.ValveEntityFeature.SET_POSITION
      current_position: 0
  - name: "Lectura del Contador de la V\xE1lvula de Riego"
    id: sensor.irrigation_valve_meter_reading
    area: front_yard
    device: irrigation_valve
    state: "2000"
    attributes:
      native_unit_of_measurement: "m\xB3"
      device_class: sensor.SensorDeviceClass.WATER
      state_class: sensor.SensorStateClass.TOTAL_INCREASING
  - name: "Bater\xEDa de la V\xE1lvula de Riego"
    id: sensor.irrigation_valve_battery
    area: front_yard
    device: irrigation_valve
    state: "75"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"
  - name: Puerta del Garaje
    id: cover.garage_door
    area: garage
    device: garage_door
    state: false
    attributes:
      device_class: cover.CoverDeviceClass.GARAGE
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
  - name: Puerta del Garaje
    id: light.garage_door
    area: garage
    device: garage_door
    state: false
    attributes:
      supported_color_modes:
        - onoff
      color_mode:
        - onoff
  - name: "Movimiento de la C\xE1mara del Garaje"
    id: binary_sensor.garage_camera_motion
    area: garage
    device: garage_camera
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.MOTION
  - name: "Persona en la C\xE1mara del Garaje"
    id: binary_sensor.garage_camera_person
    area: garage
    device: garage_camera
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.OCCUPANCY
  - name: "Sonido de la C\xE1mara del Garaje"
    id: binary_sensor.garage_camera_sound
    area: garage
    device: garage_camera
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.SOUND

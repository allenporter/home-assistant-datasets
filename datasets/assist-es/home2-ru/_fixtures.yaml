  - name: Termostato
    id: thermostat
    area: kitchen
    info:
      model: Learning Thermostat
      manufacturer: Nest
      sw_version: 5.9.3
  - name: Cafetera
    id: coffee_maker
    area: kitchen
    info:
      model: S31 Lite zb
      manufacturer: SONOFF
      sw_version: 2.3.3.140
  - name: "Luz del Sal\xF3n"
    id: living_room_light
    area: living_room
    info:
      model: Dimmer Switch
      manufacturer: Philips
      sw_version: 2.47.8
  - name: Luz del Comedor
    id: dining_room_light
    area: dining_room
    info:
      model: Dimmer Switch
      manufacturer: Philips
      sw_version: 2.47.8
  - name: Luz del Dormitorio 1
    id: bedroom_1_light
    area: bedroom_1
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Luz del Dormitorio 2
    id: bedroom_2_light
    area: bedroom_2
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Luz del Dormitorio 3
    id: bedroom_3_light
    area: bedroom_3
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Luz del Dormitorio 4
    id: bedroom_4_light
    area: bedroom_4
    info:
      model: Smart LED Bulb
      manufacturer: Philips

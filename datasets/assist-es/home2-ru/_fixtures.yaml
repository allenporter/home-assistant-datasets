  - name: "Luz del Jard\xEDn"
    id: garden_light
    area: front_yard
    info:
      model: Outdoor Smart Light
      manufacturer: Philips
      sw_version: 1.5.9
  - name: "V\xE1lvula de Riego"
    id: irrigation_valve
    area: front_yard
    info:
      model: Smart Water Valve
      manufacturer: Moen
      sw_version: 3.2.1
  - name: Puerta del Garaje
    id: garage_door
    area: garage
    info:
      model: Smart Garage Door Opener
      manufacturer: Chamberlain
      sw_version: 4.5.6

---
category: valve
tests:
  - sentences:
      - "Abre la v\xE1lvula del jard\xEDn delantero"
      - "Abre la v\xE1lvula de riego"
      - "Enciende el agua del jard\xEDn delantero"
      - "Riega el jard\xEDn delantero"
      - "Riega el jard\xEDn"
    setup:
      valve.irrigation_valve:
        state: "closed"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
  - sentences:
      - "Cierra la v\xE1lvula del jard\xEDn delantero"
      - "Cierra la v\xE1lvula de riego"
      - "Apaga el agua del jard\xEDn delantero"
    setup:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      valve.irrigation_valve:
        state: "closed"
        attributes:
          current_position: 0
  - sentences:
      - "Pon la v\xE1lvula de riego al 50%"
    setup:
      valve.irrigation_valve:
        state: "open"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 50

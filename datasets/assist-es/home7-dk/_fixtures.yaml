  - name: Cafetera
    id: coffee_maker
    area: kitchen
    info:
      model: S31 Lite zb
      manufacturer: SONOFF
      sw_version: 2.3.3.140
  - name: Luz del Dormitorio 1
    id: bedroom_1_light
    area: bedroom_1
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Termostato del Dormitorio 1
    id: bedroom_1_thermostat
    area: bedroom_1
    info:
      model: Ecobee3 Lite
      manufacturer: Ecobee
      sw_version: 4.8.7.132
  - name: Luz del Dormitorio 2
    id: bedroom_2_light
    area: bedroom_2
    info:

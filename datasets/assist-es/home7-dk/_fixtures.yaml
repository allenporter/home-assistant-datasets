entities:
  - name: "Luz del Sal\xF3n"
    id: light.living_room_light
    area: living_room
    device: living_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: "Termostato del Sal\xF3n"
    id: climate.living_room_thermostat
    area: living_room
    device: living_room_thermostat
    attributes:
      unit_of_measurement: "\xB0C"
      supported_features:
        - climate.ClimateEntityFeature.FAN_MODE
        - climate.ClimateEntityFeature.TURN_ON
        - climate.ClimateEntityFeature.TURN_OFF
        - climate.ClimateEntityFeature.TARGET_TEMPERATURE_RANGE
      hvac_modes:
        - "off"
        - cool
        - heat
        - auto
      hvac_mode: "off"
      hvac_action: "off"
      current_temperature: 22
      target_temperature: 22
  - name: "Temperatura del Termostato del Sal\xF3n"
    id: sensor.living_room_thermostat_temperature
    area: living_room
    device: living_room_thermostat
    attributes:
      native_unit_of_measurement: "\xB0C"
      device_class: sensor.SensorDeviceClass.TEMPERATURE
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 22
  - name: "Humedad del Termostato del Sal\xF3n"
    id: sensor.living_room_thermostat_humidity
    area: living_room
    device: living_room_thermostat
    attributes:
      native_unit_of_measurement: "%"
      device_class: sensor.SensorDeviceClass.HUMIDITY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 45
  - name: Cortina Inteligente
    id: cover.smart_curtain
    area: living_room
    device: smart_curtain
    state: "closed"
    attributes:
      current_position: 0
      device_class: cover.CoverDeviceClass.CURTAIN
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
        - cover.CoverEntityFeature.SET_POSITION
  - name: "Bater\xEDa de la Cortina Inteligente"
    id: sensor.smart_curtain_battery
    area: living_room
    device: smart_curtain
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"
  - name: Luz de la Cocina
    id: light.kitchen_light
    area: kitchen
    device: kitchen_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: "Energ\xEDa de la Cafetera"
    id: sensor.coffee_maker_energy
    area: kitchen
    device: coffee_maker
    state: "1"
    attributes:
      device_class: sensor.SensorDeviceClass.ENERGY
      state_class: sensor.SensorStateClass.TOTAL_INCREASING
      native_unit_of_measurement: kWh
  - name: Cafetera
    id: switch.coffee_maker
    area: kitchen
    device: coffee_maker
    state: true
    attributes:
      device_class: switch.SwitchDeviceClass.OUTLET
  - name: Luz del Dormitorio 1
    id: light.bedroom_1_light
    area: bedroom_1
    device: bedroom_1_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Termostato del Dormitorio 1
    id: climate.bedroom_1_thermostat
    area: bedroom_1
    device: bedroom_1_thermostat
    attributes:
      unit_of_measurement: "\xB0C"

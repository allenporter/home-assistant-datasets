---
category: cover
tests:
  - sentences:
      - Abre la cortina inteligente
      - "Abre la cortina inteligente del sal\xF3n"
      - "Abre las cortinas del sal\xF3n"
    setup:
      cover.smart_curtain:
        state: closed
    expect_changes:
      cover.smart_curtain:
        state: open
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Cierra las cortinas inteligentes
      - "Cierra la cortina del sal\xF3n"
      - Cierra las cortinas
    setup:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.smart_curtain:
        state: closed
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Pon la cortina inteligente al 50%
      - "Pon las cortinas del sal\xF3n al 50%"
    setup:
      cover.smart_curtain:
        state: closed
    expect_changes:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    # Doesn't immediately open to 50% so we can't vet without a delay
    ignore_changes:
      cover.smart_curtain:
        - current_position

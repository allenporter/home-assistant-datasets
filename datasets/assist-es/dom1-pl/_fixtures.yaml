  - name: Tareas Personales
    id: todo.personal_tasks
    device: personal_tasks
    attributes:
      supported_features:
        - todo.TodoListEntityFeature.CREATE_TODO_ITEM
        - todo.TodoListEntityFeature.DELETE_TODO_ITEM

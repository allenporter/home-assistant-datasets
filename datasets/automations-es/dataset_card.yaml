name: automations-es
version: v0
language: es
description: |-
  Un conjunto de datos para evaluar la generacion de automatizaciones. Los hogares
  de este conjunto de datos fueron generados sinteticamente usando gpt-3.5. Este
  conjunto de datos esta en desarrollo y contiene solo unos pocos ejemplos iniciales.
  Cada prueba crea un hogar sintetico y configura las entidades con un estado
  particular, luego solicita una automatizacion para un conjunto especifico de
  dispositivos.

  La prueba carga un hogar sintetico y ejecuta pytest con Home Assistant para
  recorrer escenarios que deberian activar la automatizacion. Tambien otorga puntos
  por obtener las entradas correctas y cada prueba ejercita diferentes escenarios
  que se suman a la puntuacion general. Los distintos escenarios no estan ponderados.

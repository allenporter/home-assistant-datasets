---
areas:
  - name: "Sal\xF3n/Cocina/Dormitorio"
    id: living_room_kitchen_bedroom
  - name: "Ba\xF1o"
    id: bathroom
  - name: Terraza en la Azotea
    id: rooftop_terrace
devices:
  - name: Luz Principal
    id: main_light
    area: living_room_kitchen_bedroom
    info:
      model: Hue White and Color Ambiance
      manufacturer: Philips
      sw_version: 2.47.8
  - name: "L\xE1mpara"
    id: lamp
    area: living_room_kitchen_bedroom
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: TV
    id: tv
    area: living_room_kitchen_bedroom
    info:
      model: OLED C1 Series
      manufacturer: LG
      sw_version: webOS 6.0
  - name: Termostato
    id: thermostat
    area: living_room_kitchen_bedroom
    info:
      model: EB-STATe3L-01 3 Lite
      manufacturer: Ecobee
      sw_version: 4.8.7.132
  - name: Altavoz Inteligente
    id: smart_speaker
    area: living_room_kitchen_bedroom
    info:
      model: Echo Dot
      manufacturer: Amazon
      sw_version: 4th Gen
  - name: Aspirador
    id: vacuum_cleaner
    area: living_room_kitchen_bedroom
    info:
      model: S7+
      manufacturer: Roborock
      sw_version: 1.5.6
  - name: "Luz del Ba\xF1o"
    id: bathroom_light
    area: bathroom
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Sensor de Movimiento
    id: motion_sensor
    area: bathroom
    info:
      model: TriSensor
      manufacturer: Aeotec
      sw_version: v2.21
  - name: Extractor
    id: exhaust_fan
    area: bathroom
    info:
      model: Whisper Quiet
      manufacturer: Broan
      sw_version: 1.2.3
  - name: Luz Exterior
    id: outdoor_light
    area: rooftop_terrace
    info:
      model: Smart LED Bulb
      manufacturer: Philips
      sw_version: 1.2.3
  - name: Sensor de Movimiento de la Terraza
    id: rooftop_terrace_motion_sensor
    area: rooftop_terrace
    info:
      model: TriSensor
      manufacturer: Aeotec
      sw_version: v2.21
entities:
  - name: Luz Principal
    id: light.main_light
    area: living_room_kitchen_bedroom
    device: main_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: "L\xE1mpara"
    id: light.lamp
    area: living_room_kitchen_bedroom
    device: lamp
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: TV
    id: media_player.tv
    area: living_room_kitchen_bedroom
    device: tv
    state: playing
    attributes:
      device_class: media_player.MediaPlayerDeviceClass.TV
      supported_features:
        - media_player.MediaPlayerEntityFeature.PAUSE
        - media_player.MediaPlayerEntityFeature.VOLUME_STEP
        - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
        - media_player.MediaPlayerEntityFeature.VOLUME_SET
        - media_player.MediaPlayerEntityFeature.TURN_ON
        - media_player.MediaPlayerEntityFeature.TURN_OFF
  - name: Termostato
    id: climate.thermostat
    area: living_room_kitchen_bedroom
    device: thermostat
    attributes:
      unit_of_measurement: "\xB0C"
      supported_features:
        - climate.ClimateEntityFeature.FAN_MODE
        - climate.ClimateEntityFeature.TURN_ON
        - climate.ClimateEntityFeature.TURN_OFF
        - climate.ClimateEntityFeature.TARGET_TEMPERATURE_RANGE
      hvac_modes:
        - "off"
        - cool
        - heat
        - auto
      hvac_mode: "off"
      hvac_action: "off"
      current_temperature: 22
      target_temperature: 22
  - name: Temperatura del Termostato
    id: sensor.thermostat_temperature
    area: living_room_kitchen_bedroom
    device: thermostat
    attributes:
      native_unit_of_measurement: "\xB0C"
      device_class: sensor.SensorDeviceClass.TEMPERATURE
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 22
  - name: Humedad del Termostato
    id: sensor.thermostat_humidity
    area: living_room_kitchen_bedroom
    device: thermostat
    attributes:
      native_unit_of_measurement: "%"
      device_class: sensor.SensorDeviceClass.HUMIDITY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 45
  - name: Altavoz Inteligente
    id: media_player.smart_speaker
    area: living_room_kitchen_bedroom
    device: smart_speaker
    state: playing
    attributes:
      device_class: media_player.MediaPlayerDeviceClass.SPEAKER
      supported_features:
        - media_player.MediaPlayerEntityFeature.PLAY
        - media_player.MediaPlayerEntityFeature.PAUSE
        - media_player.MediaPlayerEntityFeature.STOP
        - media_player.MediaPlayerEntityFeature.VOLUME_STEP
        - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
        - media_player.MediaPlayerEntityFeature.VOLUME_SET
        - media_player.MediaPlayerEntityFeature.TURN_ON
        - media_player.MediaPlayerEntityFeature.TURN_OFF
        - media_player.MediaPlayerEntityFeature.NEXT_TRACK
        - media_player.MediaPlayerEntityFeature.PREVIOUS_TRACK
        - media_player.MediaPlayerEntityFeature.PLAY_MEDIA
  - name: Aspirador
    id: vacuum.vacuum_cleaner
    area: living_room_kitchen_bedroom
    device: vacuum_cleaner
    state: docked
    attributes:
      supported_features:
        - vacuum.VacuumEntityFeature.START
        - vacuum.VacuumEntityFeature.STOP
        - vacuum.VacuumEntityFeature.STATE
        - vacuum.VacuumEntityFeature.PAUSE
        - vacuum.VacuumEntityFeature.RETURN_HOME
  - name: "Luz del Ba\xF1o"
    id: light.bathroom_light
    area: bathroom
    device: bathroom_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Sensor de Movimiento
    id: binary_sensor.motion_sensor
    area: bathroom
    device: motion_sensor
    state: true
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.MOTION
  - name: "Bater\xEDa del Sensor de Movimiento"
    id: binary_sensor.motion_sensor_battery
    area: bathroom
    device: motion_sensor
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.BATTERY
  - name: "Bater\xEDa del Sensor de Movimiento"
    id: sensor.motion_sensor_battery
    area: bathroom
    device: motion_sensor
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"
  - name: Extractor
    id: fan.exhaust_fan
    area: bathroom
    device: exhaust_fan
    state: "off"
  - name: Humedad del Extractor
    id: sensor.exhaust_fan_humidity
    area: bathroom
    device: exhaust_fan
    state: "45"
    attributes:
      native_unit_of_measurement: "%"
      device_class: sensor.SensorDeviceClass.HUMIDITY
      state_class: sensor.SensorStateClass.MEASUREMENT
  - name: Luz Exterior
    id: light.outdoor_light
    area: rooftop_terrace
    device: outdoor_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Sensor de Movimiento de la Terraza
    id: binary_sensor.rooftop_terrace_motion_sensor
    area: rooftop_terrace
    device: rooftop_terrace_motion_sensor
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.MOTION
  - name: "Bater\xEDa del Sensor de Movimiento de la Terraza"
    id: binary_sensor.rooftop_terrace_motion_sensor_battery
    area: rooftop_terrace
    device: rooftop_terrace_motion_sensor
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.BATTERY
  - name: "Bater\xEDa del Sensor de Movimiento de la Terraza"
    id: sensor.rooftop_terrace_motion_sensor_battery
    area: rooftop_terrace
    device: rooftop_terrace_motion_sensor
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"

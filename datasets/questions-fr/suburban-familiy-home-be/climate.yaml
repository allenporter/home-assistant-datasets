# sensor.guest_room_thermostat_temperature
# climate.guest_room_thermostat
---
category:
  - climate
  - question
tests:
  - sentences:
      - "Si la température dans la chambre d'amis est supérieure à 23, alors régler la température cible à 22"
    setup:
      sensor.guest_room_thermostat_temperature:
        attributes:
          native_value: 25
      climate.guest_room_thermostat:
        state: "cool"
        attributes:
          hvac_mode: "cool"
          current_temperature: 25
          target_temperature: 26
    expect_changes:
      climate.guest_room_thermostat:
        attributes:
          temperature: 22.0

  # No change is expected since the temp is below the target
  - sentences:
      - "Régler la température cible à 22 dans la chambre d'amis si elle est supérieure à 23"
    setup:
      sensor.guest_room_thermostat_temperature:
        attributes:
          native_value: 21
      climate.guest_room_thermostat:
        state: "cool"
        attributes:
          hvac_mode: "cool"
          current_temperature: 21
          target_temperature: 21
    expect_changes:
      # No change
      climate.guest_room_thermostat:
        state: "cool"

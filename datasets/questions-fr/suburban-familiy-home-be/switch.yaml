---
category:
  - switch
  - question
tests:
  - sentences:
      - "Est-ce que la prise électroménager est allumée ?"
    setup:
      switch.kitchen_appliance_plug:
        state: "on"
    expect_response:
      - "yes"
      - "on"

  - sentences:
      - "Est-ce que la prise de la cuisine est allumée ?"
    setup:
      switch.kitchen_appliance_plug:
        state: "off"
    expect_response:
      - "no"
      - "off"

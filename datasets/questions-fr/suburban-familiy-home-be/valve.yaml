---
category:
  - valve
  - question
tests:
  - sentences:
      - "Est-ce que les arroseurs sont ouverts ?"
    setup:
      valve.sprinklers:
        state: "open"
    expect_response:
      - "yes"
      - "on"
      - open

  - sentences:
      - "Dis-moi, est-ce que les arroseurs sont ouverts ?"
    setup:
      valve.sprinklers:
        state: "closed"
    expect_response:
      - "no"
      - "off"
      - closed

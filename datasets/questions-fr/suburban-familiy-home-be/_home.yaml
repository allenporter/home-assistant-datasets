# thought: The house is in Belgium, which has a temperate climate, suggesting a need for both heating and cooling.
# thought: The family home has many rooms suggesting a need for several lights, smart plugs for appliances, and more than one thermostat.
# thought: The backyard with a vegetable garden suggests a need for smart sprinklers.
# thought: The garage with two cars suggests a need for a smart garage door opener.
---
name: Maison Familiale de Banlieue
country_code: BE
location: Louvain, Belgique
type: Maison individuelle
amenities:
  - 4 chambres
  - 2,5 salles de bain
  - Salle familiale
  - "Salle \xe0 manger formelle"
  - "Jardin avec potager"
  - "Garage attach\xe9 pour deux voitures"
areas:
  - Cuisine
  - Salon
  - Salle Familiale
  - "Salle \xe0 Manger"
  - Jardin
  - Garage
  - Chambre Principale
  - "Chambre d'Enfant 1"
  - "Chambre d'Enfant 2"
  - "Chambre d'Amis"
  - Jardin Avant
devices:
  Cuisine:
    - name: "Lumi\xe8re de la Cuisine"
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: "Prise \xc9lectrom\xe9nager"
      device_type: smart-plug
      device_info:
        model: Smart Plug
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: "\xc9vier de Cuisine"

---
category:
  - sensor
  - question
tests:
  - sentences:
      - "Est-ce que la batterie de l'évier de cuisine est faible ?"
    setup:
      sensor.kitchen_sink_battery:
        state: "15"
    expect_response:
      - "yes"
      - "15"
  - sentences:
      - "Est-ce que la batterie de l'évier de cuisine est faible ?"
    setup:
      sensor.kitchen_sink_battery:
        state: "95"
    expect_response:
      - "no"
      - "95"

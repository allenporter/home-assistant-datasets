---
category:
  - light
  - question
tests:
  - sentences:
      - "Combien de lumi\xe8res sont actuellement allum\xe9es ?"
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
      light.balcony_light:
        state: "on"
    expect_response:
      - "2"
      - deux
      # We don't check for both names and assume if either is present that it worked
      - chambre
      - balcon

  - sentences:
      - "Est-ce que la lumi\xe8re de la chambre est allum\xe9e ?"
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
    expect_response:
      - "yes"
      - "on"

  - sentences:
      - "Est-ce que la lumi\xe8re de la chambre est \xe9teinte ?"
    setup:
      light.bedroom_light:
        state: "on"
        attributes:
          brightness: 100
    expect_response:
      - "no"
      - "on"

  - sentences:
      - "Est-ce que la lumi\xe8re de la chambre est allum\xe9e ? R\xe9pondez par \"oui\" ou \"non\"."
    setup:
      light.bedroom_light:
        state: "off"
    expect_response:
      - "no"
      - "off"

  - sentences:
      - "Est-ce que la lumi\xe8re de la chambre est \xe9teinte ? R\xe9pondez par \"oui\" ou \"non\"."
    setup:
      light.bedroom_light:
        state: "off"
    expect_response:
      - "yes"
      - "off"

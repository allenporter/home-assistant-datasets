---
category:
  - weather
  - question
tests:
  - sentences:
      - "Quelle est la temp\xe9rature ext\xe9rieure ?"
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "30"
          native_temperature_unit: "\xB0C"
          condition: "sunny"
    expect_response:
      - 30

  - sentences:
      - "Est-ce qu'il fait beau ou nuageux aujourd'hui ?"
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "62"
          native_temperature_unit: "\xB0F"
          condition: "cloudy"
    expect_response:
      - cloudy

  - sentences:
      - "Est-ce que le temps sera ensoleill\xe9 ou nuageux aujourd'hui ?"
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "75"
          native_temperature_unit: "\xB0F"
          condition: "sunny"
    expect_response:
      - sunny

---
category: cover
tests:
  - sentences:
      - Öffne den smarten Vorhang
      - Öffne den smarten Vorhang im Wohnzimmer
      - Öffne die Wohnzimmervorhänge
    setup:
      cover.smart_curtain:
        state: closed
    expect_changes:
      cover.smart_curtain:
        state: open
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Schließe die smarten Vorhänge
      - Schließe den Wohnzimmervorhang
      - Schließe die Vorhänge
    setup:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.smart_curtain:
        state: closed
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Stelle den smarten Vorhang auf 50%
      - Stelle die Wohnzimmervorhänge auf 50%
    setup:
      cover.smart_curtain:
        state: closed
    expect_changes:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    # Doesn't immediately open to 50% so we can't vet without a delay
    ignore_changes:
      cover.smart_curtain:
        - current_position

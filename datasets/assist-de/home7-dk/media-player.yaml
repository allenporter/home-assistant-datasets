---
category: media-player
tests:
  - sentences:
      - Pausiere die Außenlautsprecher
      - Pausiere die Musik
      - Pausiere die Musik draußen
      - Pausiere die Musik auf der Dachterrasse
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: paused
  - sentences:
      - Setze die Außenlautsprecher fort
      - Spiele die Musik weiter ab
      - Fortsetzen der Außenlautsprecher
      - Setze die Musik auf der Dachterrasse fort
    setup:
      media_player.outdoor_speakers:
        state: paused
    expect_changes:
      media_player.outdoor_speakers:
        state: playing
  - sentences:
      - Überspringe das Lied auf den Außenlautsprechern
      - Springe zum nächsten Titel auf den Außenlautsprechern
      - Nächstes Lied
      - Springe zum nächsten Titel
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          media_track: 1
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          media_track: 2
  - sentences:
      - Stelle die Lautstärke der Außenlautsprecher auf 50%
      - Drehe die Lautstärke auf 50% runter
      # Kann nicht einfach nachverfolgt werden
      # - Drehe die Musik leiser
      # - Mach die Musik bitte etwas leiser
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.9
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.5
  - sentences:
      - Schalte die Außenlautsprecher stumm
      - Schalte die Musik stumm
    setup:
      media_player.outdoor_speakers:
        state: playing
        attributes:
          volume_level: 0.6
    expect_changes:
      media_player.outdoor_speakers:
        attributes:
          volume_level: 0.0
  - sentences:
      - Schalte die Außenlautsprecher aus
      - Schalte die Musik aus
    setup:
      media_player.outdoor_speakers:
        state: playing
    expect_changes:
      media_player.outdoor_speakers:
        state: "off"
    ignore_changes:
      media_player.outdoor_speakers:
        - media_track
        - volume_level

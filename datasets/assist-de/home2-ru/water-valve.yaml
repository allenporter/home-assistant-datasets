---
category: valve
tests:
  - sentences:
      - Öffne das Ventil im Vorgarten
      - Öffne das Bewässerungsventil
      - Schalte das Wasser im Vorgarten ein
      - Bewässere den Vorgarten
      - Bewässere den Garten
    setup:
      valve.irrigation_valve:
        state: "closed"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
  - sentences:
      - Schließe das Ventil im Vorgarten
      - Schließe das Bewässerungsventil
      - Schalte das Wasser im Vorgarten aus
    setup:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 100
    expect_changes:
      valve.irrigation_valve:
        state: "closed"
        attributes:
          current_position: 0
  - sentences:
      - Stelle das Bewässerungsventil auf 50%
    setup:
      valve.irrigation_valve:
        state: "open"
    expect_changes:
      valve.irrigation_valve:
        state: "open"
        attributes:
          current_position: 50

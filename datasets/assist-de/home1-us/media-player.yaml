---
category: media-player
tests:
  # Kontext vom Gerät ableiten
  - sentences:
      - Stelle die Lautstärke auf 0%
    context_device: nest_hub
    setup:
      media_player.smart_speaker:
        state: playing
        attributes:
          volume_level: 0.8
      media_player.nest_hub:
        state: playing
        attributes:
          volume_level: 0.8
    expect_changes:
      media_player.nest_hub:
        attributes:
          volume_level: 0.0

  # Kontext von einem anderen Gerät ableiten
  - sentences:
      - Stelle die Lautstärke auf 0%
    context_device: smart_speaker
    setup:
      media_player.smart_speaker:
        state: playing
        attributes:
          volume_level: 0.8
      media_player.nest_hub:
        state: playing
        attributes:
          volume_level: 0.8
    expect_changes:
      media_player.smart_speaker:
        attributes:
          volume_level: 0.0

  # Das ist mehrdeutig, da Bereich/Gerät unklar ist. Erwarte
  # dass Geräte aktualisiert werden.
  - sentences:
      - Stelle die Lautstärke auf 0%
    setup:
      media_player.smart_speaker:
        state: playing
        attributes:
          volume_level: 0.8
      media_player.nest_hub:
        state: playing
        attributes:
          volume_level: 0.8
    expect_changes: {}

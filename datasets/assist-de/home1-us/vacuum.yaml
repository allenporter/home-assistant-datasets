---
category: vacuum
tests:
  - sentences:
      - Starte Roborock Erdgeschoss
      - Starte den Roborock Erdgeschoss Staubsauger
      - Starte den Roborock
      - Fang an zu saugen
      - Sauge das Erdgeschoss
      - Reinige das Wohnzimmer
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning
  - sentences:
      - Starte den Staubsauger
      - Bitte fang an zu reinigen
      - Schalte den Staubsauger ein
    context_device: nest_hub
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning

  - sentences:
      - Schicke Roborock Erdgeschoss zur Ladestation
      - Roborock Erdgeschoss zurück zur Basis
      - Roborock zurück zur Basis
      - Staubsauger zurück zur Basis
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning
  - sentences:
      - Stoppe Roborock Erdgeschoss
      - Stoppe den Staubsauger
      - Hör auf zu saugen
      - Stoppe den Staubsauger im Erdgeschoss
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning

---
category: lock
tests:
  - sentences:
      - Schließe das Eingangstürschloss ab
      - Sperre das Eingangsschloss
      - Sperre das smarte Schloss
    setup:
      lock.smart_lock:
        state: unlocked
    expect_changes:
      lock.smart_lock:
        state: locked
  - sentences:
      - Entsperre das Eingangsschloss
      - Entsperre das smarte Schloss
    setup:
      lock.smart_lock:
        state: locked
    expect_changes:
      lock.smart_lock:
        state: unlocked
  # Ambiguous sentence should not lock any locks and should instead ask for an area
  - sentences:
      - Schließe bitte alle Schlösser ab
      - Sperre das Schloss
      - Schließe die Tür ab
    setup:
      lock.smart_lock:
        state: unlocked
      lock.rear_door_lock:
        state: unlocked
    expect_changes:
      lock.smart_lock:
        state: unlocked
      lock.rear_door_lock:
        state: unlocked
  - sentences:
      - Entsperre alle Türen
    setup:
      lock.smart_lock:
        state: locked
      lock.rear_door_lock:
        state: locked
    expect_changes:
      lock.smart_lock:
        state: locked
      lock.rear_door_lock:
        state: locked

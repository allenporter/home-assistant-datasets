entities:
  - name: Luz de la Cocina
    id: light.kitchen_light
    area: kitchen
    device: kitchen_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Energia del Enchufe de Electrodomesticos
    id: sensor.kitchen_appliance_plug_energy
    area: kitchen
    device: kitchen_appliance_plug
    state: "1"
    attributes:
      device_class: sensor.SensorDeviceClass.ENERGY
      state_class: sensor.SensorStateClass.TOTAL_INCREASING
      native_unit_of_measurement: kWh
  - name: Enchufe de Electrodomesticos
    id: switch.kitchen_appliance_plug
    area: kitchen
    device: kitchen_appliance_plug
    state: true
    attributes:
      device_class: switch.SwitchDeviceClass.OUTLET
  - name: Fregadero de la Cocina
    id: valve.kitchen_sink
    area: kitchen
    device: kitchen_sink
    attributes:
      reports_position: true
      supported_features:
        - valve.ValveEntityFeature.OPEN
        - valve.ValveEntityFeature.CLOSE
        - valve.ValveEntityFeature.SET_POSITION
      current_valve_position: 0
  - name: Lectura del Medidor del Fregadero de la Cocina
    id: sensor.kitchen_sink_meter_reading
    area: kitchen
    device: kitchen_sink
    state: "2000"
    attributes:
      native_unit_of_measurement: "m\xB3"
      device_class: sensor.SensorDeviceClass.WATER
      state_class: sensor.SensorStateClass.TOTAL_INCREASING
  - name: Bateria del Fregadero de la Cocina
    id: sensor.kitchen_sink_battery
    area: kitchen
    device: kitchen_sink
    state: "75"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"
  - name: Refrigerador Generico
    id: sensor.refrigerator_generic
    area: kitchen
    device: refrigerator
    attributes:
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 0
  - name: Luz del Salon
    id: light.living_room_light
    area: living_room
    device: living_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Altavoz Inteligente
    id: media_player.smart_speaker
    area: living_room
    device: smart_speaker
    state: playing
    attributes:
      device_class: media_player.MediaPlayerDeviceClass.SPEAKER
      supported_features:
        - media_player.MediaPlayerEntityFeature.PLAY
        - media_player.MediaPlayerEntityFeature.PAUSE
        - media_player.MediaPlayerEntityFeature.STOP
        - media_player.MediaPlayerEntityFeature.VOLUME_STEP
        - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
        - media_player.MediaPlayerEntityFeature.VOLUME_SET
        - media_player.MediaPlayerEntityFeature.TURN_ON
        - media_player.MediaPlayerEntityFeature.TURN_OFF
        - media_player.MediaPlayerEntityFeature.NEXT_TRACK
        - media_player.MediaPlayerEntityFeature.PREVIOUS_TRACK
        - media_player.MediaPlayerEntityFeature.PLAY_MEDIA
  - name: Televisor
    id: media_player.tv
    area: living_room
    device: tv
    state: playing
    attributes:
      device_class: media_player.MediaPlayerDeviceClass.TV
      supported_features:
        - media_player.MediaPlayerEntityFeature.PAUSE
        - media_player.MediaPlayerEntityFeature.VOLUME_STEP
        - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
        - media_player.MediaPlayerEntityFeature.VOLUME_SET
        - media_player.MediaPlayerEntityFeature.TURN_ON
        - media_player.MediaPlayerEntityFeature.TURN_OFF
  - name: Luz de la Sala Familiar
    id: light.family_room_light
    area: family_room
    device: family_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Luz del Comedor
    id: light.dining_room_light
    area: dining_room
    device: dining_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Luz del Jardin Trasero
    id: light.backyard_light
    area: backyard
    device: backyard_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Aspersores
    id: valve.sprinklers
    area: backyard
    device: sprinklers
    state: closed
    attributes:
      supported_features:
        - valve.ValveEntityFeature.OPEN
        - valve.ValveEntityFeature.CLOSE
  - name: Puerta del Garaje
    id: cover.garage_door
    area: garage
    device: garage_door
    state: false
    attributes:
      device_class: cover.CoverDeviceClass.GARAGE
      supported_features:
        - cover.CoverEntityFeature.OPEN
        - cover.CoverEntityFeature.CLOSE
  - name: Puerta del Garaje
    id: light.garage_door
    area: garage
    device: garage_door
    state: false
    attributes:
      supported_color_modes:
        - onoff
      color_mode:
        - onoff
  - name: Luz del Garaje
    id: light.garage_light
    area: garage
    device: garage_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff
  - name: Luz del Dormitorio Principal
    id: light.master_bedroom_light
    area: master_bedroom
    device: master_bedroom_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Termostato del Dormitorio Principal
    id: climate.master_bedroom_thermostat
    area: master_bedroom
    device: master_bedroom_thermostat
    attributes:
      unit_of_measurement: "\xB0C"
      supported_features:
        - climate.ClimateEntityFeature.FAN_MODE
        - climate.ClimateEntityFeature.TURN_ON
        - climate.ClimateEntityFeature.TURN_OFF
        - climate.ClimateEntityFeature.TARGET_TEMPERATURE_RANGE
      hvac_modes:
        - "off"
        - cool
        - heat
        - auto
      hvac_mode: "off"
      hvac_action: "off"
      current_temperature: 22
      target_temperature: 22
  - name: Temperatura del Termostato del Dormitorio Principal
    id: sensor.master_bedroom_thermostat_temperature
    area: master_bedroom
    device: master_bedroom_thermostat
    attributes:
      native_unit_of_measurement: "\xB0C"
      device_class: sensor.SensorDeviceClass.TEMPERATURE
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 22
  - name: Humedad del Termostato del Dormitorio Principal
    id: sensor.master_bedroom_thermostat_humidity
    area: master_bedroom
    device: master_bedroom_thermostat
    attributes:
      native_unit_of_measurement: "%"
      device_class: sensor.SensorDeviceClass.HUMIDITY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 45
  - name: Luz de la Habitacion de Ninos 1
    id: light.kids_room_1_light
    area: kids_room_1
    device: kids_room_1_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Luz de la Habitacion de Ninos 2
    id: light.kids_room_2_light
    area: kids_room_2
    device: kids_room_2_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Luz de la Habitacion de Invitados
    id: light.guest_room_light
    area: guest_room
    device: guest_room_light
    attributes:
      supported_color_modes:
        - brightness
      color_mode: brightness
      brightness: 100
  - name: Termostato de la Habitacion de Invitados
    id: climate.guest_room_thermostat
    area: guest_room
    device: guest_room_thermostat
    attributes:
      unit_of_measurement: "\xB0C"
      supported_features:
        - climate.ClimateEntityFeature.FAN_MODE
        - climate.ClimateEntityFeature.TURN_ON
        - climate.ClimateEntityFeature.TURN_OFF
        - climate.ClimateEntityFeature.TARGET_TEMPERATURE_RANGE
        - climate.ClimateEntityFeature.TARGET_TEMPERATURE
      hvac_modes:
        - "off"
        - cool
        - heat
        - auto
      hvac_mode: "off"
      hvac_action: "off"
      current_temperature: 22
      target_temperature: 22
  - name: Temperatura del Termostato de la Habitacion de Invitados
    id: sensor.guest_room_thermostat_temperature
    area: guest_room
    device: guest_room_thermostat
    attributes:
      native_unit_of_measurement: "\xB0C"
      device_class: sensor.SensorDeviceClass.TEMPERATURE
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 22
  - name: Humedad del Termostato de la Habitacion de Invitados
    id: sensor.guest_room_thermostat_humidity
    area: guest_room
    device: guest_room_thermostat
    attributes:
      native_unit_of_measurement: "%"
      device_class: sensor.SensorDeviceClass.HUMIDITY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_value: 45
  - name: Luz del Jardin Delantero
    id: light.front_yard_light
    area: front_yard
    device: front_yard_light
    state: "off"
    attributes:
      supported_color_modes:
        - onoff
      color_mode: onoff

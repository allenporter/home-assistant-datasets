---
category:
  - valve
  - question
tests:
  - sentences:
      - "\xBFEst\xE1n encendidos los aspersores?"
    setup:
      valve.sprinklers:
        state: "open"
    expect_response:
      - "yes"
      - "on"
      - open

  - sentences:
      - "Por favor dime, \xBFest\xE1n encendidos los aspersores?"
    setup:
      valve.sprinklers:
        state: "closed"
    expect_response:
      - "no"
      - "off"
      - closed

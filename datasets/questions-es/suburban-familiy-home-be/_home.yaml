# pensamiento: La casa esta en Belgica, que tiene un clima templado, lo que sugiere la necesidad de calefaccion y refrigeracion.
# pensamiento: La casa familiar tiene muchas habitaciones, lo que sugiere la necesidad de varias luces, enchufes inteligentes para electrodomesticos, y mas de un termostato.
# pensamiento: El jardin trasero con un huerto sugiere la necesidad de aspersores inteligentes.
# pensamiento: El garaje con dos coches sugiere la necesidad de un abridor de puerta de garaje inteligente.
---
name: Casa Familiar Suburbana
country_code: BE
location: Lovaina, Belgica
type: Casa unifamiliar
amenities:
  - 4 dormitorios
  - 2.5 banos
  - Sala familiar
  - Comedor formal
  - Jardin trasero con huerto
  - Garaje adjunto para dos coches
areas:
  - Cocina
  - Salon
  - Sala Familiar
  - Comedor
  - Jardin Trasero
  - Garaje
  - Dormitorio Principal
  - Habitacion de Ninos 1
  - Habitacion de Ninos 2
  - Habitacion de Invitados
  - Jardin Delantero
devices:
  Cocina:
    - name: Luz de la Cocina
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Enchufe de Electrodomesticos
      device_type: smart-plug
      device_info:
        model: Smart Plug
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Fregadero de la Cocina
      device_type: water-valve
      device_info:
        model: Smart Water Valve
        manufacturer: Moen
        sw_version: 1.0.0
    - name: Refrigerador
      device_type: sensor
      device_info:
        model: Smart Fridge
        manufacturer: Samsung
        sw_version: 1.1.1
      attributes:
        - unit_of_measure: "\xB0C"
  Salon:
    - name: Luz del Salon
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Altavoz Inteligente
      device_type: smart-speaker
      device_info:
        model: Echo Dot
        manufacturer: Amazon
        sw_version: 4th Gen
    - name: Televisor
      device_type: smart-tv
      device_info:
        model: Samsung 4K TV
        manufacturer: Samsung
        sw_version: 1.0.0
  Sala Familiar:
    - name: Luz de la Sala Familiar
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Comedor:
    - name: Luz del Comedor
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Jardin Trasero:
    - name: Luz del Jardin Trasero
      device_type: light
      device_info:
        model: Smart Outdoor Light
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Aspersores
      device_type: smart-sprinkler
      device_info:
        model: Smart Sprinkler System
        manufacturer: Rachio
        sw_version: 1.0.0
  Garaje:
    - name: Puerta del Garaje
      device_type: garage-door
      device_info:
        model: Smart Garage Door Opener
        manufacturer: Chamberlain
        sw_version: 1.0.0
    - name: Luz del Garaje
      device_type: light
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Dormitorio Principal:
    - name: Luz del Dormitorio Principal
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Termostato del Dormitorio Principal
      device_type: hvac
      device_info:
        model: Nest Thermostat
        manufacturer: Nest
        sw_version: 1.0.0
      attributes:
        - unit_of_measure: "\xB0C"
  Habitacion de Ninos 1:
    - name: Luz de la Habitacion de Ninos 1
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Habitacion de Ninos 2:
    - name: Luz de la Habitacion de Ninos 2
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
  Habitacion de Invitados:
    - name: Luz de la Habitacion de Invitados
      device_type: light-dimmable
      device_info:
        model: Smart LED Bulb
        manufacturer: Philips
        sw_version: 1.2.3
    - name: Termostato de la Habitacion de Invitados
      device_type: hvac
      device_info:
        model: Nest Thermostat
        manufacturer: Nest
        sw_version: 1.0.0
      attributes:
        - unit_of_measure: "\xB0C"
  Jardin Delantero:
    - name: Luz del Jardin Delantero
      device_type: light
      device_info:
        model: Smart Outdoor Light
        manufacturer: Philips
        sw_version: 1.2.3

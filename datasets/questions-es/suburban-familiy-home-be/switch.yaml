---
category:
  - switch
  - question
tests:
  - sentences:
      - "\xBFEst\xE1 encendido el enchufe de la cocina?"
    setup:
      switch.kitchen_appliance_plug:
        state: "on"
    expect_response:
      - "yes"
      - "on"

  - sentences:
      - "\xBFEst\xE1 encendido el enchufe en la cocina?"
    setup:
      switch.kitchen_appliance_plug:
        state: "off"
    expect_response:
      - "no"
      - "off"

# thought: Since the loft apartment is in a city center, we can suggest a modern and minimalist design for the smart home devices.
# thought: Given the open-concept living space with exposed brick walls, we can suggest a smart lighting system that highlights the architectural details.
# thought: There are no device-types for a smart speaker so we will omit those, but there are other appropriate devices like a motion sensor
---
name: Loft Urbano
country_code: AU
location: Centro de la ciudad en Melbourne
type: Apartamento tipo loft
amenities:
  - 1 dormitorio
  - 1 bano
  - Espacio abierto con paredes de ladrillo visto
  - Cocina moderna con electrodomesticos de acero inoxidable
  - Balcon estilo Julieta con vistas a la ciudad
  - Terraza compartida en la azotea con zona de barbacoa
areas:
  - Salon
  - Dormitorio
  - Balcon
  - Cocina
  - Terraza en la Azotea
devices:
  Salon:
    - name: Salon
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
    - name: Samsung
      device_type: smart-tv
      device_info:
        model: QN43Q60A
        manufacturer: Samsung
        sw_version: 1600.1
  Dormitorio:
    - name: Luz del Dormitorio
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
  Balcon:
    - name: Luz del Balcon
      device_type: light
      device_info:
        model: Tapo Smart Wi-fi Light Switch
        manufacturer: TP-Link
        sw_version: 1.2.3
  Cocina:
    - name: Luz de la Cocina
      device_type: light-dimmable
      device_info:
        model: Hue White and Color Ambiance
        manufacturer: Philips
        sw_version: 2.20.1
  Terraza en la Azotea:
    - name: Sensor de Movimiento
      device_type: motion-sensor
      device_info:
        model: Outdoor Motion Sensor
        manufacturer: Aqara
        sw_version: 1.4.4
    - name: Luz de la Terraza
      device_type: light
      device_info:
        model: Tapo Smart Wi-fi Light Switch
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Enchufe Inteligente
      device_type: smart-plug
      device_info:
        model: Kasa Smart Plug Mini
        manufacturer: TP-Link
        sw_version: 1.2.3
    - name: Servicio Meteorologico
      device_type: weather-service
      device_info:
        model: Weather Underground
        manufacturer: Weather Underground
        sw_version: 2.2.2
services:
  - name: Tareas
    device_type: todo-list
  - name: Personal
    device_type: calendar

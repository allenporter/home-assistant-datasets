---
category:
  - weather
  - question
tests:
  - sentences:
      - "\xBFCu\xE1l es la temperatura exterior?"
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "30"
          native_temperature_unit: "\xB0C"
          condition: "sunny"
    expect_response:
      - 30

  - sentences:
      - "\xBFHoy est\xE1 soleado o nublado?"
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "62"
          native_temperature_unit: "\xB0F"
          condition: "cloudy"
    expect_response:
      - cloudy


  - sentences:
      - "\xBFEl clima de hoy ser\xE1 soleado o nublado?"
    setup:
      weather.weather_service:
        attributes:
          native_temperature: "75"
          native_temperature_unit: "\xB0F"
          condition: "sunny"
    expect_response:
      - sunny

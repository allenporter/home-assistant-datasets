---
category: light
tests:
  - sentences:
      - Stelle das Wohnzimmerlicht auf 50% Helligkeit
    setup:
      light.living_room_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 128
          color_mode: brightness
  - sentences:
      - Stelle das Wohnzimmerlicht auf 50% Helligkeit
    setup:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 255
          color_mode: brightness
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 128
          color_mode: brightness

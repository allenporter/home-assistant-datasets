---
category: light
tests:
  - sentences:
      - Bitte schalte das Küchenlicht ein
    setup:
      light.kitchen_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.kitchen_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - Schalte das Wohnzimmerlicht ein
    setup:
      light.living_room_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.living_room_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - Schalte die Gartenbeleuchtung ein
    setup:
      light.garden_light:
        state: "off"
        attributes:
          brightness: 0
    expect_changes:
      light.garden_light:
        state: "on"
        attributes:
          brightness: 0
          color_mode: brightness
  - sentences:
      - Küchenlicht aus
    setup:
      light.kitchen_light:
        state: "on"
        attributes:
          brightness: 100
    expect_changes:
      light.kitchen_light:
        state: "off"
        attributes:
          brightness: null
          color_mode: null
  - sentences:
      - Esszimmerlicht aus
    setup:
      light.dining_room_light:
        state: "on"
        attributes:
          brightness: 100
    expect_changes:
      light.dining_room_light:
        state: "off"
        attributes:
          brightness: null
          color_mode: null

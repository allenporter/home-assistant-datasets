---
category: vacuum
tests:
  - sentences:
      - Starte den Staubsauger im Wohnzimmer
      - Starte den Roborock Erdgeschoss Staubsauger
    setup:
      vacuum.roborock_downstairs:
        state: "off"
    expect_changes:
      vacuum.roborock_downstairs:
        state: cleaning
  - sentences:
      - Schicke den Roborock Erdgeschoss zur Basis zurück
      - Schicke den Staubsauger im Wohnzimmer zur Basis zurück
    setup:
      vacuum.roborock_downstairs:
        state: cleaning
    expect_changes:
      vacuum.roborock_downstairs:
        state: returning

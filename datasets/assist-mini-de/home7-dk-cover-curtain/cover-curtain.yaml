---
category: cover
tests:
  - sentences:
      - Öffne den smarten Vorhang
      - Öffne den smarten Vorhang im Wohnzimmer
      - Öffne die Vorhänge im Wohnzimmer
    setup:
      cover.smart_curtain:
        state: closed
        attributes:
          current_position: 0
    expect_changes:
      cover.smart_curtain:
        state: open
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Schließe die smarten Vorhänge
      - Schließe den smarten Vorhang im Wohnzimmer
      - Schließe die Vorhänge im Wohnzimmer
    setup:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 100
    expect_changes:
      cover.smart_curtain:
        state: closed
    ignore_changes:
      cover.smart_curtain:
        - current_position
  - sentences:
      - Stelle den smarten Vorhang auf 50%
      - Stelle die Vorhänge im Wohnzimmer auf 50%
    setup:
      cover.smart_curtain:
        state: closed
        attributes:
          current_position: 0
    expect_changes:
      cover.smart_curtain:
        state: open
        attributes:
          current_position: 50
    # Doesn't immediately open to 50% so we can't vet without a delay
    ignore_changes:
      cover.smart_curtain:
        - current_position

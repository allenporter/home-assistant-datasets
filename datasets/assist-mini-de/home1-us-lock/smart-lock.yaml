---
category: lock
tests:
  - sentences:
      - Sperre das smarte Schloss
      - Sperre das Schloss am Eingang
    setup:
      lock.smart_lock:
        state: unlocked
    expect_changes:
      lock.smart_lock:
        state: locked
  - sentences:
      - Entsperre das smarte Schloss
      - Entsperre das Schloss am Eingang
    setup:
      lock.smart_lock:
        state: locked
    expect_changes:
      lock.smart_lock:
        state: unlocked

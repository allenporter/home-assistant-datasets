---
areas:
  - name: Eingang
    id: entry
devices:
  - name: Smartes Schloss
    id: smart_lock
    area: entry
    info:
      model: Encode Smart WiFi Deadbolt
      manufacturer: Schlage
      sw_version: 2.7.1
entities:
  - name: Smartes Schloss
    id: lock.smart_lock
    area: entry
    device: smart_lock
    state: locked
  - name: Smartes Schloss
    id: binary_sensor.smart_lock
    area: entry
    device: smart_lock
    state: false
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.LOCK
  - name: Manipulation des Smarten Schlosses
    id: binary_sensor.smart_lock_tamper
    area: entry
    device: smart_lock
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.TAMPER
  - name: Batterie des Smarten Schlosses
    id: binary_sensor.smart_lock_battery
    area: entry
    device: smart_lock
    attributes:
      device_class: binary_sensor.BinarySensorDeviceClass.BATTERY
  - name: Batterie des Smarten Schlosses
    id: sensor.smart_lock_battery
    area: entry
    device: smart_lock
    state: "90"
    attributes:
      device_class: sensor.SensorDeviceClass.BATTERY
      state_class: sensor.SensorStateClass.MEASUREMENT
      native_unit_of_measurement: "%"

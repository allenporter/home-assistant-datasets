---
category: cover
tests:
  - sentences:
      - Schließe das Garagentor
      - Bitte schließe das Garagentor
    setup:
      cover.garage_door_opener:
        state: open
    expect_changes:
      cover.garage_door_opener:
        state: closed
    ignore_changes:
      cover.garage_door_opener:
        - current_position
  - sentences:
      - Bitte öffne das Garagentor
      - Öffne das Garagentor
    setup:
      cover.garage_door_opener:
        state: closed
    expect_changes:
      cover.garage_door_opener:
        state: open
    ignore_changes:
      cover.garage_door_opener:
        - current_position
